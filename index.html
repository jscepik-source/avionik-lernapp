<style>
 :root{
  --bg:#edf3fa; --card:#ffffff; --inset:#f3f8fd;
  --ink:#17324e; --mut:#61758c; --line:#dbe6f2;
  --acc:#1f6fe0; --acc-soft:#e4eefc;
  --warm:#f6a821; --warm-soft:#fdf1dc;
  --good:#189653; --good-bg:#e5f6ec;
  --bad:#df4f4a; --bad-bg:#fdecea;
  --shadow:0 6px 20px rgba(23,51,80,.08);
  --nav:rgba(255,255,255,.92); --top:rgba(237,243,250,.92);
 }
 :root[data-theme="dark"]{
  --bg:#0d1726; --card:#16233a; --inset:#0f1b2e;
  --ink:#e9f1fa; --mut:#93a7bf; --line:#263c5c;
  --acc:#5aa2ff; --acc-soft:#1b3050;
  --warm:#f5b23e; --warm-soft:#3a2d13;
  --good:#3ecf7a; --good-bg:#14331f;
  --bad:#ef6a64; --bad-bg:#3a1b1b;
  --shadow:0 6px 20px rgba(0,0,0,.35);
  --nav:rgba(15,25,42,.92); --top:rgba(13,23,38,.92);
 }
 @media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
   --bg:#0d1726; --card:#16233a; --inset:#0f1b2e;
   --ink:#e9f1fa; --mut:#93a7bf; --line:#263c5c;
   --acc:#5aa2ff; --acc-soft:#1b3050;
   --warm:#f5b23e; --warm-soft:#3a2d13;
   --good:#3ecf7a; --good-bg:#14331f;
   --bad:#ef6a64; --bad-bg:#3a1b1b;
   --shadow:0 6px 20px rgba(0,0,0,.35);
   --nav:rgba(15,25,42,.92); --top:rgba(13,23,38,.92);
  }
 }
 *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
 html,body{margin:0}
 body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.55;-webkit-text-size-adjust:100%}
 .disp{font-family:ui-rounded,"SF Pro Rounded",-apple-system,"Segoe UI",system-ui,sans-serif}
 :focus-visible{outline:2.5px solid var(--acc);outline-offset:2px;border-radius:8px}
 .app{max-width:720px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

 .stickytop{position:sticky;top:0;z-index:6;background:var(--top);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
 .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:calc(env(safe-area-inset-top) + 12px) 16px 6px}
 .tt{font-weight:800;font-size:1.15rem;letter-spacing:.01em}
 .right{display:flex;align-items:center;gap:8px}
 .chip{background:var(--card);border:1px solid var(--line);border-radius:99px;padding:5px 12px;font-size:.78rem;color:var(--mut);font-variant-numeric:tabular-nums;box-shadow:var(--shadow)}
 .chip b{color:var(--ink)}
 .iconbtn{background:var(--card);border:1px solid var(--line);border-radius:99px;width:36px;height:36px;font-size:1rem;cursor:pointer;box-shadow:var(--shadow)}
 .controls{display:flex;gap:8px;align-items:stretch;padding:8px 16px 12px}
 select{flex:1;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:13px;padding:11px 12px;font:inherit;font-size:.95rem;box-shadow:var(--shadow)}
 .ck{display:flex;align-items:center;gap:7px;color:var(--mut);font-size:.88rem;border:1px solid var(--line);background:var(--card);border-radius:13px;padding:10px 13px;white-space:nowrap;cursor:pointer;box-shadow:var(--shadow)}
 .ck input{width:17px;height:17px;accent-color:var(--warm)}

 .content{flex:1;padding:14px 16px calc(env(safe-area-inset-bottom) + 104px)}

 .prog{position:relative;height:10px;background:var(--card);border:1px solid var(--line);border-radius:99px;margin:2px 6px 18px}
 .prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),#6fb2ff);border-radius:99px;width:0;transition:width .3s ease}
 .prog .plane{position:absolute;top:50%;transform:translate(-45%,-58%);font-size:1.05rem;transition:left .3s ease;filter:drop-shadow(0 2px 3px rgba(23,51,80,.25))}

 .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow);animation:rise .3s cubic-bezier(.2,.7,.3,1)}
 @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
 .tag{display:inline-block;font-size:.72rem;letter-spacing:.05em;color:var(--acc);background:var(--acc-soft);border-radius:99px;padding:3px 11px;font-weight:800}
 .catlbl{color:var(--mut);font-size:.78rem;margin-left:8px}
 .star{float:right;cursor:pointer;font-size:1.45rem;line-height:1;color:var(--line);padding:0 2px;margin-top:-2px;background:none;border:none}
 .star.on{color:var(--warm)}
 .q{font-size:1.14rem;font-weight:650;margin:13px 0 15px;text-wrap:balance}
 .qimg{margin:10px 0 4px;padding:12px;background:var(--inset);border:1.5px solid var(--line);border-radius:14px;display:flex;justify-content:center}
 .qimg svg{max-width:100%;height:auto;display:block}

 .opt{position:relative;display:flex;gap:12px;align-items:flex-start;border:1.5px solid var(--line);background:var(--inset);border-radius:15px;padding:13px 14px;margin:10px 0;cursor:pointer;transition:border-color .13s,background .13s,transform .08s;touch-action:manipulation}
 .opt:active{transform:scale(.985)}
 .opt .k{width:27px;height:27px;border-radius:50%;background:var(--acc-soft);color:var(--acc);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;flex:none;margin-top:1px}
 .opt.sel{border-color:var(--acc);background:var(--acc-soft)}
 .opt.sel .k{background:var(--acc);color:#fff}
 .opt.correct{border-color:var(--good);background:var(--good-bg)}
 .opt.correct .k{background:var(--good);color:#fff}
 .opt.wrong{border-color:var(--bad);background:var(--bad-bg)}
 .opt.wrong .k{background:var(--bad);color:#fff}
 .opt input{position:absolute;opacity:0;pointer-events:none}
 .opt:focus-within{outline:2.5px solid var(--acc);outline-offset:2px}

 .fb{margin-top:14px;padding:13px 15px;border-radius:14px;font-size:.97rem;display:none}
 .fb.show{display:block}
 .fb.ok{background:var(--good-bg);border:1px solid var(--good)}
 .fb.no{background:var(--bad-bg);border:1px solid var(--bad)}
 .fb .cor{display:block;margin-top:5px;color:var(--mut);font-size:.9rem}

 .actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;align-items:center}
 .btn{background:var(--acc);color:#fff;border:none;border-radius:14px;padding:14px 21px;font-weight:750;cursor:pointer;font:inherit;font-size:1rem;touch-action:manipulation;transition:transform .08s,filter .12s;box-shadow:0 4px 12px rgba(31,111,224,.28)}
 .btn:active{transform:scale(.97)}
 .btn.sec{background:var(--card);color:var(--ink);border:1.5px solid var(--line);box-shadow:var(--shadow)}
 .btn.sm{padding:10px 15px;font-size:.9rem}
 .cnt{margin-left:auto;align-self:center;color:var(--mut);font-size:.85rem;font-variant-numeric:tabular-nums}

 .flip{min-height:185px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:1.18rem;padding:22px 10px;text-wrap:balance}
 .flip .ans{color:var(--good);font-weight:700}
 .flip .qq{color:var(--mut);font-size:.86rem;margin-bottom:10px}

 .big{font-size:2.8rem;font-weight:800;color:var(--acc);font-variant-numeric:tabular-nums}
 .emo{font-size:2.2rem;margin-bottom:4px}
 .msg{font-weight:700;font-size:1.05rem;margin-top:2px}
 .center{text-align:center}

 .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
 .kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;text-align:center;box-shadow:var(--shadow)}
 .kpi .n{font-size:1.55rem;font-weight:800;color:var(--acc);font-variant-numeric:tabular-nums}
 .kpi .l{color:var(--mut);font-size:.78rem;margin-top:3px}
 .row{display:flex;align-items:center;gap:10px;margin:9px 0}
 .row .nm{width:92px;font-size:.82rem;color:var(--mut)}
 .mini{flex:1;height:10px;background:var(--inset);border:1px solid var(--line);border-radius:99px;overflow:hidden}
 .mini>i{display:block;height:100%;background:linear-gradient(90deg,var(--good),#5fd98f);border-radius:99px}
 .rev{border-top:1px solid var(--line);padding:12px 0;font-size:.92rem}
 .rev .yq{font-weight:650}.rev .rc{color:var(--good)}.rev .rw{color:var(--bad)}

 .boxwrap{display:flex;gap:7px;margin:0 0 14px}
 .boxwrap .b{flex:1;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 4px;box-shadow:var(--shadow)}
 .boxwrap .b .n{font-weight:800;color:var(--acc);font-size:1.05rem;font-variant-numeric:tabular-nums}
 .boxwrap .b.m .n{color:var(--good)}
 .boxwrap .b .l{font-size:.66rem;color:var(--mut)}

 .hidden{display:none}
 .foot{color:var(--mut);font-size:.74rem;text-align:center;padding:2px 14px 8px}

 .nav{position:fixed;left:0;right:0;bottom:0;z-index:10;background:var(--nav);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
 .nav .inner{max-width:720px;margin:0 auto;display:flex}
 .nav button{flex:1;background:none;border:none;color:var(--mut);padding:8px 2px 8px;cursor:pointer;font:inherit;font-size:.66rem;font-weight:650;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation}
 .nav button .ic{font-size:1.3rem;line-height:1.25;padding:3px 14px;border-radius:12px;transition:background .15s}
 .nav button.active{color:var(--acc)}
 .nav button.active .ic{background:var(--acc-soft)}

 /* Glossar / Begriffshilfe */
 .gloss{margin-top:14px;border:1px solid var(--line);border-radius:14px;background:var(--inset);overflow:hidden}
 .gloss>summary{list-style:none;cursor:pointer;padding:11px 14px;font-size:.9rem;font-weight:650;color:var(--acc);display:flex;align-items:center;gap:8px;user-select:none}
 .gloss>summary::-webkit-details-marker{display:none}
 .gloss>summary .chev{margin-left:auto;transition:transform .2s;color:var(--mut);font-size:.8rem}
 .gloss[open]>summary .chev{transform:rotate(180deg)}
 .gloss[open]>summary{border-bottom:1px solid var(--line)}
 .glossbody{padding:6px 14px 12px}
 .gterm{padding:9px 0;border-bottom:1px solid var(--line)}
 .gterm:last-child{border-bottom:none}
 .gterm .gk{font-weight:750;color:var(--ink);font-size:.92rem}
 .gterm .gd{color:var(--mut);font-size:.88rem;margin-top:2px;line-height:1.5}

 /* Klausur-Umschalter (segmented control) */
 .examsel{display:flex;gap:6px;padding:2px 16px 0}
 .exbtn{flex:1;font:inherit;font-weight:750;font-size:.9rem;cursor:pointer;padding:9px 10px;border-radius:12px;
   border:1.5px solid var(--line);background:var(--card);color:var(--mut);box-shadow:var(--shadow);
   display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;touch-action:manipulation}
 .exbtn.active{background:var(--acc);color:#fff;border-color:var(--acc);box-shadow:0 4px 12px rgba(31,111,224,.28)}
 .exbtn:active{transform:scale(.98)}

 /* Zurück-Button + Fälligkeits-Badge */
 .btn.gho{background:transparent;color:var(--mut);border:1.5px solid var(--line);box-shadow:none;padding:14px 16px}
 .due{display:inline-block;background:var(--warm-soft);color:var(--warm);border-radius:99px;padding:3px 10px;font-size:.76rem;font-weight:700;font-variant-numeric:tabular-nums}
 .boxwrap .b.due{outline:2px solid var(--warm)}

 @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style></head>

patibilität und Code-Generierung per XML ermöglicht"}], "correct": ["D"]}, {"id": "fa8a85e934", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "Eine Group-1-Drohne (RCS ≈ 0,12 m²) nähert sich schwebend einem Objekt. Warum liefert ein reines Doppler-Radar hier ein besonders unzuverlässiges Bild, obwohl die Drohne physikalisch groß genug für eine Reflexion wäre?", "options": [{"l": "A", "t": "Weil die Radialgeschwindigkeit im Schwebeflug nahe Null liegt und das Radar sie als Clutter herausfiltert"}, {"l": "B", "t": "Weil Doppler-Radare konstruktionsbedingt ausschließlich auf große Ziele wie den Bayraktar TB2 kalibriert sind"}, {"l": "C", "t": "Weil Group-1-Drohnen grundsätzlich weit außerhalb der typischen Radar-Reichweite von 800 m operieren"}, {"l": "D", "t": "Weil das schwache RCS von 0,12 m² technisch unterhalb der Detektionsschwelle jedes Radarsystems liegt"}], "correct": ["A"]}, {"id": "59a22cd6f0", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "Ein Verteidigungssystem verschießt zur Abwehr einer 400 € teuren FPV-Drohne eine Rakete im Wert von 400.000 €. Welches im Kurs behandelte Konzept beschreibt dieses Missverhältnis am treffendsten?", "options": [{"l": "A", "t": "Group Inflation — eine Unterschätzung der NATO-Gruppenklassifizierung der Drohne durch das System"}, {"l": "B", "t": "Cost Asymmetry — die Abwehrkosten übersteigen die Bedrohungskosten um mehrere Größenordnungen"}, {"l": "C", "t": "Hover Problem — die Drohne entzieht sich durch reines Schweben systematisch jeder Radarerfassung"}, {"l": "D", "t": "Signature Mismatch — eine falsch kalibrierte RCS-Referenzdatenbank innerhalb des Abwehrsystems"}], "correct": ["B"]}, {"id": "1b3d2498df", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Ein Betreiber möchte regelmäßig BVLOS-Flüge außerhalb der Offenen Kategorie durchführen. Welches Instrument verlangt die Spezielle Kategorie als Grundlage der individuellen Risikobewertung?", "options": [{"l": "A", "t": "Ein bestandener A2-Kompetenznachweis, der in der Speziellen Kategorie dafür bereits ausreicht"}, {"l": "B", "t": "Eine einmalige Herstellerzertifizierung der eingesetzten Drohne nach dem C-Klassen-Schema"}, {"l": "C", "t": "Eine SORA-Risikoanalyse (Specific Operations Risk Assessment) als Grundlage der Betriebsgenehmigung"}, {"l": "D", "t": "Eine Registrierung im DIPUL-Portal, die die individuelle Risikoprüfung vollständig ersetzt"}], "correct": ["C"]}, {"id": "0d502b0875", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Eine Drohne fällt laut Definition komplett aus dem Anwendungsbereich der EASA-Drohnenverordnung (Out-of-Scope). Wer regelt in diesem Fall den Betrieb?", "options": [{"l": "A", "t": "Der Hersteller der Drohne legt eigenständig verbindliche Betriebsregeln für den Nutzer fest"}, {"l": "B", "t": "Es gilt automatisch die zulassungspflichtige Kategorie als strengste verfügbare Einstufung"}, {"l": "C", "t": "Der Betrieb ist automatisch vollständig verboten, weil schlicht kein Regelwerk mehr greift"}, {"l": "D", "t": "Es gelten die jeweiligen nationalen Vorschriften des Mitgliedstaats, in dem operiert wird"}], "correct": ["D"]}, {"id": "f7b5c59d65", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Welche Sensorkombination würde ein Ingenieur laut Kursvorgaben für eine autonome Landung wählen, bei der sowohl die exakte Position über Grund als auch die Restdistanz zum Boden entscheidend sind?", "options": [{"l": "A", "t": "Optical Flow/Kamera für die Positionsdrift plus Distanzsensor (Ultraschall/Laser) für die Höhe über Grund"}, {"l": "B", "t": "Ausschließlich das Magnetometer, da es laut Kurs sowohl Position als auch Höhe zuverlässig liefert"}, {"l": "C", "t": "Ausschließlich RTK-GNSS, da es für Landephasen genauer als jede bordeigene Kamera arbeitet"}, {"l": "D", "t": "Ausschließlich das Barometer, da es als einzige Quelle Höhenwerte mit Zentimeter-Genauigkeit liefert"}], "correct": ["A"]}, {"id": "49451c3019", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Ein militärisches UAV soll auch unter aktivem GNSS-Jamming zuverlässig navigieren können und akzeptiert dafür höheres Gewicht und höhere Kosten. Welche Sensorwahl passt zu dieser Priorität?", "options": [{"l": "A", "t": "Ein passiver RF-Scanner, der gegnerische Jamming-Signale direkt zur eigenen Navigation nutzt"}, {"l": "B", "t": "Ein hochwertiges Inertial Navigation System (INS), da es unabhängig von externen Funksignalen arbeitet"}, {"l": "C", "t": "Ein Standard-GNSS-Empfänger mit einer zusätzlichen zweiten Antenne für redundante Signalstärke"}, {"l": "D", "t": "Ein Optical-Flow-Modul, da es beliebig lange vollkommen driftfrei ohne jede externe Referenz navigiert"}], "correct": ["B"]}, {"id": "56226ccb86", "ex": "uav", "cat": "Betrieb & Anwendungen", "q": "Ein Drone-in-a-Box-System soll für vollautomatisierten 24/7-Betrieb ausgelegt werden. Welcher Faktor wird laut Vorlesung typischerweise NICHT als limitierende Grenze des Konzepts genannt?", "options": [{"l": "A", "t": "Die BVLOS-Rechtslage, die je nach Land eine gesonderte behördliche Genehmigung erfordert"}, {"l": "B", "t": "Die Wetterabhängigkeit, die automatisierte Flüge bei Sturm oder Vereisung stark einschränkt"}, {"l": "C", "t": "Die Rechenleistung der Bordkamera, da diese durch Edge-AI praktisch unbegrenzt mitskaliert"}, {"l": "D", "t": "Die Cybersecurity der Docking-Station, die dauerhaft vor unbefugtem Zugriff geschützt werden muss"}], "correct": ["C"]}, {"id": "cefa096e73", "ex": "uav", "cat": "Multicopter-Grundlagen", "q": "Warum gilt die V-1 im Rückblick als konzeptioneller Vorläufer moderner Loitering Munitions (Kamikaze-Drohnen), obwohl sie technisch ein reiner Marschflugkörper ohne Wiederverwendung war?", "options": [{"l": "A", "t": "Weil beide Systeme identische Pulsstrahltriebwerke mit exakt gleicher Reichweite und Nutzlast verwenden"}, {"l": "B", "t": "Weil beide Konzepte ausschließlich über optische Kameras und Bilderkennung zur Zielerfassung navigieren"}, {"l": "C", "t": "Weil moderne Loitering Munitions offiziell als direkte technische Nachbauten der V-1 klassifiziert sind"}, {"l": "D", "t": "Weil beide Konzepte ein unbemanntes, selbstgesteuertes Fluggerät als einmaligen, ins Ziel fliegenden Effektor nutzen"}], "correct": ["D"]}, {"id": "5a72eed62b", "ex": "uav", "cat": "Multicopter-Grundlagen", "q": "Warum spielen \"leichter als Luft\"-Konzepte (Luftschiffe/Ballons) in der modernen zivilen Drohnenlandschaft laut Kurs nur eine Nischenrolle gegenüber \"schwerer als Luft\"-Systemen?", "options": [{"l": "A", "t": "Weil sie im Verhältnis zu ihrer Nutzlast sehr große, schwer zu transportierende und witterungsanfällige Hüllen benötigen"}, {"l": "B", "t": "Weil sie im Gegensatz zu Multicoptern praktisch keine gezielte Steuerung der Flugrichtung erlauben"}, {"l": "C", "t": "Weil sie gesetzlich in praktisch allen EASA-Mitgliedstaaten vollständig verboten worden sind"}, {"l": "D", "t": "Weil sie technisch keinerlei Nutzlast oberhalb weniger Gramm über längere Zeit tragen können"}], "correct": ["A"]}, {"id": "8c7339f9ca", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Du nutzt in der Offenen Kategorie eine kleine C1-Kameradrohne im automatisierten \"Follow-Me\"-Modus, bei dem die Drohne dir als Pilot selbstständig folgt. Wie groß darf die Distanz zwischen dir und der Drohne in diesem Modus rechtlich maximal sein?", "options": [{"l": "A", "t": "30 Meter"}, {"l": "B", "t": "50 Meter"}, {"l": "C", "t": "150 Meter"}, {"l": "D", "t": "10 Meter"}], "correct": ["B"]}, {"id": "b98348ad6d", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Im europäischen Rechtsrahmen der EASA wird oft von \"AMC & GM\" gesprochen. Wofür stehen diese Abkürzungen, die der Anwendung und Konkretisierung der EU-Verordnungen dienen?", "options": [{"l": "A", "t": "Advanced Multicopter Certification & General Mechanics"}, {"l": "B", "t": "Autonomous Mission Code & Global Mapping"}, {"l": "C", "t": "Acceptable Means of Compliance & Guidance Material"}, {"l": "D", "t": "Aircraft Maintenance Control & Ground Management"}], "c ne laut Vorlesung zwischen 2023 und 2024 angestiegen?", "options": [{"l": "A", "t": "Von 100 auf 500 Stück pro Monat"}, {"l": "B", "t": "Von 1 Million auf 2 Millionen Stück pro Monat"}, {"l": "C", "t": "Von 1.000 auf 5.000 Stück pro Monat"}, {"l": "D", "t": "Von 20.000 auf 200.000 Stück pro Monat"}], "correct": ["D"]}, {"id": "b9885b6143", "ex": "uav", "cat": "Autopiloten & Flugmodi", "q": "Worin liegt der primäre Unterschied zwischen den ArduCopter-Flugmodi \"Alt Hold\" (Altitude Hold) und \"Loiter\"?", "options": [{"l": "A", "t": "In \"Alt Hold\" hält die Drohne per Barometer nur die Flughöhe automatisch; horizontale Windabdrift muss der Pilot selbst per Knüppel ausgleichen. \"Loiter\" nutzt zusätzlich GPS, um bei losgelassenen Knüppeln auch die horizontale Position zu halten"}, {"l": "B", "t": "\"Loiter\" funktioniert technisch nur, wenn gar kein GPS-Signal verfügbar ist"}, {"l": "C", "t": "\"Alt Hold\" schaltet bei Aktivierung sofort die Motoren ab und leitet einen Sinkflug im Gleitflug ein"}, {"l": "D", "t": "Im \"Loiter\"-Modus fliegt die Drohne bei Aktivierung automatisch zum ursprünglichen Startpunkt zurück"}], "correct": ["A"]}, {"id": "759a41a77c", "ex": "uav", "cat": "Design & Antrieb", "q": "Welche konstruktive Besonderheit weist ein Y3-Multicopter im Vergleich zu herkömmlichen Quadrocoptern (wie X4) auf, um die Gier-Achse (Yaw) steuern zu können?", "options": [{"l": "A", "t": "Er nutzt ein schweres, internes Schwungrad im Zentrum der Drohne, das dem Drehmoment entgegenwirkt"}, {"l": "B", "t": "Er steuert Yaw durch einen mechanischen Servo-Motor, der den hinteren Rotor aktiv neigt (Tilt)"}, {"l": "C", "t": "Er schaltet in engen Kurven einen der drei Rotoren vorübergehend komplett ab"}, {"l": "D", "t": "Er verfügt an jedem der drei Arme über zusätzliche koaxiale Doppelrotoren"}], "correct": ["B"]}, {"id": "c8c8da7381", "ex": "uav", "cat": "Aerodynamik & Flugmechanik", "q": "Ein Fixed-Wing-UAV hat eine charakteristische Dimension (CD) von exakt 1 Meter, die Bodensichtweite (GV) beträgt 5.000 Meter. Wie hoch ist die daraus resultierende, rechtlich zulässige VLOS-Distanz?", "options": [{"l": "A", "t": "1500 m, da hier ausschließlich die Bodensichtweite (DLOS) als VLOS-Grenze gilt"}, {"l": "B", "t": "347 m, berechnet mit der Multirotor-Formel (327×1m+20m) statt der korrekten Fixed-Wing-Formel"}, {"l": "C", "t": "520 m, da die ALOS (490×1m+30m) kleiner ist als die DLOS (0,3×5000m=1500m) und damit den Radius begrenzt"}, {"l": "D", "t": "120 m, da die VLOS-Distanz rechtlich pauschal auf die Höhenobergrenze der Open-Kategorie begrenzt ist"}], "correct": ["C"]}, {"id": "0a89cb153c", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Wie wird eine Person rechtlich eingestuft, die sich beim Überflug in einem geschlossenen PKW, Linienbus oder Flugzeug befindet?", "options": [{"l": "A", "t": "Sie wird nur dann als beteiligte Person gewertet, wenn sich das Fahrzeug gerade in Bewegung befindet"}, {"l": "B", "t": "Sie gilt nicht als Person im luftrechtlichen Sinne, da das Fahrzeugdach als physischer Schutzschild wirkt"}, {"l": "C", "t": "Sie wird nur als unbeteiligt gewertet, wenn das Fahrzeug auf einem gesicherten Parkplatz abgestellt ist"}, {"l": "D", "t": "Sie gilt rechtlich uneingeschränkt als unbeteiligte Person und ist durch die üblichen Mindestabstände zu schützen"}], "correct": ["D"]}, {"id": "ac052d5c70", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Wie lange ist der EASA-Kompetenznachweis (A1/A3) nach bestandener Online-Prüfung gültig, bevor er erneuert werden muss?", "options": [{"l": "A", "t": "5 Jahre"}, {"l": "B", "t": "Unbegrenzt (lebenslang gültig)"}, {"l": "C", "t": "1 Jahr"}, {"l": "D", "t": "2 Jahre"}], "correct": ["A"]}, {"id": "e8ffca685f", "ex": "uav", "cat": "Sensorik & Navigation", "q": "MEMS-Beschleunigungssensoren messen lineare Beschleunigung häufig über die Kapazitätsänderung eines winzigen Plattenkondensators, wenn sich eine interne Masse verschiebt. Wie ist die Kapazität C eines solchen Plattenkondensators physikalisch definiert?", "options": [{"l": "A", "t": "C = f·λ, also die Frequenz multipliziert mit der Wellenlänge"}, {"l": "B", "t": "C = m·a, also Masse multipliziert mit der gemessenen Beschleunigung"}, {"l": "C", "t": "C = ε·A/d, also die Feldkonstante multipliziert mit der Plattenfläche, geteilt durch den Plattenabstand"}, {"l": "D", "t": "C = U/R, also die anliegende Spannung geteilt durch den elektrischen Widerstand"}], "correct": ["C"]}, {"id": "a3361ece1e", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Ein Fernpilot verliert bei 25 Metern Höhe die Kontrolle über eine Drohne, die zuvor mit 19 m/s geflogen ist. Warum kann die tatsächliche Aufprallenergie beim Absturz auf über 110 Joule ansteigen, obwohl die Registrierungsschwelle bei 80 Joule liegt?", "options": [{"l": "A", "t": "Weil der Akku beim Absturz explodiert und die freigesetzte chemische Energie zur Aufprallenergie hinzugerechnet wird"}, {"l": "B", "t": "Weil die Propeller sich beim Absturz weiterdrehen und dadurch zusätzlichen Schub in Richtung Boden erzeugen"}, {"l": "C", "t": "Weil das Gewicht der Drohne durch die Reibungshitze beim Fall messbar zunimmt"}, {"l": "D", "t": "Weil sich die Drohne während des Falls zusätzlich zur Ausgangsgeschwindigkeit durch die Erdanziehung weiter beschleunigt und die kinetische Energie dadurch überproportional zunimmt"}], "correct": ["D"]}, {"id": "8c02efd6ff", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Für den Betrieb in der Unterkategorie A1 mit einer C0-Drohne ist laut EASA-Regelung kein Mindestalter vorgeschrieben. Welche zwei Bedingungen müssen dafür zusätzlich erfüllt sein?", "options": [{"l": "A", "t": "Die Drohne muss als Spielzeug gemäß Richtlinie 2009/48/EC gelten und der minderjährige Nutzer muss von einer qualifizierten Fernpilotin oder einem qualifizierten Fernpiloten beaufsichtigt werden"}, {"l": "B", "t": "Die Drohne muss GPS-frei betrieben werden und der Nutzer muss vorab eine schriftliche Einverständniserklärung der Eltern vorlege ik", "q": "Welche vier Bedingungen müssen ALLE gleichzeitig erfüllt sein, damit man (außer in Nationalparks) auch ohne behördliche Zustimmung über einem Naturschutzgebiet fliegen darf?", "options": [{"l": "A", "t": "Kein Sport-/Freizeitzweck, Flughöhe unter 30 m, maximale Fluggeschwindigkeit unter 5 m/s, und schriftliche Anmeldung beim örtlichen Forstamt"}, {"l": "B", "t": "Ausschließlich Tageslichtbetrieb, maximal 10 Minuten Flugzeit pro Einsatz, GPS-Tracking-Pflicht, und Versicherungsnachweis über 5 Millionen Euro"}, {"l": "C", "t": "Kein Sport-/Freizeitzweck, Flughöhe über 100 m, der Pilot kennt und berücksichtigt den Schutzzweck angemessen, und die Luftraumnutzung ist zur Erfüllung des Betriebszwecks unumgänglich erforderlich"}, {"l": "D", "t": "Nur eine einzige Bedingung genügt: Flughöhe über 100 m, alle anderen Kriterien sind laut Gesetzestext bloße Empfehlungen ohne Rechtsverbindlichkeit"}], "correct": ["C"]}, {"id": "8caa180ffb", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Warum ist die Vier-Bedingungen-Ausnahme aus § 21h Abs. 3 Nr. 6 LuftVO ausdrücklich NICHT auf Nationalparks anwendbar?", "options": [{"l": "A", "t": "In Nationalparks gilt automatisch die spezielle Kategorie als einzige zulässige Betriebsart, unabhängig von jeder weiteren Bedingung"}, {"l": "B", "t": "Nationalparks sind rechtlich identisch mit Flughäfen zu behandeln und unterliegen daher dem 1.000-Meter-Abstand aus Nr. 2"}, {"l": "C", "t": "Nationalparks sind komplett aus dem Anwendungsbereich von § 21h LuftVO herausgenommen und unterliegen daher überhaupt keiner Beschränkung"}, {"l": "D", "t": "Der Gesetzestext schließt Nationalparks explizit von dieser Ausnahmeregelung aus (\"mit Ausnahme von Nationalparks\") — dort bleiben nur Zustimmung der Naturschutzbehörde oder eine abweichende landesrechtliche Regelung als Weg"}], "correct": ["D"]}, {"id": "9a72e6f53b", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Wie viele grundsätzlich unabhängige Wege (Alternativen) sieht § 21h Abs. 3 Nr nkung"}, {"l": "C", "t": "Zwischen 22:00 Uhr und 6:00 Uhr Ortszeit"}, {"l": "D", "t": "Es gibt bei der Höhen-Alternative laut Gesetzestext überhaupt kein Zeitfenster, das ist nur bei der Kleinstdrohnen-Ausnahme relevant"}], "correct": ["C"]}, {"id": "0886a95d73", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Welche Lärm-Voraussetzung muss bei der Höhen-Alternative (§ 21h Abs. 3 Nr. 7 Buchst. c, dd) über Wohngrundstücken zusätzlich erfüllt sein?", "options": [{"l": "A", "t": "Der Schalldruckpegel der Drohne muss durch ein amtlich kalibriertes Messgerät vor jedem Einzelflug gemessen und protokolliert werden"}, {"l": "B", "t": "Es gilt ein pauschales Höchstgewicht von 5 kg, da schwerere Drohnen automatisch als zu laut gelten"}, {"l": "C", "t": "Eine Lärmauflage existiert bei der Höhen-Alternative nicht — Lärmschutz betrifft laut Gesetzestext ausschließlich Freibäder und Badestrände"}, {"l": "D", "t": "Es darf nicht zu erwarten sein, dass durch den Betrieb die Immissionsrichtwerte nach Nummer 6.1 der Technischen Anleitung zum Schutz gegen Lärm (TA Lärm) überschritten werden"}], "correct": ["D"]}, {"id": "4741584150", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Welche drei Bedingungen müssen laut § 21h Abs. 3 Nr. 7 Buchst. c, aa LuftVO zusammen erfüllt sein, damit die \"Erforderlichkeit\" der Luftraumnutzung über einem Wohngrundstück rechtlich anerkannt wird?", "options": [{"l": "A", "t": "Die Nutzung ist für einen berechtigten Betriebszweck erforderlich, öffentliche/Nicht-Wohn-Flächen können für den Überflug nicht genutzt werden, und die Zustimmung des Eigentümers kann nicht in zumutbarer Weise eingeholt werden"}, {"l": "B", "t": "Der Betriebszweck ist beliebig, solange die Flughöhe über 200 m liegt und die Drohne weniger als 250 g wiegt"}, {"l": "C", "t": "Es genügt, dass der Fernpilot subjektiv der Meinung ist, der Überflug spare ihm Zeit gegenüber einer alternativen Route"}, {"l": "D", "t": "Es ist ausreichend, dass die Zustimmung des Eigentümers grundsätzlich existiert, aber noch nicht formal schriftlich dokumentiert wurde"}], "correct": ["A"]}, {"id": "92861b6841", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Wann ist der Betrieb über Freibädern, Badestränden und ähnlichen Einrichtungen nach § 21h Abs. 3 Nr. 8 LuftVO zulässig?", "options": [{"l": "A", "t": "Jederzeit, sofern eine Mindestflughöhe von 100 m eingehalten wird, unabhängig von den Badezeiten"}, {"l": "B", "t": "Nur außerhalb der Betriebs- oder Badezeiten der jeweiligen Einrichtung"}, {"l": "C", "t": "Nur mit ausdrücklicher Zustimmung sämtlicher anwesender Badegäste, unabhängig von der Uhrzeit"}, {"l": "D", "t": "Ausschließlich in der Wintersaison, wenn die Einrichtung ohnehin komplett geschlossen ist"}], "correct": ["B"]}, {"id": "8de281c1d4", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Was ist nach § 21h Abs. 3 Nr. 9 LuftVO Voraussetzung für den Betrieb innerhalb einer Kontrollzone (CTR)?", "options": [{"l": "A", "t": "Kontrollzonen sind laut Gesetzestext gar kein eigenständiger Gebietstyp, sondern Teil der Flughafen-Zone (Nr. 2)"}, {"l": "B", "t": "Eine schriftliche Zustimmung des jeweiligen Flughafenbetreibers, unabhängig von der Flugsicherung"}, {"l": "C", "t": "Eine Flugverkehrskontrollfreigabe nach § 21 LuftVO"}, {"l": "D", "t": "Ein bestandener theoretischer Kompetenznachweis für die Unterkategorie A3, unabhängig von jeder Freigabe der Flugsicherung"}], "correct": ["C"]}, {"id": "4c1aa5fbfc", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Wie groß ist der Sicherheitsabstand um Krankenhäuser (§ 21h Abs. 3 Nr. 10 LuftVO), und wer genau muss dem Betrieb zustimmen?", "options": [{"l": "A", "t": "250 Meter; die Zustimmung kann laut Gesetzestext von jeder beliebigen Krankenhaus-Mitarbeiterin erteilt werden"}, {"l": "B", "t": "1.000 Meter, identisch mit dem Flughafenabstand, da Rettungshubschrauber ähnliche Anforderungen wie Flugverkehr haben"}, {"l": "C", "t": "100 Meter; eine Zustimmung ist bei Krankenhäusern laut Gesetzestext generell nicht vorgesehen, der Betrieb ist dort immer verboten"}, {"l": "D", "t": "100 Meter; die Zustimmung muss ausschließlich vom BETREIBER der Einrichtung kommen (anders als bei Nr. 3/4, wo alternativ auch die \"zuständige Stelle\" zustimmen kann)"}], "correct": ["D"]}, {"id": "8721ee240f", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Welche zusätzliche militärische Anwendung deckt § 21h Abs. 3 Nr. 11 LuftVO neben Unfall-/Einsatzorten von Behörden mit Sicherheitsaufgaben noch ab?", "options": [{"l": "A", "t": "Sämtliche NATO-Militärbasen dauerhaft, unabhängig davon, ob dort gerade eine Übung stattfindet"}, {"l": "B", "t": "Mobile Einrichtungen und Truppen der Streitkräfte im Rahmen angemeldeter Manöver und Übungen"}, {"l": "C", "t": "Private Schießstände und Sportschützenvereine außerhalb behördlicher Einsätze"}, {"l": "D", "t": "Ausschließlich Kasernen-Gebäude, jedoch ausdrücklich nicht das umliegende Übungsgelände"}], "correct": ["B"]}, {"id": "e9656153d8", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Wer darf laut § 21h Abs. 4 LuftVO zusätzliche geografische Gebiete festlegen, die über die 11 Nummern des Absatz 3 hinausgehen?", "options": [{"l": "A", "t": "Jeder private Grundstückseigentümer kann eigenständig und rechtsverbindlich eine eigene geografische Zone über seinem Grundstück deklarieren"}, {"l": "B", "t": "Ausschließlich die Deutsche Flugsicherung (DFS), unabhängig von jeder ministeriellen Beteiligung"}, {"l": "C", "t": "Das Bundesministerium für Digitales und Verkehr oder eine von ihm bestimmte Bundesbehörde"}, {"l": "D", "t": "Ausschließlich der jeweilige Bürgermeister der betroffenen Gemeinde, ohne Bundes- oder Landesbeteiligung"}], "correct": ["C"]}, {"id": "596c626149", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Welcher Abstandswert ist unter den 11 Gebietstypen des § 21h Abs. 3 LuftVO mit Abstand der am häufigsten wiederkehrende?", "options": [{"l": "A", "t": "250 Meter, als gemeinsamer Mittelwert zwischen den Flugplatz- und Industrieanlagen-Abständen"}, {"l": "B", "t": "1.000 Meter, da dieser Wert für sämtliche 11 Gebietstypen einheitlich vorgeschrieben ist"}, {"l": "C", "t": "1,5 Kilometer, da dies der einzige im Gesetzestext überhaupt genannte konkrete Abstandswert ist"}, {"l": "D", "t": "100 Meter (u. a. Industrie, Behörden, Verkehrsinfrastruktur, Krankenhäuser, Unfall-/Einsatzorte)"}], "correct": ["D"]}, {"id": "e49491ee63", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Bei welchem der 11 Gebietstypen ist eine bloße Zustimmung (ohne Betrieb in der speziellen Kategorie) NIEMALS als Alternative vorgesehen?", "options": [{"l": "A", "t": "Bei Flughäfen (Nr. 2) — hier ist ausschließlich der Betrieb in der speziellen Kategorie zulässig"}, {"l": "B", "t": "Bei Krankenhäusern (Nr. 10) — dort ist laut Gesetzestext grundsätzlich jeder Betrieb ausgeschlossen"}, {"l": "C", "t": "Bei Kontrollzonen (Nr. 9) — dort genügt stattdessen immer eine formlose telefonische Ankündigung"}, {"l": "D", "t": "Bei Freibädern (Nr. 8) — dort ist laut Gesetzestext ausschließlich die spezielle Kategorie als Weg vorgesehen"}], "correct": ["A"]}, {"id": "d3dce5ba77", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Szenario: Ein Fernpilot hält 300 m seitlichen Abstand zu einem Krankenhaus ein. Benötigt er dafür die Zustimmung des Krankenhausbetreibers?", "options": [{"l": "A", "t": "Ja, da der Sicherheitsabstand für Krankenhäuser bei 500 m liegt und 300 m damit noch innerhalb der Zone liegen"}, {"l": "B", "t": "Nein, da der Sicherheitsabstand für Krankenhäuser nur 100 m beträgt und 300 m klar außerhalb dieser Zone liegen"}, {"l": "C", "t": "Ja, unabhängig vom Abstand, da für Krankenhäuser laut Gesetzestext immer eine pauschale Zustimmungspflicht im gesamten Stadtgebiet gilt"}, {"l": "D", "t": "Nein, aber nur, weil er zusätzlich in der speziellen Kategorie fliegt — bei offenem Betrieb wäre auch bei 300 m eine Zustimmung nötig"}], "correct": ["B"]}, {"id": "41157a45f6", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Szenario: Eine 0,2  soll dabei scharfe Einzelbilder für eine Dokumentation aufnehmen. Welche zwei Kamera-Parameter des \"Belichtungsdreiecks\" (neben der Verschlusszeit) bestimmen gemeinsam mit ihr die Bildqualität?", "options": [{"l": "A", "t": "ISO-Empfindlichkeit (Sensorverstärkung) und Blende (Lichtmenge/Tiefenschärfe)"}, {"l": "B", "t": "Bildformat (JPEG/RAW) und Dateikompressionsrate"}, {"l": "C", "t": "Weißabgleich und Farbprofil"}, {"l": "D", "t": "GPS-Genauigkeit und Kompass-Kalibrierung"}], "correct": ["A"]}, {"id": "87e01562c2", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Warum führt eine zu hoch eingestellte ISO-Empfindlichkeit bei Dämmerungsaufnahmen von einer Drohne oft zu sichtbar schlechterer Bildqualität, obwohl das Bild dadurch heller wird?", "options": [{"l": "A", "t": "Weil eine hohe ISO-Einstellung automatisch die Verschlusszeit auf null reduziert und dadurch kein Bild mehr entsteht"}, {"l": "B", "t": "Weil eine hohe ISO-Einstellung das Bildrauschen verstärkt, da das Sensorsignal elektronisch nachverstärkt wird"}, {"l": "C", "t": "Weil eine hohe ISO-Einstellung den optischen Zoom der Kamera deaktiviert"}, {"l": "D", "t": "Weil eine hohe ISO-Einstellung ausschließlich die Farbsättigung, nicht aber die Helligkeit beeinflusst"}], "correct": ["B"]}, {"id": "a25ebec29f", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Welchen Effekt hat eine weit geöffnete Blende (kleine Blendenzahl, z. B. f/2.8) auf ein Luftbild im Vergleich zu einer geschlossenen Blende (große Blendenzahl, z. B. f/11)?", "options": [{"l": "A", "t": "Keinerlei Unterschied, die Blendenzahl beeinflusst ausschließlich die Verschlusszeit"}, {"l": "B", "t": "Mehr einfallendes Licht und gleichzeitig eine größere Tiefenschärfe"}, {"l": "C", "t": "Mehr einfallendes Licht, aber geringere Tiefenschärfe (schmalerer Schärfebereich im Bild)"}, {"l": "D", "t": "Weniger einfallendes Licht, aber größere Tiefenschärfe über das gesamte Bild"}], "correct": ["C"]}, {"id": "b15b878240", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Warum ist ein \"Rolling Shutter\"-Bildsensor für Multicopter-Kameras potenziell problematischer als ein \"Global Shutter\"-Sensor, obwohl Rolling-Shutter-Sensoren meist günstiger und lichtempfindlicher sind?", "options": [{"l": "A", "t": "Weil ein Rolling Shutter grundsätzlich keine Farbaufnahmen unterstützt, sondern nur Graustufenbilder liefert"}, {"l": "B", "t": "Weil ein Rolling Shutter zwingend eine externe Stromversorgung getrennt vom Drohnenakku benötigt"}, {"l": "C", "t": "Weil ein Rolling Shutter die GPS-Zeitstempelung der Aufnahmen technisch verhindert"}, {"l": "D", "t": "Weil ein Rolling Shutter die Bildzeilen nacheinander statt gleichzeitig ausliest, wodurch Propellervibrationen oder schnelle Bewegungen zu Verzerrungen (dem sogenannten \"Jello-Effekt\") führen"}], "correct": ["D"]}, {"id": "ddde424c06", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Was zeichnet einen \"Global Shutter\"-Bildsensor im Gegensatz zu einem Rolling-Shutter-Sensor aus?", "options": [{"l": "A", "t": "Alle Pixel des Sensors werden gleichzeitig belichtet und ausgelesen, wodurch bewegungsbedingte Verzerrungen (Jello-Effekt) vermieden werden"}, {"l": "B", "t": "Der Sensor liest ausschließlich die mittlere Bildzeile aus und interpoliert den Rest des Bildes rechnerisch"}, {"l": "C", "t": "Der Sensor kann im Gegensatz zum Rolling Shutter keine Videoaufnahmen, sondern nur Einzelbilder erstellen"}, {"l": "D", "t": "Der Sensor benötigt zwingend eine deutlich längere Verschlusszeit als ein Rolling-Shutter-Sensor"}], "correct": ["A"]}, {"id": "f5fa41095c", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Worauf reagiert eine Wärmebildkamera (Thermalkamera) an Bord eines UAVs primär, im Unterschied zu einer klassischen RGB-Kamera?", "options": [{"l": "A", "t": "Auf die vom Objekt reflektierte grüne Lichtwellenlänge, die für das menschliche Auge am empfindlichsten wahrnehmbar ist"}, {"l": "B", "t": "Auf die von Objekten selbst emittierte Infrarot-/Wärmestrahlun ngen von Motoren, ESCs, Verkabelung und metallischen Strukturteilen."}, {"l": "C", "t": "Durch die verbleibende Batteriekapazität, die den Messwert des Magnetometers direkt verfälscht."}, {"l": "D", "t": "Durch die reine mechanische Rotation der Propeller, unabhängig von deren elektrischem Antrieb."}], "correct": ["B"]}, {"id": "33c458696a", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Welchen Vor- und Nachteil hat das Magnetometer gegenüber dem Gyroskop bei der Kursbestimmung?", "options": [{"l": "A", "t": "Es liefert nur relative Drehungen, dafür sehr genau kurzfristig."}, {"l": "B", "t": "Es ist in jeder Hinsicht genauer als das Gyroskop."}, {"l": "C", "t": "Es liefert einen absoluten Kurs, ist aber kurzfristig weniger genau als das (relative) Gyroskop."}, {"l": "D", "t": "Es misst gar keinen Kurs."}], "correct": ["C"]}, {"id": "99ed3f2032", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Woraus besteht eine typische IMU einer Drohne?", "options": [{"l": "A", "t": "Aus einem Ultraschall- und einem Lasersensor."}, {"l": "B", "t": "Aus einem GNSS-Empfänger und einem Barometer."}, {"l": "C", "t": "Aus drei Kameras."}, {"l": "D", "t": "Aus mehreren Gyroskopen und Accelerometern – typischerweise je drei (eines pro Achse x, y, z)."}], "correct": ["D"]}, {"id": "23cd37d12d", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Wie schätzt ein Inertialsystem aus IMU-Daten die Position (Dead Reckoning)?", "options": [{"l": "A", "t": "Durch Integration: Beschleunigung → Geschwindigkeit → Positionsänderung; Drehrate → neue Orientierung, ausgehend von Startwerten."}, {"l": "B", "t": "Ausschließlich durch die kontinuierliche Messung des statischen Luftdrucks am Sensor."}, {"l": "C", "t": "Durch einfaches, direktes Ablesen der GNSS-Koordinaten ohne jede weitere Sensorverarbeitung."}, {"l": "D", "t": "Durch das reine Zählen der Motorumdrehungen aller vier Antriebe pro Zeiteinheit."}], "correct": ["A"]}, {"id": "f750e19142", "ex": "uav", "cat": "Sensorik & Navigation", "q onar, WLAN"}], "correct": ["A"]}, {"id": "9805ea2b31", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Welche typische Reichweite und Schwäche hat ein Ultraschall-Distanzsensor?", "options": [{"l": "A", "t": "Über 1 km; Problem bei Tageslicht."}, {"l": "B", "t": "Meist unter 4 m; Probleme mit weichen/porösen, schallabsorbierenden Oberflächen."}, {"l": "C", "t": "Unbegrenzt; keine Schwächen."}, {"l": "D", "t": "Bis 100 m; Problem mit hellen Flächen."}], "correct": ["B"]}, {"id": "3e55e48853", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Welcher Distanzsensor ist sehr genau und langreichweitig (bis ~100 m), aber teuer und stromhungrig?", "options": [{"l": "A", "t": "Barometer"}, {"l": "B", "t": "Ultraschall"}, {"l": "C", "t": "Laser"}, {"l": "D", "t": "Infrarot"}], "correct": ["C"]}, {"id": "a9f71632c8", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Welches gemeinsame Messprinzip nutzen Ultraschall-, IR- und Laser-Distanzsensoren?", "options": [{"l": "A", "t": "Den Vergleich von Satellitensignalen."}, {"l": "B", "t": "Die Zählung von Motorumdrehungen."}, {"l": "C", "t": "Die Messung des Erdmagnetfelds."}, {"l": "D", "t": "Ranging über die Laufzeit (Time of Flight) der ausgesendeten und reflektierten Welle/Licht."}], "correct": ["D"]}, {"id": "69b68d9d35", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Wie schätzt „Optical Flow\" die Bewegung der Drohne?", "options": [{"l": "A", "t": "Über die Verschiebung von Bildpunkten (Pixeln) zwischen aufeinanderfolgenden Kamerabildern des Bodens."}, {"l": "B", "t": "Über den gemessenen Luftdruck und dessen Veränderung während des Fluges"}, {"l": "C", "t": "Über die aktuell gemessene Drehzahl der vier Antriebsmotoren"}, {"l": "D", "t": "Über die aktuelle Anzahl der empfangenen GNSS-Satelliten am Empfänger"}], "correct": ["A"]}, {"id": "e3bc1822b0", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Welche Update-Rate ist für Optical Flow zur guten Stabilität nötig?", "options": [{"l": "A", "t": "Wenige Hz."}, {"l": "B", "t": "Mehrere 100 Hz."}, {"l": "C", "t": "Die Rate spielt keine Rolle."}, {"l": "D", "t": "Genau 1 Hz."}], "correct": ["B"]}, {"id": "baa3dd0d2c", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Wodurch ist Optical Flow in seiner Zuverlässigkeit eingeschränkt?", "options": [{"l": "A", "t": "Durch eine zu hohe Anzahl gleichzeitig empfangener GNSS-Satelliten, die das System überlastet."}, {"l": "B", "t": "Durch magnetische Störungen."}, {"l": "C", "t": "Durch texturarme Flächen (z. B. Wasser), schlechte Beleuchtung/Blendung und den Höhenbereich (nur niedrige/mittlere Höhen)."}, {"l": "D", "t": "Ausschließlich durch eine zu niedrige Batteriespannung, die den Bildsensor unterversorgt."}], "correct": ["C"]}, {"id": "7606b2a11a", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Womit wird Optical Flow häufig fusioniert, um eine vollständige Lage-/Positionsverfolgung zu erhalten?", "options": [{"l": "A", "t": "Mit dem Wetterradar, das zusätzliche Positionsdaten zur Fusion mit dem optischen Fluss liefert."}, {"l": "B", "t": "Mit dem Transponder, dessen Signale zur Verbesserung der Positionsgenauigkeit mit dem optischen Fluss verrechnet werden."}, {"l": "C", "t": "Mit dem ESC, der über die gemessene Motordrehzahl zusätzliche Bewegungsdaten zur Fusion beisteuert."}, {"l": "D", "t": "Mit IMU (und Barometer) – als visuell-inertiale Odometrie (VIO)."}], "correct": ["D"]}, {"id": "092e01d4dd", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Wie gewinnt Stereo-Vision (2 Kameras) eine Tiefeninformation?", "options": [{"l": "A", "t": "Aus der Disparität (Triangulation) zwischen den beiden Kamerabildern – passiv, ohne eigenen Emitter."}, {"l": "B", "t": "Durch das aktive Aussenden gepulster Laserstrahlen und die Messung der Signal-Laufzeit."}, {"l": "C", "t": "Aus der von beiden Kameras unabhängig gemessenen absoluten GNSS-Höhe."}, {"l": "D", "t": "Aus dem gemessenen Luftdruckunterschied zwischen den beiden räumlich getrennten Kamerapositionen."}], "correct": ["A"]}, {"id": "5c0921787f", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Welcher Vorteil zeichnet LiDAR gegenüber Stereo-Vision aus?", "options": [{"l": "A", "t": "Es benötigt keine Energie."}, {"l": "B", "t": "Es liefert direkte, metrische Entfernungsmessungen (Punktwolke) und funktioniert auch in Dunkelheit."}, {"l": "C", "t": "Es funktioniert nur bei hellem Tageslicht."}, {"l": "D", "t": "Es ist immer leichter und billiger."}], "correct": ["B"]}, {"id": "ef3708b084", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Welche Sensorik nennt der Kurs für die reine Orientierungsregelung (Orientation Control)?", "options": [{"l": "A", "t": "Kamera + Mikrofon."}, {"l": "B", "t": "Barometer + Laser."}, {"l": "C", "t": "3D-Gyroskop + 3D-Accelerometer."}, {"l": "D", "t": "Nur GNSS."}], "correct": ["C"]}, {"id": "e082cc89ca", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Welche Sensoren nennt der Kurs typischerweise für die Höhenregelung (Height Control)?", "options": [{"l": "A", "t": "Barometer + Distanzsensoren (Ultraschall/Infrarot/Laser)."}, {"l": "B", "t": "Nur die nach vorn gerichtete Kamera, deren Bildauswertung laut Kurs allein die Höhenregelung übernimmt."}, {"l": "C", "t": "Nur das Magnetometer, dessen Kursdaten laut Kurs allein für die vollständige Höhenregelung ausreichen."}, {"l": "D", "t": "Nur das GNSS, dessen vertikale Genauigkeit laut Kurs allein für eine präzise Höhenregelung genügt."}], "correct": ["A"]}, {"id": "e470839252", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Welche Sensorik empfiehlt der Kurs für die Indoor-Navigation ohne GNSS?", "options": [{"l": "A", "t": "Nur das Barometer."}, {"l": "B", "t": "Optical Flow/VIO und Distanzsensoren (inkl. SLAM)."}, {"l": "C", "t": "Nur den Kompass."}, {"l": "D", "t": "Ein kompaktes Wetterradar, das die Bodendistanz aus der Rückstreuung von Regentropfen ableitet."}], "correct": ["B"]}, {"id": "556ef9ea15", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Welche Kerninformationen benötigt ein UAV n, indem sie hochfrequentes mechanisches Rauschen (z. B. durch Motorvibrationen) herausfiltern, bevor die Signale die Regelung stören."}, {"l": "C", "t": "Sie blockieren tief fliegende, fremde Drohnen auf dem Radar."}, {"l": "D", "t": "Sie drosseln die maximale Flughöhe auf 120 Meter."}], "correct": ["B"]}, {"id": "cd231724a4", "ex": "uav", "cat": "Autopiloten & Flugmodi", "q": "Was passiert typischerweise mit dem Flugverhalten, wenn der \"P-Gain\" (Proportional-Wert) in einem PID-Regler der Drohne viel zu hoch eingestellt ist?", "options": [{"l": "A", "t": "Der Akku lädt sich durch Rekuperation wieder auf."}, {"l": "B", "t": "Die Motoren schalten sich im Flug aus."}, {"l": "C", "t": "Die Drohne überkorrigiert massiv, schwingt über das Ziel hinaus und beginnt hochfrequent zu oszillieren (zu \"wackeln\" oder zu \"zittern\")."}, {"l": "D", "t": "Die Drohne reagiert extrem träge und steuert gar nicht mehr gegen."}], "correct": ["C"]}, {"id": "9214d2e1be", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Warum benötigt ein Drohnen-Autopilot zwingend Daten von einem GNSS-Empfänger (GPS), obwohl die IMU Bewegungen viel schneller messen kann?", "options": [{"l": "A", "t": "Ausschließlich um aktiv Hindernissen im unmittelbaren Flugpfad auszuweichen"}, {"l": "B", "t": "Weil die verbaute IMU konstruktionsbedingt ausschließlich im Dunkeln zuverlässig funktioniert"}, {"l": "C", "t": "Um kontinuierlich die Betriebstemperatur der vier Antriebspropeller zu berechnen"}, {"l": "D", "t": "Da die winzigen MEMS-Sensoren der IMU über Zeit kleine Messfehler aufsummieren (Drift), wird das absolute, driftfreie Positionssignal des GNSS benötigt, um diese Fehler regelmäßig zu korrigieren."}], "correct": ["D"]}, {"id": "20d9dc3a1f", "ex": "uav", "cat": "Design & Antrieb", "q": "Welche Art von Daten wird bei zivilen Drohnen primär über den \"Telemetry-Link\" an den Piloten übertragen?", "options": [{"l": "A", "t": "Echtzeit-Statusdaten zur Überwachung der \"Gesundheit\" und Lage des Fluggeräts, wie Akkuspannung, Position, Geschwindigkeit und künstlicher Horizont."}, {"l": "B", "t": "Musik-Audiodateien für Drohnen-Lichtshows."}, {"l": "C", "t": "Die manuellen Stick-Eingaben des Piloten (Steuerbefehle)."}, {"l": "D", "t": "Der hochauflösende 4K-Videostream der Payload-Kamera."}], "correct": ["A"]}, {"id": "d1fff0248e", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Was zählt rechtlich gemäß Definition NICHT zur \"Nutzlast\" (Payload) einer Drohne?", "options": [{"l": "A", "t": "Eine zusätzlich montierte Kamera"}, {"l": "B", "t": "Zusätzliche Kommunikationsausrüstung für Videostreams"}, {"l": "C", "t": "Das Flugwerk (Airframe), der Motor und die Propeller"}, {"l": "D", "t": "Abwerfbare Sensoren für Forschung"}], "correct": ["C"]}, {"id": "02d04bbb6c", "ex": "uav", "cat": "Betrieb & Anwendungen", "q": "Wie sind \"beteiligte Personen\" beim Drohnenflug rechtlich definiert?", "options": [{"l": "A", "t": "Die Hersteller der eingesetzten Drohne, unabhängig von ihrer tatsächlichen Anwesenheit vor Ort"}, {"l": "B", "t": "Ausschließlich der Fernpilot selbst, weitere unterstützende Personen zählen rechtlich nicht dazu"}, {"l": "C", "t": "Jeder zufällig vorbeikommende Passant, der den Flug lediglich beobachtet und zuschaut"}, {"l": "D", "t": "Personen, die beim Betrieb des Fluggeräts aktiv assistieren (z. B. Luftraumbeobachtung) und vorher ausführlich eingewiesen (gebrieft) wurden."}], "correct": ["D"]}, {"id": "41d81fb7aa", "ex": "uav", "cat": "Betrieb & Anwendungen", "q": "Ab welcher zu erwartenden kinetischen Aufprallenergie besteht für eine Drohne unter anderem eine verpflichtende Registrierung?", "options": [{"l": "A", "t": "> 80 Joule"}, {"l": "B", "t": "> 250 Joule"}, {"l": "C", "t": "> 150 Joule"}, {"l": "D", "t": "> 10 Joule"}], "correct": ["A"]}, {"id": "b8a265fb51", "ex": "uav", "cat": "Recht & Regulatorik", "q": "In welche offene Unterkategorie (Open Category) fällt typischerweise der Flugbetrieb mit einer Drohne der Klasse C1 (unter 900 g) im Standar exionsfläche) eines handelsüblichen Multicopters?", "options": [{"l": "A", "t": "ca. 5 m²"}, {"l": "B", "t": "ca. 0,12 m²"}, {"l": "C", "t": "ca. 10 m²"}, {"l": "D", "t": "ca. 0,001 m²"}], "correct": ["B"]}, {"id": "af205620b6", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "Welches ist eine wesentliche Limitierung akustischer C-UAS Sensoren (Mikrofone) bei der Drohnenerkennung?", "options": [{"l": "A", "t": "Sie erfassen aufgrund ihres Funktionsprinzips ausschließlich Drohnen, die aktiv Funksignale aussenden."}, {"l": "B", "t": "Sie strahlen selbst akustische Signale ab, die den bemannten Flugverkehr in der Umgebung stören können."}, {"l": "C", "t": "Sie werden massiv durch Hintergrundrauschen (z. B. Straßenverkehr oder Maschinen) gestört und haben nur eine geringe Reichweite von wenigen hundert Metern."}, {"l": "D", "t": "Sie funktionieren konstruktionsbedingt nicht bei Dunkelheit, da ihnen dann die nötige Umgebungshelligkeit fehlt."}], "correct": ["C"]}, {"id": "d0d1f9588e", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Welches physikalische Prinzip nutzen Ultraschall- oder LiDAR-Sensoren typischerweise, um die Distanz zum Boden oder zu Hindernissen zu messen?", "options": [{"l": "A", "t": "Die Analyse von Radioaktivität."}, {"l": "B", "t": "Die Bestimmung des Erdmagnetfelds."}, {"l": "C", "t": "Das Messen von Gravitationskraft-Schwankungen."}, {"l": "D", "t": "Die Laufzeitmessung (Time of Flight / Round-Trip-Time) des ausgesendeten Signals, bis das Echo zurückkehrt."}], "correct": ["D"]}, {"id": "4c90e47e43", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Warum müssen Magnetometer (Kompasse) in Drohnen vor dem Flug oft am Startort durch eine physische Rotation kalibriert werden?", "options": [{"l": "A", "t": "Weil sie das Erdmagnetfeld messen und extrem anfällig für elektromagnetische Störungen (EMI) durch die eigenen Motoren, stromführenden Kabel und lokale metallische Strukturen sind."}, {"l": "B", "t": "Um damit gleichzeitig die optische Linse ohnen stets einen Piloten in Rufweite benötigen."}], "correct": ["A"]}, {"id": "fbcd449bed", "ex": "uav", "cat": "Aerodynamik & Flugmechanik", "q": "(Klausurfrage) Erklären Sie das Prinzip des \"Froude Scaling\" im Kontext von UAVs. Warum sind kleine Drohnen oft so viel agiler als bemannte Flugzeuge?", "options": [{"l": "A", "t": "Weil das GPS-Modul bei kleineren Drohnen grundsätzlich schneller ein Satellitensignal empfängt"}, {"l": "B", "t": "Weil kleine Drohnen den Doppler-Effekt bei der Signalverarbeitung vollständig ignorieren können"}, {"l": "C", "t": "Weil ihre Masse (Gewicht) mit der dritten Potenz (L³) des Skalierungsfaktors abnimmt, das Trägheitsmoment sogar mit der fünften (L⁵). Bei halber Größe wiegt die Drohne also nur noch ein Achtel, was zu einer extrem schnellen dynamischen Reaktionszeit führt."}, {"l": "D", "t": "Weil kleine Drohnen serienmäßig deutlich stärkere Benzinmotoren im Verhältnis zu ihrem Gewicht verbaut haben"}], "correct": ["C"]}, {"id": "60b2a3fde0", "ex": "uav", "cat": "Aerodynamik & Flugmechanik", "q": "(Klausurfrage) Sie sollen eine Drohne für den Einsatz im Himalaya-Gebirge auf über 5.500 m Höhe konstruieren. Welche große technische Herausforderung müssen Sie dabei zwingend berücksichtigen?", "options": [{"l": "A", "t": "Durch die extrem geringe Luftdichte in dieser Höhe muss die Propellerfläche oder die Motordrehzahl massiv erhöht werden, um ausreichend aerodynamischen Auftrieb zu erzeugen. Zudem setzen die extremen Minusgrade der Batterie zu."}, {"l": "B", "t": "Drohnen fallen ab dieser Flughöhe automatisch in die militärische NATO-Gruppe 5"}, {"l": "C", "t": "In dieser extremen Höhe steht grundsätzlich kein GPS-Empfang mehr zur Verfügung"}, {"l": "D", "t": "Störungen durch fremde, in dieser Bergregion stationierte militärische Radarsysteme"}], "correct": ["A"]}, {"id": "a413e9924a", "ex": "uav", "cat": "Sensorik & Navigation", "q": "(Klausurfrage) Ein UAV soll autonom in einem Indoor-Kraftwerkareal fliegen. Welche Gefahr ist dort tisch scharf auf das Hauptmotiv"}, {"l": "D", "t": "Die Fernbedienung verbindet sich in diesem Schritt mit dem lokalen WLAN-Netzwerk"}], "correct": ["B"]}, {"id": "db6d29ba68", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Warum nutzt man bei Drohnenshows mit Hunderten von beleuchteten Drohnen immer häufiger LiDAR zur Luftraumüberwachung statt klassischem Radar?", "options": [{"l": "A", "t": "Weil LiDAR Radarstrahlung physikalisch absorbiert und dadurch parallel betriebene Radarsysteme funktionsunfähig macht."}, {"l": "B", "t": "Weil LiDAR aufgrund seines schmalen Erfassungswinkels grundsätzlich keine fliegenden Objekte wie Drohnen orten kann."}, {"l": "C", "t": "Weil LiDAR (im Gegensatz zu klassischem Radar oder Akustik) extrem hochauflösend ist und in der Lage ist, individuelle Drohnen innerhalb dichter Schwärme zentimetergenau zu lokalisieren."}, {"l": "D", "t": "Weil LiDAR die Akkus der Drohnen während der Show berührungslos per Laser auflädt und so die Flugzeit verlängert."}], "correct": ["C"]}, {"id": "466f98658b", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Eine kleine Drohne der Klasse C0 (<250g) soll geflogen werden. Welcher Sicherheitsabstand zu unbeteiligten Personen gilt hier in der Unterkategorie A1?", "options": [{"l": "A", "t": "Ein gesetzlich festgeschriebener fixer Mindestabstand von 30 Metern zu jeder unbeteiligten Person."}, {"l": "B", "t": "Ein gesetzlich vorgeschriebener Mindestabstand von 150 Metern, wie er sonst nur in der Unterkategorie A3 gilt."}, {"l": "C", "t": "Ein Abstand von 50 Metern, der nur eingehalten werden muss, sofern zusätzlich ein langsamer Flugmodus aktiviert ist."}, {"l": "D", "t": "Es gibt keinen fest definierten Mindestabstand; der Überflug von Unbeteiligten sollte vermieden werden, ist aber notfalls zulässig. Menschenansammlungen dürfen jedoch niemals überflogen werden."}], "correct": ["D"]}, {"id": "d27b40de6b", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Wie berechnet sich beim \"1:1-Regel\" Verfahren (oft in A2 relevant) der notwendige Abstand zu Personen bei z.B. 45 Metern Flughöhe?", "options": [{"l": "A", "t": "1 Meter Flughöhe entspricht 1 Meter horizontalem Abstand. Bei 45 Metern Flughöhe müssen also mindestens 45 Meter horizontaler Abstand zu unbeteiligten Personen eingehalten werden."}, {"l": "B", "t": "45 Meter Flughöhe + 50 Meter Puffer = 95 Meter Abstand."}, {"l": "C", "t": "Der Abstand ist pauschal immer 50 Meter, unabhängig von der Höhe."}, {"l": "D", "t": "Die Flughöhe wird durch 2 geteilt = 22,5 Meter Abstand."}], "correct": ["A"]}, {"id": "5177c8a374", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Ist der Betrieb außerhalb der direkten visuellen Sichtweite (BVLOS) in der Unterkategorie A3 der \"Offenen\" Klasse erlaubt?", "options": [{"l": "A", "t": "Ja, aber ausschließlich bei Nachtflügen."}, {"l": "B", "t": "Nein, in der gesamten \"Offenen\" Kategorie ist ausschließlich der Betrieb auf direkte Sicht (VLOS) zulässig."}, {"l": "C", "t": "Ja, vorausgesetzt die Drohne wiegt weniger als 25 kg."}, {"l": "D", "t": "Ja, aber nur mit einem zusätzlichen Luftraumbeobachter (Spotter)."}], "correct": ["B"]}, {"id": "7a77aa63c1", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Welches der folgenden Kriterien führt zwingend dazu, dass man sich als UAS-Betreiber beim LBA registrieren muss, selbst wenn die Drohne unter 250 g wiegt?", "options": [{"l": "A", "t": "Die Drohne fliegt schneller als 5 m/s, was laut EU-Richtlinie automatisch eine Registrierungspflicht auslöst."}, {"l": "B", "t": "Die Drohne verfügt über mehr als vier Rotoren, was unabhängig vom Gewicht als registrierungspflichtiges Merkmal gilt."}, {"l": "C", "t": "Die Drohne ist mit einem Sensor zur Aufzeichnung persönlicher Daten (z. B. Kamera oder Mikrofon) ausgestattet und gilt nicht als reines Spielzeug nach EU-Richtlinie."}, {"l": "D", "t": "Die Drohne wird über 50 Meter hoch geflogen, was ab dieser Höhe grundsätzlich eine Registrierung erfordert."}], "correct": ["C"]}, {"id": "dbf3a229e9", "ex": , "t": "Sie ermöglichen eine hohe Wiederholbarkeit und 24/7 Remote Operations für automatisierte Inspektionen, da die Drohne wettergeschützt vor Ort lebt und sich im Dock selbst lädt."}], "correct": ["D"]}, {"id": "83f410f87b", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(Luftrecht) Wer legt sogenannte \"geografische UAS-Zonen\" (Geozones) fest, die den Drohnenflug lokal einschränken oder verbieten?", "options": [{"l": "A", "t": "Die zuständige (nationale/lokale) Luftfahrtbehörde."}, {"l": "B", "t": "Der Drohnenhersteller über die App."}, {"l": "C", "t": "Jeder Grundstückseigentümer selbstständig."}, {"l": "D", "t": "Die Europäische Flugsicherheitsagentur (EASA) pauschal für ganz Europa."}], "correct": ["A"]}, {"id": "843854bbae", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Was ist ein wesentlicher Nachteil von satellitengestützten Navigationssystemen (GNSS) an Bord einer Drohne, obwohl sie günstig und leicht sind?", "options": [{"l": "A", "t": "Sie funktionieren nur bei absoluter Dunkelheit."}, {"l": "B", "t": "Sie sind sehr anfällig für Störsender (Jamming) und Manipulation (Spoofing)."}, {"l": "C", "t": "Sie verbrauchen mehr Strom als die Motoren."}, {"l": "D", "t": "Sie müssen vor jedem Flug mechanisch kalibriert werden."}], "correct": ["B"]}, {"id": "c46706e92a", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Wie ist ein \"Unmanned Aircraft System\" (UAS) luftrechtlich präzise definiert?", "options": [{"l": "A", "t": "Nur autonome Drohnen, die ohne Pilot fliegen."}, {"l": "B", "t": "Jede fliegende Kamera."}, {"l": "C", "t": "Das unbemannte Luftfahrzeug (die Drohne) inklusive der gesamten Ausrüstung für dessen Fernsteuerung."}, {"l": "D", "t": "Ausschließlich die fliegende Hardware selbst."}], "correct": ["C"]}, {"id": "510253b80a", "ex": "uav", "cat": "Aerodynamik & Flugmechanik", "q": "Eine Wetterstation meldet eine Bodensichtweite (Ground Visibility / GV) von 6 km. Wie hoch ist die theoretische Erkennungsreichweite (DLOS) für fremde Luftfahrzeug
