<style>
 :root{
  --bg:#edf3fa; --card:#ffffff; --inset:#f3f8fd;
  --ink:#17324e; --mut:#61758c; --line:#dbe6f2;
  --acc:#1f6fe0; --acc-soft:#e4eefc;
  --warm:#f6a821; --warm-soft:#fdf1dc;
  --good:#189653; --good-bg:#e5f6ec;
  --bad:#df4f4a; --bad-bg:#fdecea;
  --shadow:0 6px 20px rgba(23,51,80,.08);
  --nav:rgba(255,255,255,.92); --top:rgba(237,243,250,.92);
 }
 :root[data-theme="dark"]{
  --bg:#0d1726; --card:#16233a; --inset:#0f1b2e;
  --ink:#e9f1fa; --mut:#93a7bf; --line:#263c5c;
  --acc:#5aa2ff; --acc-soft:#1b3050;
  --warm:#f5b23e; --warm-soft:#3a2d13;
  --good:#3ecf7a; --good-bg:#14331f;
  --bad:#ef6a64; --bad-bg:#3a1b1b;
  --shadow:0 6px 20px rgba(0,0,0,.35);
  --nav:rgba(15,25,42,.92); --top:rgba(13,23,38,.92);
 }
 @media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
   --bg:#0d1726; --card:#16233a; --inset:#0f1b2e;
   --ink:#e9f1fa; --mut:#93a7bf; --line:#263c5c;
   --acc:#5aa2ff; --acc-soft:#1b3050;
   --warm:#f5b23e; --warm-soft:#3a2d13;
   --good:#3ecf7a; --good-bg:#14331f;
   --bad:#ef6a64; --bad-bg:#3a1b1b;
   --shadow:0 6px 20px rgba(0,0,0,.35);
   --nav:rgba(15,25,42,.92); --top:rgba(13,23,38,.92);
  }
 }
 *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
 html,body{margin:0}
 body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.55;-webkit-text-size-adjust:100%}
 .disp{font-family:ui-rounded,"SF Pro Rounded",-apple-system,"Segoe UI",system-ui,sans-serif}
 :focus-visible{outline:2.5px solid var(--acc);outline-offset:2px;border-radius:8px}
 .app{max-width:720px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

 .stickytop{position:sticky;top:0;z-index:6;background:var(--top);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
 .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:calc(env(safe-area-inset-top) + 12px) 16px 6px}
 .tt{font-weight:800;font-size:1.15rem;letter-spacing:.01em}
 .right{display:flex;align-items:center;gap:8px}
 .chip{background:var(--card);border:1px solid var(--line);border-radius:99px;padding:5px 12px;font-size:.78rem;color:var(--mut);font-variant-numeric:tabular-nums;box-shadow:var(--shadow)}
 .chip b{color:var(--ink)}
 .iconbtn{background:var(--card);border:1px solid var(--line);border-radius:99px;width:36px;height:36px;font-size:1rem;cursor:pointer;box-shadow:var(--shadow)}
 .controls{display:flex;gap:8px;align-items:stretch;padding:8px 16px 12px}
 select{flex:1;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:13px;padding:11px 12px;font:inherit;font-size:.95rem;box-shadow:var(--shadow)}
 .ck{display:flex;align-items:center;gap:7px;color:var(--mut);font-size:.88rem;border:1px solid var(--line);background:var(--card);border-radius:13px;padding:10px 13px;white-space:nowrap;cursor:pointer;box-shadow:var(--shadow)}
 .ck input{width:17px;height:17px;accent-color:var(--warm)}

 .content{flex:1;padding:14px 16px calc(env(safe-area-inset-bottom) + 104px)}

 .prog{position:relative;height:10px;background:var(--card);border:1px solid var(--line);border-radius:99px;margin:2px 6px 18px}
 .prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),#6fb2ff);border-radius:99px;width:0;transition:width .3s ease}
 .prog .plane{position:absolute;top:50%;transform:translate(-45%,-58%);font-size:1.05rem;transition:left .3s ease;filter:drop-shadow(0 2px 3px rgba(23,51,80,.25))}

 .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow);animation:rise .3s cubic-bezier(.2,.7,.3,1)}
 @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
 .tag{display:inline-block;font-size:.72rem;letter-spacing:.05em;color:var(--acc);background:var(--acc-soft);border-radius:99px;padding:3px 11px;font-weight:800}
 .catlbl{color:var(--mut);font-size:.78rem;margin-left:8px}
 .star{float:right;cursor:pointer;font-size:1.45rem;line-height:1;color:var(--line);padding:0 2px;margin-top:-2px;background:none;border:none}
 .star.on{color:var(--warm)}
 .q{font-size:1.14rem;font-weight:650;margin:13px 0 15px;text-wrap:balance}

 .opt{position:relative;display:flex;gap:12px;align-items:flex-start;border:1.5px solid var(--line);background:var(--inset);border-radius:15px;padding:13px 14px;margin:10px 0;cursor:pointer;transition:border-color .13s,background .13s,transform .08s;touch-action:manipulation}
 .opt:active{transform:scale(.985)}
 .opt .k{width:27px;height:27px;border-radius:50%;background:var(--acc-soft);color:var(--acc);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;flex:none;margin-top:1px}
 .opt.sel{border-color:var(--acc);background:var(--acc-soft)}
 .opt.sel .k{background:var(--acc);color:#fff}
 .opt.correct{border-color:var(--good);background:var(--good-bg)}
 .opt.correct .k{background:var(--good);color:#fff}
 .opt.wrong{border-color:var(--bad);background:var(--bad-bg)}
 .opt.wrong .k{background:var(--bad);color:#fff}
 .opt input{position:absolute;opacity:0;pointer-events:none}
 .opt:focus-within{outline:2.5px solid var(--acc);outline-offset:2px}

 .fb{margin-top:14px;padding:13px 15px;border-radius:14px;font-size:.97rem;display:none}
 .fb.show{display:block}
 .fb.ok{background:var(--good-bg);border:1px solid var(--good)}
 .fb.no{background:var(--bad-bg);border:1px solid var(--bad)}
 .fb .cor{display:block;margin-top:5px;color:var(--mut);font-size:.9rem}

 .actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;align-items:center}
 .btn{background:var(--acc);color:#fff;border:none;border-radius:14px;padding:14px 21px;font-weight:750;cursor:pointer;font:inherit;font-size:1rem;touch-action:manipulation;transition:transform .08s,filter .12s;box-shadow:0 4px 12px rgba(31,111,224,.28)}
 .btn:active{transform:scale(.97)}
 .btn.sec{background:var(--card);color:var(--ink);border:1.5px solid var(--line);box-shadow:var(--shadow)}
 .btn.sm{padding:10px 15px;font-size:.9rem}
 .cnt{margin-left:auto;align-self:center;color:var(--mut);font-size:.85rem;font-variant-numeric:tabular-nums}

 .flip{min-height:185px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:1.18rem;padding:22px 10px;text-wrap:balance}
 .flip .ans{color:var(--good);font-weight:700}
 .flip .qq{color:var(--mut);font-size:.86rem;margin-bottom:10px}

 .big{font-size:2.8rem;font-weight:800;color:var(--acc);font-variant-numeric:tabular-nums}
 .emo{font-size:2.2rem;margin-bottom:4px}
 .msg{font-weight:700;font-size:1.05rem;margin-top:2px}
 .center{text-align:center}

 .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
 .kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;text-align:center;box-shadow:var(--shadow)}
 .kpi .n{font-size:1.55rem;font-weight:800;color:var(--acc);font-variant-numeric:tabular-nums}
 .kpi .l{color:var(--mut);font-size:.78rem;margin-top:3px}
 .row{display:flex;align-items:center;gap:10px;margin:9px 0}
 .row .nm{width:92px;font-size:.82rem;color:var(--mut)}
 .mini{flex:1;height:10px;background:var(--inset);border:1px solid var(--line);border-radius:99px;overflow:hidden}
 .mini>i{display:block;height:100%;background:linear-gradient(90deg,var(--good),#5fd98f);border-radius:99px}
 .rev{border-top:1px solid var(--line);padding:12px 0;font-size:.92rem}
 .rev .yq{font-weight:650}.rev .rc{color:var(--good)}.rev .rw{color:var(--bad)}

 .boxwrap{display:flex;gap:7px;margin:0 0 14px}
 .boxwrap .b{flex:1;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 4px;box-shadow:var(--shadow)}
 .boxwrap .b .n{font-weight:800;color:var(--acc);font-size:1.05rem;font-variant-numeric:tabular-nums}
 .boxwrap .b.m .n{color:var(--good)}
 .boxwrap .b .l{font-size:.66rem;color:var(--mut)}

 .hidden{display:none}
 .foot{color:var(--mut);font-size:.74rem;text-align:center;padding:2px 14px 8px}

 .nav{position:fixed;left:0;right:0;bottom:0;z-index:10;background:var(--nav);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
 .nav .inner{max-width:720px;margin:0 auto;display:flex}
 .nav button{flex:1;background:none;border:none;color:var(--mut);padding:8px 2px 8px;cursor:pointer;font:inherit;font-size:.66rem;font-weight:650;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation}
 .nav button .ic{font-size:1.3rem;line-height:1.25;padding:3px 14px;border-radius:12px;transition:background .15s}
 .nav button.active{color:var(--acc)}
 .nav button.active .ic{background:var(--acc-soft)}

 /* Glossar / Begriffshilfe */
 .gloss{margin-top:14px;border:1px solid var(--line);border-radius:14px;background:var(--inset);overflow:hidden}
 .gloss>summary{list-style:none;cursor:pointer;padding:11px 14px;font-size:.9rem;font-weight:650;color:var(--acc);display:flex;align-items:center;gap:8px;user-select:none}
 .gloss>summary::-webkit-details-marker{display:none}
 .gloss>summary .chev{margin-left:auto;transition:transform .2s;color:var(--mut);font-size:.8rem}
 .gloss[open]>summary .chev{transform:rotate(180deg)}
 .gloss[open]>summary{border-bottom:1px solid var(--line)}
 .glossbody{padding:6px 14px 12px}
 .gterm{padding:9px 0;border-bottom:1px solid var(--line)}
 .gterm:last-child{border-bottom:none}
 .gterm .gk{font-weight:750;color:var(--ink);font-size:.92rem}
 .gterm .gd{color:var(--mut);font-size:.88rem;margin-top:2px;line-height:1.5}

 /* Zurück-Button + Fälligkeits-Badge */
 .btn.gho{background:transparent;color:var(--mut);border:1.5px solid var(--line);box-shadow:none;padding:14px 16px}
 .due{display:inline-block;background:var(--warm-soft);color:var(--warm);border-radius:99px;padding:3px 10px;font-size:.76rem;font-weight:700;font-variant-numeric:tabular-nums}
 .boxwrap .b.due{outline:2px solid var(--warm)}

 @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style></head>

en, Zulassung & Zertifizierung", "q": "Welche internationale UN-Organisation veröffentlicht die weltweiten \"Standards and Recommended Practices\" (SARPs), wie etwa den Annex 10 für Telekommunikation?", "options": [{"l": "A", "t": "Die EASA (European Union Aviation Safety Agency)"}, {"l": "B", "t": "Die FAA (Federal Aviation Administration)"}, {"l": "C", "t": "Die ICAO (International Civil Aviation Organization)"}, {"l": "D", "t": "Die RTCA (Radio Technical Commission for Aeronautics)"}], "correct": ["C"]}, {"id": "524ea0299c", "cat": "Normen, Zulassung & Zertifizierung", "q": "Wofür sind die Standards RTCA DO-160F bzw. EUROCAE ED-14F maßgeblich?", "options": [{"l": "A", "t": "Sie regeln die maximal zulässigen Arbeitszeiten der Cockpit-Crew."}, {"l": "B", "t": "Sie definieren Mindestanforderungen und Testverfahren für Umweltbedingungen (z.B. Temperatur, Vibration, Blitzschlag), denen luftfahrttechnische Ausrüstung standhalten muss."}, {"l": "C", "t": "Sie standardisieren die Kommunikationssprache im Cockpit."}, {"l": "D", "t": "Sie legen fest, welche Programmiersprache für Software verwendet werden darf."}], "correct": ["B"]}, {"id": "79ef973f6e", "cat": "Normen, Zulassung & Zertifizierung", "q": "Warum wird im Avionik-Zertifizierungsprozess ein \"proaktiver\" Ansatz zwingend empfohlen?", "options": [{"l": "A", "t": "Damit das Flugzeug am Ende eine höhere Reisegeschwindigkeit erreicht."}, {"l": "B", "t": "Weil eine nachträgliche, rein reaktive Anpassung eines bereits fertigen Systems an behördliche Sicherheitsanforderungen unweigerlich zu exponentiell steigenden Kosten und Projektverzögerungen führt."}, {"l": "C", "t": "Damit die Piloten für den neuen Typ weniger geschult werden müssen."}, {"l": "D", "t": "Weil alle Nachweise ausschließlich durch reale Flugtests und niemals durch Analysen oder Simulationen erbracht werden dürfen."}], "correct": ["B"]}, {"id": "26f81ca65d", "cat": "Fly-by-Wire & Flugsteuerung", "q": "Welche Aufgabe erfüllt die \"Artificial Feel Unit\ f-Sinkflug (Continuous Descent) übergehen sollte."}, {"l": "C", "t": "Es ist der späteste Zeitpunkt zum Ausfahren der Landeklappen."}, {"l": "D", "t": "Es ist der Punkt, an dem das Flugzeug auf der Landebahn aufsetzt."}], "correct": ["B"]}, {"id": "effb65c192", "cat": "Autopilot & Flight Management System", "q": "Welche Sensoren lösen bei einer vollautomatischen CAT IIIb-Landung den Abfangbogen (Flare) und das Reduzieren des Schubs (Retard) aus?", "options": [{"l": "A", "t": "Das optische Kamera-System in der Flugzeugnase."}, {"l": "B", "t": "Die barometrischen Static Ports."}, {"l": "C", "t": "Die Radarhöhenmesser (Radio Altimeter)."}, {"l": "D", "t": "Die Satelliten des GPS-Systems."}], "correct": ["C"]}, {"id": "35f9ecef24", "cat": "Redundanz & Sicherheitsanalyse", "q": "Was bedeutet der Bereitschaftsgrad \"Hot Standby\" bei redundanten Rechnerarchitekturen?", "options": [{"l": "A", "t": "Das Ersatzsystem ist überhitzt und vorübergehend nicht nutzbar."}, {"l": "B", "t": "Das Ersatzsystem ist komplett abgeschaltet und muss bei einem Fehler erst hochfahren."}, {"l": "C", "t": "Das Ersatzsystem ist eingeschaltet, rechnet jedoch keine Daten mit."}, {"l": "D", "t": "Das Ersatzsystem läuft voll parallel mit und garantiert im Fehlerfall eine nahtlose, unbemerkte Übernahme."}], "correct": ["D"]}, {"id": "2fa83098de", "cat": "Redundanz & Sicherheitsanalyse", "q": "Welchen analytischen Weg geht die \"Failure Mode and Effects Analysis\" (FMEA)?", "options": [{"l": "A", "t": "Top-Down (vom Gesamtsystem hin zum Einzelteil)."}, {"l": "B", "t": "Sie bewertet lediglich die Kostenauswirkungen von Fehlern."}, {"l": "C", "t": "Bottom-Up, induktiv: Sie startet beim einzelnen Bauteil, untersucht dessen Fehlermodi und leitet die Auswirkung auf das Gesamtsystem ab."}, {"l": "D", "t": "Sie analysiert ausschließlich menschliche Fehler der Piloten."}], "correct": ["C"]}, {"id": "ac29db0dce", "cat": "FADEC & Triebwerksregelung", "q": "Was bedeutet es, wenn ein System (wie die Triebwerkssteuerung FADEC) \"fail-operational\" ausgelegt ist?", "options": [{"l": "A", "t": "Es geht bei einem Fehler sicherheitsgerichtet in einen abgeschalteten Zustand über."}, {"l": "B", "t": "Es warnt den Piloten durch laute akustische Signale."}, {"l": "C", "t": "Es bleibt auch nach einem Fehler durch sofortiges Umschalten auf einen intakten, redundanten Kanal weiterhin voll funktionsfähig."}, {"l": "D", "t": "Es kann nach einem Fehler nur noch am Boden repariert werden."}], "correct": ["C"]}, {"id": "1a1de6602e", "cat": "Luftdatensensorik (Pitot, AoA, ADC)", "q": "Was erfassen die \"Static Ports\" an der Außenhaut des Rumpfes?", "options": [{"l": "A", "t": "Den dynamischen Staudruck der Anströmung."}, {"l": "B", "t": "Die absolute Außentemperatur in Reiseflughöhe."}, {"l": "C", "t": "Den ungestörten atmosphärischen Luftdruck der Umgebung zur Bestimmung der barometrischen Höhe."}, {"l": "D", "t": "Den Abstand des Flugzeugs zum Boden."}], "correct": ["C"]}, {"id": "7bddab99d3", "cat": "Inertialnavigation & Sensorfusion", "q": "Worin besteht der wesentliche konstruktive Vorteil eines \"Strapdown\"-Trägheitsnavigationssystems (INS) im Vergleich zu historischen Systemen?", "options": [{"l": "A", "t": "Es ist starr (\"strapdown\") mit der Flugzeugstruktur verbunden, wodurch komplexe mechanische Aufhängungen (Kardangelenke) entfallen und das System robuster wird."}, {"l": "B", "t": "Es funktioniert ohne jegliche Elektrizität."}, {"l": "C", "t": "Es misst die Fluglage durch ausfahrbare mechanische Fühler."}, {"l": "D", "t": "Es wird direkt am Sitz des Piloten angeschnallt."}], "correct": ["A"]}, {"id": "48fb9b63c5", "cat": "GNSS & Satellitennavigation", "q": "Wofür steht die Abkürzung RNP im Rahmen der modernen Flugnavigation?", "options": [{"l": "A", "t": "Radar Network Protocol"}, {"l": "B", "t": "Required Navigation Performance"}, {"l": "C", "t": "Regional Network Positioning"}, {"l": "D", "t": "Radio Navigation Pulse"}], "correct": ["B"]}, {"id": "89681751eb", "cat": "GNSS & Satellitennavigation", "q": "Welchen Zweck erfüllen Augmentierungssysteme wie SBAS in der Satellitennavigation?", "options": [{"l": "A", "t": "Sie dienen der reinen Passagierunterhaltung (Live-TV)."}, {"l": "B", "t": "Sie leiten Funksprüche über den Ozean weiter."}, {"l": "C", "t": "Sie übertragen Korrekturdaten über geostationäre Satelliten, um die GPS-Positionsgenauigkeit und Integrität so weit zu verbessern, dass Präzisionsanflüge (LPV-200) möglich werden."}, {"l": "D", "t": "Sie blockieren fremde Radarsignale."}], "correct": ["C"]}, {"id": "f1edc9bf24", "cat": "Überwachung (Radar, ADS-B, TCAS)", "q": "Auf welchem technischen Prinzip basiert die Überwachung durch Multilateration (MLAT)?", "options": [{"l": "A", "t": "Auf aktiven Radar-Mikrowellenimpulsen, die von den Wolken abprallen."}, {"l": "B", "t": "Auf der Bestimmung des Zeitunterschieds (TDOA), mit dem ein Transpondersignal an mehreren, räumlich verteilten Bodenempfängern eintrifft."}, {"l": "C", "t": "Auf der optischen Erkennung durch Satelliten."}, {"l": "D", "t": "Auf der Peilung des Erdmagnetfeldes."}], "correct": ["B"]}, {"id": "8099a0111c", "cat": "GNSS & Satellitennavigation", "q": "Was bewertet der ganzheitliche Leistungsrahmen \"RTSP\" (Required Total System Performance)?", "options": [{"l": "A", "t": "Ausschließlich die Zuverlässigkeit der Triebwerke."}, {"l": "B", "t": "Die Belastbarkeit der Flugzeughülle."}, {"l": "C", "t": "Die kombinierte Systemgüte aus Navigation (RNP), Kommunikation (RCP) und Überwachung (RSP) nach identischen Metriken."}, {"l": "D", "t": "Den finanziellen Gewinn einer Fluggesellschaft."}], "correct": ["C"]}, {"id": "c5f49f0dfb", "cat": "Energieversorgung & Bordnetze", "q": "Welche Aufgabe erfüllt die Auxiliary Power Unit (APU) während des Reiseflugs?", "options": [{"l": "A", "t": "Sie treibt das Bugfahrwerk an."}, {"l": "B", "t": "Sie erzeugt zusätzlichen Vorwärtsschub, um Kerosin zu sparen."}, {"l": "C", "t": "Sie arbeitet als Backup-Generator und wird automatisch zugeschaltet, um bei Ausfall eines Triebwerksgenerators die elektrische Last zu übernehmen."}, {"l": "D", "t": "Sie übernimmt die Kühlung der Flugzeugaußenhaut."}], "correct": ["C"]}, {"id": "2ef3056b12", "cat": "Energieversorgung & Bordnetze", "q": "Wie unterscheidet sich die primäre Energieerzeugung in einem \"More Electric Aircraft\" (MEA, z. B. B787) von der einer klassischen A320?", "options": [{"l": "A", "t": "Ein MEA nutzt ausschließlich Windkraftturbinen."}, {"l": "B", "t": "In einem MEA ist der primäre Generator ein Gleichstromgenerator (DC), dessen Energie erst im zweiten Schritt über Wechselrichter in Wechselstrom (AC) gewandelt wird."}, {"l": "C", "t": "Es gibt in einem MEA überhaupt keine Generatoren mehr, sondern nur noch Batterien."}, {"l": "D", "t": "MEA arbeitet primär mit 12-Volt-Solarstrom."}], "correct": ["B"]}, {"id": "1bd24d3ef9", "cat": "Energieversorgung & Bordnetze", "q": "Wozu dient ein \"Bus Tie Breaker\" (BTB) in der elektrischen Verteilungslogik?", "options": [{"l": "A", "t": "Er trennt als Schutzschalter den Generator sofort vom Netz, sobald Überstrom oder Unterspannung auftreten."}, {"l": "B", "t": "Er wandelt Hochspannung in Niederspannung um."}, {"l": "C", "t": "Er ist ein normalerweise offener Schalter, der sich bei einem Generatorausfall schließt, damit der intakte Generator auf der anderen Seite beide Stromschienen (Busse) versorgen kann."}, {"l": "D", "t": "Er trennt bei einem Brand sofort die gesamte Elektronik."}], "correct": ["C"]}, {"id": "10a208c9cf", "cat": "Datenbusse & Avionik-Architektur", "q": "Für welche spezifischen Anwendungen wurde der CAN-Bus (ARINC 825) in der Flugzeugelektronik adaptiert?", "options": [{"l": "A", "t": "Als hochredundantes Gigabit-Backbone für die gesamte primäre Flugsteuerung."}, {"l": "B", "t": "Als primäres Netzwerk für die Übertragung der zeitkritischen Fly-by-Wire-Steuerbefehle."}, {"l": "C", "t": "Als robuster Kommunikationsbus für lokale, dezentrale Sub- und Hilfssysteme (z.B. Batterieüberwachung, APU-Controller, Pumpen)."}, {"l": "D", "t": "Für die analoge Sprachkommunikation mit dem Tower."}], "correct": ["C"]}, {"id": "dfe4a38bf6", "cat": "Datenbusse & Avionik-Architektur", "q": "Welches Konstruktionsziel verfolgt die \"Integrated Modular Avionics\" (IMA) Architektur?", "options": [{"l": "A", "t": "Sie beschreibt das deterministische Netzwerkprotokoll, über das Flugsteuerungsdaten mit garantierter Bandbreite übertragen werden (wie AFDX)."}, {"l": "B", "t": "Sie bündelt unterschiedliche Software-Applikationen auf wenigen gemeinsamen Hochleistungsrechnern (CPMs) und partitioniert diese streng, anstatt für jede Funktion ein eigenes Gehäuse vorzuhalten."}, {"l": "C", "t": "Jede Funktion erhält weiterhin eine eigene, isolierte Hardwarebox (LRU), die per ARINC 429 verkabelt wird."}, {"l": "D", "t": "Sie ersetzt digitale Flugcomputer durch rein mechanische Instrumente."}], "correct": ["B"]}, {"id": "bc74317724", "cat": "Normen, Zulassung & Zertifizierung", "q": "Welche Avionik-Komponenten werden anhand des Standards \"DO-254\" zertifiziert?", "options": [{"l": "A", "t": "Triebwerkskompressoren"}, {"l": "B", "t": "Fahrwerksreifen"}, {"l": "C", "t": "Sicherheitskritische Hardware (wie elektronische Schaltkreise und Platinen)"}, {"l": "D", "t": "Der Softwarecode der Flugmanagement-Systeme"}], "correct": ["C"]}, {"id": "0c91d450d7", "cat": "Normen, Zulassung & Zertifizierung", "q": "Was verbirgt sich in der Luftfahrtindustrie hinter der Norm DIN EN 9100?", "options": [{"l": "A", "t": "Eine genaue Definition für Kerosin-Mischverhältnisse."}, {"l": "B", "t": "Ein branchenspezifisches Qualitätsmanagementsystem für Luft-, Raumfahrt und Verteidigung, das harte Anforderungen an Prozesse, Dokumentation und Risikomanagement stellt."}, {"l": "C", "t": "Eine rein freiwillige Marketing-Richtlinie ohne Bezug zu Audits oder Zulassungsbehörden."}, {"l": "D", "t": "Ein Gesetz zur Lärmbegrenzung an Flughäfen."}], "correct": ["B"]}]</script>
<script>
const ALL=JSON.parse(document.getElementById('data').textContent);
const CATS=["FADEC & Triebwerksregelung", "Fly-by-Wire & Flugsteuerung", "Autopilot & Flight Management System", "Autonomie, KI & Human Factors", "Redundanz & Sicherheitsanalyse", "Luftdatensensorik (Pitot, AoA, ADC)", "Inertialnavigation & Sensorfusion", "Funknavigation & Höhenmessung", "GNSS & Satellitennavigation", "Kommunikation (Funk & Datalink)", "Überwachung (Radar, ADS-B, TCAS)", "Normen, Zulassung & Zertifizierung", "Energieversorgung & Bordnetze", "Datenbusse & Avionik-Architektur", "Avionik Grundlagen"];const GLOSSARY={"FBW": "Fly-by-Wire – elektronische Flugsteuerung: Piloteneingaben gehen als elektrische Signale an Rechner, die die Steuerflächen bewegen (keine mechanische Verbindung).", "Fly-by-Wire": "Elektronische Flugsteuerung ohne mechanische Verbindung zwischen Steuerorgan und Ruder; Signale laufen über Flugsteuerungsrechner.", "FCC": "Flight Control Computer – Flugsteuerungsrechner, der Piloteneingaben in Steuerbefehle umsetzt und die Flugbereichsgrenzen überwacht.", "FCPC": "Flight Control Primary Computer – primärer Flugsteuerungsrechner im Fly-by-Wire-System (Airbus).", "Normal Law": "Normaler Fly-by-Wire-Modus mit vollem Flugbereichsschutz (Hard Limits); der Computer verhindert kritische Fluglagen.", "Alternate Law": "Degradierter FBW-Modus nach Sensor-/Rechnerausfällen: reduzierter Schutz, einige Envelope Protections entfallen.", "Direct Law": "Stärkste FBW-Degradation: Steuereingaben gehen direkt und ungefiltert an die Ruder, keine Schutzfunktionen mehr.", "Envelope Protection": "Flugbereichsschutz – automatische Begrenzung, die verhindert, dass das Flugzeug kritische Zustände (z. B. Strömungsabriss, Überlast) erreicht.", "Hard Limit": "Absolute, vom Piloten nicht überschreitbare Systemgrenze (Airbus Normal Law).", "Soft Limit": "Grenze, die der Pilot mit erhöhtem Kraftaufwand bewusst überschreiten kann (Boeing-Philosophie).", "SAS": "Stability Augmentation System – dämpft automatisch Eigenschwingungen (z. B. Phugoide) und entlastet den Piloten.", "Artificial Feel": "Künstliches Steuergefühl: Feder-Dämpfer-System erzeugt eine Gegenkraft am Sidestick, da bei FBW die echte Rückmeldung der Luftkräfte fehlt.", "Inceptor": "Elektronisches Steuerorgan im Cockpit (z. B. Sidestick), das den Steuerwunsch rein elektrisch erfasst.", "EHA": "Elektrohydrostatischer Aktuator – erzeugt die Stellkraft lokal aus Strom über eine eigene kleine Hydraulikpumpe (Power-by-Wire).", "EMA": "Elektromechanischer Aktuator – bewegt die Steuerfläche rein mechanisch (Motor + Spindel), ganz ohne Hydraulikflüssigkeit.", "Power-by-Wire": "Konzept, bei dem die Stellkraft erst lokal am Aktuator aus elektrischem Strom erzeugt wird, statt über zentrale Hydraulikleitungen.", "FMS": "Flight Management System – plant und optimiert die Flugroute (4D-Trajektorie) und speist Vorgaben an den Autopiloten.", "FMC": "Flight Management Computer – der Rechner, der die FMS-Funktionen ausführt.", "MCDU": "Multipurpose Control and Display Unit – Ein-/Ausgabeeinheit im Cockpit zur Bedienung des FMS.", "EFIS": "Electronic Flight Instrument System – elektronische Anzeigebildschirme (PFD/ND) statt analoger Zeigerinstrumente.", "Cost Index": "Kennzahl im FMS, die Zeitkosten gegen Treibstoffkosten gewichtet und daraus die wirtschaftlichste Geschwindigkeit bestimmt.", "Top of Descent": "Vom FMS berechneter Punkt, ab dem der treibstoffoptimale Sinkflug zum Ziel eingeleitet werden sollte.", "Flare": "Abfangbogen kurz vor dem Aufsetzen – bei Autoland durch den Radarhöhenmesser ausgelöst.", "Kalman-Filter": "Rekursiver Schätzer, der ungenaue Messungen (z. B. GPS) und driftende Sensoren (z. B. IRS) optimal zur besten Positionsschätzung fusioniert.", "FORDEC": "Entscheidungsmethode im Cockpit: Facts, Options, Risks, Decision, Execution, Check.", "ALFUS": "Autonomy Levels for Unmanned Systems – Rahmenmodell zur Einordnung von Autonomiegraden (Mission-, Umgebungskomplexität, Human Independence).", "Auto-GCAS": "Automatic Ground Collision Avoidance System – leitet bei drohender Bodenkollision autonom einen Steigflug ein.", "FADEC": "Full Authority Digital Engine Control – digitale Triebwerkssteuerung mit voller Autorität, ohne mechanische Rückfallebene.", "EEC": "Electronic Engine Control – ältere, nur teil-elektronische Triebwerkssteuerung (Vorläufer der FADEC).", "PMG": "Permanentmagnetgenerator – versorgt die FADEC ab einer bestimmten Triebwerksdrehzahl autark mit Strom, unabhängig vom Bordnetz.", "EPR": "Engine Pressure Ratio – Triebwerks-Druckverhältnis, von manchen Herstellern (z. B. Rolls-Royce) als Schub-Regelgröße genutzt.", "N1": "Drehzahl der Fan-/Niederdruckwelle; von GE/PW häufig als Schub-Regelgröße der FADEC genutzt.", "Pitot": "Staudrucksonde: misst den Gesamtdruck (Pt) der frontal anströmenden, im Rohr abgebremsten Luft.", "TAT": "Total Air Temperature – Gesamttemperatur der bis zum Stillstand abgebremsten Luft; höher als SAT wegen kinetischer Aufheizung.", "SAT": "Static Air Temperature – ungestörte statische Außenlufttemperatur.", "IAS": "Indicated Airspeed – angezeigte Fluggeschwindigkeit, direkt aus dem dynamischen Druck (q) abgeleitet.", "TAS": "True Airspeed – wahre Eigengeschwindigkeit gegenüber der Luftmasse, IAS korrigiert um Luftdichte.", "CAS": "Calibrated Airspeed – um Instrumenten-/Einbaufehler korrigierte angezeigte Geschwindigkeit.", "AoA": "Angle of Attack – Anstellwinkel zwischen Profilsehne des Flügels und der Anströmrichtung der Luft.", "ADC": "Air Data Computer – berechnet aus Drücken und Temperatur die Luftdaten (Höhe, IAS, TAS, Mach).", "ADS": "Air Data System – Gesamtsystem der Luftdatenerfassung (Sonden, Ports, ADC).", "ADIRU": "Air Data Inertial Reference Unit – vereint Luftdatenreferenz (ADR) und Trägheitsreferenz (IR) in einem Gerät.", "ADIRS": "Air Data Inertial Reference System – das Gesamtsystem aus mehreren ADIRUs.", "IRS": "Inertial Reference System – Trägheitsnavigation: ermittelt Lage und Position aus Beschleunigungs- und Drehratensensoren, ohne externe Signale.", "INS": "Inertial Navigation System – Trägheitsnavigationssystem (klassische Bezeichnung des IRS).", "IMU": "Inertial Measurement Unit – Sensorblock aus je drei orthogonalen Beschleunigungs- und Drehratensensoren.", "Sagnac": "Sagnac-Effekt: Dreht sich ein optischer Ringkreisel, entsteht eine Frequenzdifferenz zwischen zwei gegenläufigen Lichtstrahlen – Maß für die Drehrate.", "RLG": "Ring Laser Gyro – optischer Drehratensensor, der den Sagnac-Effekt mit Laserstrahlen nutzt (verschleißfrei).", "Schuler": "Schuler-Schwingung: ungedämpfte Fehleroszillation der Trägheitsnavigation mit ca. 84 min Periode, heute meist per GPS gestützt.", "Specific Force": "Spezifische Kraft – das, was ein Beschleunigungssensor misst: Summe aus Bewegungsbeschleunigung und lokaler Gravitation.", "Strapdown": "Bauweise, bei der die Inertialsensoren starr mit der Flugzeugstruktur verbunden sind; die Rotation wird rechnerisch nachgeführt (statt mechanisch kardanisch).", "ILS": "Instrument Landing System – Instrumentenlandesystem aus Localizer (horizontal) und Glide Slope (vertikal).", "Localizer": "ILS-Sender für die horizontale Führung (Landebahn-Mittellinie), im VHF-Band 108–112 MHz.", "Glide Slope": "ILS-Sender für die vertikale Führung (typisch 3° Sinkwinkel), im UHF-Band.", "VOR": "VHF Omnidirectional Range – Funkfeuer, das per Phasenvergleich den magnetischen Kurs (Radial) zur Station liefert.", "DME": "Distance Measuring Equipment – misst die Schrägentfernung zur Bodenstation über die Laufzeit von Impulspaaren.", "NDB": "Non-Directional Beacon – ungerichtetes Funkfeuer; liefert nur die Peilung zur Station, keine Entfernung.", "RADALT": "Radio Altimeter / Radarhöhenmesser – misst per Radar den tatsächlichen Bodenabstand (AGL), unabhängig von Luftdruck und Wetter.", "AGL": "Above Ground Level – Höhe über dem Boden (im Gegensatz zur barometrischen Höhe über Meeresspiegel).", "GPWS": "Ground Proximity Warning System – warnt vor gefährlicher Bodenannäherung.", "EGPWS": "Enhanced GPWS – GPWS mit Geländedaten // --- Glossar / Begriffshilfe ---------------------------------------
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function reEsc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
// Begriffe nach Laenge sortiert (laengste zuerst), damit "ARINC 429" vor "RA" greift.
const GKEYS=Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length);
const GRES=GKEYS.map(k=>({k:k,re:new RegExp('(?:^|[^0-9A-Za-zÄÖÜäöüß])'+reEsc(k)+'(?![0-9A-Za-zÄÖÜäöüß])')}));
function glossFor(q){
 // Sucht Begriffe in Frage + allen Optionen; jede Definition nur einmal.
 const hay=q.q+' '+q.options.map(o=>o.t).join(' ');
 const found=[];const used=new Set();
 for(const g of GRES){if(used.has(g.k))continue;if(g.re.test(hay)){used.add(g.k);found.push(g.k);}}
 return found;
}
function glossHTML(q){
 const terms=glossFor(q);if(!terms.length)return '';
 const body=terms.map(k=>'<div class="gterm"><div class="gk">'+esc(k)+'</div><div class="gd">'+esc(GLOSSARY[k])+'</div></div>').join('');
 return '<details class="gloss"><summary>ℹ️ Begriffe erklären <span style="color:var(--mut);font-weight:600">('+terms.length+')</span><span class="chev">▾</span></summary><div class="glossbody">'+body+'</div></details>';
}

const PKEY='avionik_progress_v2';
let P=load();
function load(){let p;try{p=JSON.parse(localStorage.getItem(PKEY))}catch(e){p=null}
 if(!p)p={cards:{},log:{a:0,c:0}};
 if(!p.streakDaily)p.streakDaily={count:0,last:''};
 if(!p.ui)p.ui={mode:'ueben',cat:'__all',star:false};
 return p}
function save(){try{localStorage.setItem(PKEY,JSON.stringify(P))}catch(e){}}
function cardOf(id){const c=P.cards[id]||(P.cards[id]={box:1,seen:0,correct:0,wrong:0,star:false,last:0,due:0});if(c.due===undefined)c.due=0;return c}
// Spaced Repetition: Intervalle je Box (in Minuten) – auf Klausur-Lernen ausgelegt.
// Box 1 (neu/falsch) ist sofort wieder fällig und kommt in der nächsten Runde zuerst;
// wer eine Karte mehrfach richtig hat, sieht sie mit wachsendem Abstand seltener.
const SR_MIN=[0,0,5,30,120,720]; // Index=Box: 1->sofort, 2->5min, 3->30min, 4->2h, 5->12h
function nextDue(box){return Date.now()+ (SR_MIN[Math.min(5,Math.max(1,box))]||0)*60000}
function isDue(id){return cardOf(id).due<=Date.now()}
function dueCount(p){return p.reduce((n,q)=>n+(isDue(q.id)?1:0),0)}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function addDays(s,delta){const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+delta);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')}
function bumpDailyStreak(){const t=todayStr();if(P.streakDaily.last===t)return;const y=addDays(t,-1);
 P.streakDaily.count=(P.streakDaily.last===y)?(P.streakDaily.count||0)+1:1;P.streakDaily.last=t}
function renderDayStreak(){const t=todayStr(),y=addDays(t,-1);let n=P.streakDaily.count||0;const last=P.streakDaily.last||'';
 if(last!==t&&last!==y)n=0;
 $('daystreak').innerHTML=(n>0?'🔥':'✨')+' <b>'+n+'</b>';
 $('daystreak').title=(n>0?'Serie: '+n+' Tag(e) in Folge geübt':'Heute üben und deine Serie starten!')}
let S={a:0,c:0}; // Sitzungs-Statistik: zaehlt nur seit dem letzten App-Start, nicht dauerhaft gespeichert
function record(id,ok){const c=cardOf(id);c.seen++;ok?c.correct++:c.wrong++;c.box=ok?Math.min(5,(c.box||1)+1):1;c.last=Date.now();c.due=nextDue(c.box);P.log.a++;if(ok)P.log.c++;S.a++;if(ok)S.c++;bumpDailyStreak();save()}
function toggleStar(id){const c=cardOf(id);c.star=!c.star;save();return c.star}

 const m=document.querySelector('meta[name="theme-color"]');if(m)m.content=dark?'#0d1726':'#edf3fa';

// Motivation
let streak=0;
const PRAISE=['Stark! 🎯','Sauber gelandet! 🛬','Genau richtig! ✈️','Weiter so! 🚀','Top! 🌟','Läuft bei dir! 💪','Volltreffer! 🎉'];

const catSel=$('cat');

 CATS.map(c=>{const n=ALL.filter(q=>q.cat===c).length;return '<option value="'+c.replace(/"/g,'&quot;')+'">'+c+' ('+n+')</option>';}).join('');
function pool(){let p=catSel.value==='__all'?ALL:ALL.filter(q=>q.cat===catSel.value);if($('staronly').checked)p=p.filter(q=>cardOf(q.id).star);return p}
function shuffle(a){a=a.slice();for(let j=a.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[a[j],a[k]]=[a[k],a[j]];}return a;}
function topStat(){const m=Object.values(P.cards).filter(c=>c.box>=5).length;

const MODES=[['ueben','Üben','✏️'],['karten','Karten','🗂️'],['test','Test','📝'],['lernen','Lernen','🎯'],['stat','Erfolge','📊']];

function starHTML(id){return '<button class="star '+(cardOf(id).star?'on':'')+'" data-star="'+id+'" aria-label="Karte markieren">★</button>'}
function bindStar(){document.querySelectorAll('[data-star]').forEach(el=>el.onclick=()=>{const on=toggleStar(el.dataset.star);el.classList.toggle('on',on)})}
function progHTML(frac){const p=Math.round(frac*100);return '<div class="prog"><i style="width:'+p+'%"></i><span class="plane" style="left:'+p+'%">✈️</span></div>'}

const ROUND=15;
let uOrder=[],uPos=0,uP=[],ui=0,uPicks=[];
function mUeben(){uOrder=shuffle(pool());uPos=0;if(!uOrder.length)return empty();uNextRound()}
function uNextRound(){uP=uOrder.slice(uPos,Math.min(uPos+ROUND,uOrder.length));uPos+=uP.length;ui=0;uPicks=[];uRender()}
function uCorrectCount(){let n=0;for(let i=0;i<uP.length;i++){if(uPicks[i]&&setEq(uPicks[i],uP[i].correct))n++;}return n}
// Beantwortete Frage wieder in ihren Zustand versetzen (Auswahl + Lösung + Feedback)
function restoreAnswered(q,sel){document.querySelectorAll('input[name=opt]').forEach(inp=>{if(sel.includes(inp.value))inp.checked=true;});markOpts(q,sel);fb(setEq(sel,q.correct),q);}
function uRender(){clearAdv();const q=uP[ui];const answered=uPicks[ui]!==undefined;
 $('main').innerHTML=progHTML(ui/uP.length)+
 '<div class="card"><span class="tag disp">Üben</span><span class="catlbl">'+q.cat+'</span>'+starHTML(q.id)+
 '<div class="q">'+esc(q.q)+'</div><div id="opts"></div>'+glossHTML(q)+'<div class="fb" id="fb"></div>'+
 '<div class="actions">'+
 (ui>0?'<button class="btn gho disp" id="bk">← Zurück</button>':'')+
 '<button class="btn disp'+(answered?' hidden':'')+'" id="ck">Antwort prüfen</button>'+
 '<button class="btn sec disp'+(answered?'':' hidden')+'" id="nx">Weiter →</button>'+
 '<span class="cnt">'+(ui+1)+'/'+uP.length+' · ✓'+uCorrectCount()+'</span></div></div>';
 renderOpts(q);bindStar();
 if($('bk'))$('bk').onclick=uBack;$('ck').onclick=uCheck;$('nx').onclick=uNext;
 if(answered)restoreAnswered(q,uPicks[ui]);}
function uCheck(){const q=uP[ui];const sel=picked();if(!sel.length)return;const ok=setEq(sel,q.correct);
 if(uPicks[ui]===undefined){uPicks[ui]=sel;ok?streak++:streak=0;record(q.id,ok);}
 markOpts(q,sel);fb(ok,q);$('ck').classList.add('hidden');$('nx').classList.remove('hidden');topStat();
 if(ok){clearAdv();advTimer=setTimeout(()=>{advTimer=null;uNext();},1000);}}
function uNext(){ui++;if(ui>=uP.length)return uDone();uRender()}
function uBack(){if(ui>0){ui--;uRender();}}
function uDone(){const good=uCorrectCount();const pct=Math.round(good/uP.length*100);const em=endMsg(pct);const rest=uOrder.length-uPos;
 const wrongQs=uP.filter((q,i)=>!(uPicks[i]&&setEq(uPicks[i],q.correct)));
 $('main').innerHTML='<div class="card center"><div class="emo">'+em[0]+'</div><div class="big">'+pct+'%</div>'+
 '<div class="msg disp">'+em[1]+'</div><div class="cnt" style="margin:4px 0 0">'+good+' von '+uP.length+' richtig'+(rest>0?' · noch '+rest+' Fragen im Thema':'')+'</div>'+
 '<div class="actions" style="justify-content:center;margin-top:16px">'+
 (rest>0?'<button class="btn disp" id="un">Nächste Runde →</button>':'')+
 (wrongQs.length?'<button class="btn sec disp" id="uw">Falsche üben ('+wrongQs.length+')</button>':'')+
 '<button class="btn sec disp" id="ag">Neu mischen</button></div></div>';
 if($('un'))$('un').onclick=uNextRound;$('ag').onclick=mUeben;
 if($('uw'))$('uw').onclick=()=>{uP=shuffle(wrongQs);ui=0;uPicks=[];uRender()}}

const KROUND=20;
let kOrder=[],kPos=0,kP=[],ki=0,kFlip=false;
function mKarten(){kOrder=shuffle(pool());kPos=0;if(!kOrder.length)return empty();kNext()}
function kNext(){kP=kOrder.slice(kPos,Math.min(kPos+KROUND,kOrder.length));kPos+=kP.length;ki=0;kRender()}
function kRender(){kFlip=false;const q=kP[ki];
 $('main').innerHTML=progHTML(ki/kP.length)+
 '<div class="card"><span class="tag disp">Karteikarte</span><span class="catlbl">'+q.cat+'</span>'+starHTML(q.id)+
 '<div class="flip" id="flip"><div>'+esc(q.q)+'</div></div><div id="kgloss"></div>'+
 '<div class="actions"><button class="btn disp" id="show">Antwort zeigen</button>'+
 '<div id="rate" class="hidden actions" style="margin:0"><button class="btn sec disp" id="again">✗ Nochmal</button><button class="btn disp" id="know">✓ Gewusst</button></div>'+
 '<span class="cnt">'+(ki+1)+'/'+kP.length+'</span></div></div>';
 bindStar();$('show').onclick=kShow;
 if($('again'))$('again').onclick=()=>kRate(false);if($('know'))$('know').onclick=()=>kRate(true)}
function kShow(){kFlip=true;const q=kP[ki];$('flip').innerHTML='<div><div class="qq">'+esc(q.q)+'</div><div class="ans">'+esc(q.ans)+'</div></div>';if($('kgloss'))$('kgloss').innerHTML=glossHTML(q);$('show').classList.add('hidden');$('rate').classList.remove('hidden')}
function kRate(ok){record(kP[ki].id,ok);ok?streak++:streak=0;ki++;if(ki>=kP.length)return kDone();kRender();topStat()}
function kDone(){const rest=kOrder.length-kPos;
 $('main').innerHTML='<div class="card center"><div class="emo">🎉</div><div class="msg disp">Stapel geschafft!</div>'+
 '<div class="cnt" style="margin:4px 0 0">'+(rest>0?'Noch '+rest+' Karten im Thema':'Alles durch!')+'</div>'+
 '<div class="actions" style="justify-content:center;margin-top:16px">'+
 (rest>0?'<button class="btn disp" id="kn">Nächster Stapel →</button>':'')+
 '<button class="btn sec disp" id="ag">Neu mischen</button></div></div>';
 if($('kn'))$('kn').onclick=kNext;$('ag').onclick=mKarten}

let tP=[],ti=0,tPicks=[];
function mTest(){const p=pool();$('main').innerHTML='<div class="card"><span class="tag disp">Test</span>'+
 '<div class="q">Bereit für einen Probelauf? 📝</div>'+
 '<div class="cnt" style="margin:0 0 8px">Ohne Zwischenfeedback – Auswertung am Ende. Mit „← Zurück" kannst du Antworten vor dem Abgeben noch ändern. ('+p.length+' Fragen verfügbar)</div><div class="actions">'+
 [10,20,40].filter(n=>n<=p.length).map(n=>'<button class="btn sec disp tn" data-n="'+n+'">'+n+' Fragen</button>').join('')+
 '<button class="btn disp tn" data-n="'+p.length+'">Alle ('+p.length+')</button></div></div>';
 document.querySelectorAll('.tn').forEach(b=>b.onclick=()=>tStart(+b.dataset.n))}
function tStart(n){tP=shuffle(pool()).slice(0,n);ti=0;tPicks=[];tRender()}
function tRender(){const q=tP[ti];const last=ti===tP.length-1;
 $('main').innerHTML=progHTML(ti/tP.length)+
 '<div class="card"><span class="tag disp">Test</span><span class="catlbl">'+q.cat+'</span>'+starHTML(q.id)+
 '<div class="q">'+esc(q.q)+'</div><div id="opts"></div>'+
 '<div class="actions">'+
 (ti>0?'<button class="btn gho disp" id="bk">← Zurück</button>':'')+
 '<button class="btn disp" id="nx">'+(last?'Test abgeben':'Weiter →')+'</button>'+
 '<span class="cnt">'+(ti+1)+'/'+tP.length+'</span></div></div>';
 renderOpts(q);bindStar();
 if(tPicks[ti])document.querySelectorAll('input[name=opt]').forEach(inp=>{if(tPicks[ti].includes(inp.value)){inp.checked=true;inp.dispatchEvent(new Event('change'));}});
 if($('bk'))$('bk').onclick=tBack;$('nx').onclick=tNext}
function tNext(){const sel=picked();if(!sel.length)return;tPicks[ti]=sel;ti++;if(ti>=tP.length)return tDone();tRender()}
function tBack(){const sel=picked();if(sel.length)tPicks[ti]=sel;if(ti>0){ti--;tRender()}}
function tDone(){tP.forEach((q,i)=>record(q.id,setEq(tPicks[i]||[],q.correct)));topStat();
 const good=tP.filter((q,i)=>setEq(tPicks[i]||[],q.correct)).length;const pct=Math.round(good/tP.length*100);
 const wrong=tP.map((q,i)=>({q:q,sel:tPicks[i]||[]})).filter(a=>!setEq(a.sel,a.q.correct));const em=endMsg(pct);
 let rev=wrong.map(a=>{const cor=a.q.options.find(o=>a.q.correct.includes(o.l));const mine=a.q.options.find(o=>a.sel.includes(o.l));
   return '<div class="rev"><div class="yq">'+esc(a.q.q)+'</div><div class="rw">✗ Deine Antwort: '+esc(mine?mine.t:'—')+'</div><div class="rc">✓ Richtig: '+esc(cor?cor.t:'')+'</div></div>'}).join('');
 $('main').innerHTML='<div class="card center"><div class="emo">'+em[0]+'</div><div class="big">'+pct+'%</div><div class="msg disp">'+em[1]+'</div>'+
 '<div class="cnt" style="margin:4px 0 0">'+good+' von '+tP.length+' richtig</div>'+
 '<div class="actions" style="justify-content:center;margin-top:16px"><button class="btn disp" id="ag">Neuer Test</button></div></div>'+
 (wrong.length?'<div class="card" style="margin-top:14px"><b>Zum Nacharbeiten ('+wrong.length+')</b>'+rev+'</div>':'');
 $('ag').onclick=mTest}

let lP=[],li=0,lPicks=[];
// Spaced Repetition: fällige Karten (due<=jetzt) zuerst, nach Fälligkeit sortiert;
// danach niedrigste Box als Auffüller, falls noch Platz in der 20er-Runde ist.
function lernSelect(p){
 const due=p.filter(q=>isDue(q.id)).sort((a,b)=>cardOf(a.id).due-cardOf(b.id).due);
 const rest=p.filter(q=>!isDue(q.id)).sort((a,b)=>(cardOf(a.id).box-cardOf(b.id).box)||(cardOf(a.id).last-cardOf(b.id).last));
 return due.concat(rest).slice(0,20);
}
function mLernen(){const p=pool();if(!p.length)return empty();lP=lernSelect(p);li=0;lPicks=[];lRender()}
function boxBar(){const p=pool();const cnt=[0,0,0,0,0];p.forEach(q=>{cnt[Math.min(5,cardOf(q.id).box||1)-1]++});const dd=dueCount(p);
 return '<div class="boxwrap">'+cnt.map((n,ix)=>'<div class="b'+(ix===4?' m':'')+'"><div class="n">'+n+'</div><div class="l">Box '+(ix+1)+(ix===4?' ✓':'')+'</div></div>').join('')+'</div>'+
  '<div style="margin:-6px 2px 12px;text-align:center">'+(dd>0?'<span class="due">⏰ '+dd+' Karten fällig</span>':'<span class="cnt">✅ Alles wiederholt – top!</span>')+'</div>'}
function lCorrectCount(){let n=0;for(let i=0;i<lP.length;i++){if(lPicks[i]&&setEq(lPicks[i],lP[i].correct))n++;}return n}
function lRender(){clearAdv();const q=lP[li];const answered=lPicks[li]!==undefined;
 $('main').innerHTML=boxBar()+'<div class="card"><span class="tag disp">Lernen</span><span class="catlbl">'+q.cat+' · Box '+(cardOf(q.id).box||1)+'</span>'+starHTML(q.id)+
 '<div class="q">'+esc(q.q)+'</div><div id="opts"></div>'+glossHTML(q)+'<div class="fb" id="fb"></div>'+
 '<div class="actions">'+
 (li>0?'<button class="btn gho disp" id="bk">← Zurück</button>':'')+
 '<button class="btn disp'+(answered?' hidden':'')+'" id="ck">Prüfen</button>'+
 '<button class="btn sec disp'+(answered?'':' hidden')+'" id="nx">Weiter →</button>'+
 '<span class="cnt">'+(li+1)+'/'+lP.length+'</span></div></div>';
 renderOpts(q);bindStar();
 if($('bk'))$('bk').onclick=lBack;$('ck').onclick=lCheck;$('nx').onclick=lNext;
 if(answered)restoreAnswered(q,lPicks[li]);}
function lCheck(){const q=lP[li];const sel=picked();if(!sel.length)return;const ok=setEq(sel,q.correct);
 if(lPicks[li]===undefined){lPicks[li]=sel;ok?streak++:streak=0;record(q.id,ok);}
 markOpts(q,sel);fb(ok,q);$('ck').classList.add('hidden');$('nx').classList.remove('hidden');topStat();
 if(ok){clearAdv();advTimer=setTimeout(()=>{advTimer=null;lNext();},1000);}}
function lNext(){li++;if(li>=lP.length)return lDone();lRender()}
function lBack(){if(li>0){li--;lRender();}}
function lDone(){const good=lCorrectCount();$('main').innerHTML=boxBar()+'<div class="card center"><div class="emo">🎯</div><div class="msg disp">Lern-Runde geschafft!</div>'+
 '<div class="cnt" style="margin:4px 0 0">'+good+' von '+lP.length+' richtig · Richtige steigen eine Box auf und kommen erst später wieder, falsche schon bald.</div>'+
 '<div class="actions" style="justify-content:center;margin-top:16px"><button class="btn disp" id="ag">Weiter lernen</button></div></div>';$('ag').onclick=mLernen}

function mStat(){const t=ALL.length;const seen=Object.values(P.cards).filter(c=>c.seen>0).length;
 const m=Object.values(P.cards).filter(c=>c.box>=5).length;const st=Object.values(P.cards).filter(c=>c.star).length;
 const acc=P.log.a?Math.round(P.log.c/P.log.a*100):0;
 let rows=CATS.map(c=>{const qs=ALL.filter(q=>q.cat===c);const mm=qs.filter(q=>cardOf(q.id).box>=5).length;const pct=Math.round(mm/qs.length*100);
   return '<div class="row"><div class="nm">'+c+'</div><div class="mini"><i style="width:'+pct+'%"></i></div><div class="cnt" style="width:58px;text-align:right;margin:0">'+mm+'/'+qs.length+'</div></div>'}).join('');
 const dstreak=P.streakDaily.count||0;
 $('main').innerHTML='<div class="grid">'+
 '<div class="kpi"><div class="n">'+m+'/'+t+'</div><div class="l">🏆 Gemeistert</div></div>'+
 '<div class="kpi"><div class="n">'+acc+'%</div><div class="l">🎯 Genauigkeit gesamt</div></div>'+
 '<div class="kpi"><div class="n">'+seen+'</div><div class="l">👀 Karten gesehen</div></div>'+
 '<div class="kpi"><div class="n">'+dstreak+'</div><div class="l">🔥 Tage in Folge</div></div></div>'+
 '<div class="card" style="margin-top:14px"><b>Fortschritt pro Thema</b>'+rows+'</div>'+
 '<div class="actions"><button class="btn sec sm disp" id="rs">Fortschritt zurücksetzen</button><span class="cnt">⭐ '+st+' markiert · ✍️ '+P.log.a+' Antworten</span></div>';
 $('rs').onclick=()=>{if(confirm('Wirklich den gesamten Lernfortschritt löschen? (Tagesserie bleibt erhalten)')){
   P={cards:{},log:{a:0,c:0},streakDaily:P.streakDaily,ui:P.ui};streak=0;save();render()}}}

function empty(){$('main').innerHTML='<div class="card center" style="color:var(--mut)"><div class="emo">🔎</div>Keine Karten in dieser Auswahl.<br>Wähle ein anderes Thema oder entferne den ⭐-Filter.</div>'}
function renderOpts(q){const opts=$('opts');opts.innerHTML='';
 q.options.forEach(o=>{const lab=document.createElement('label');lab.className='opt';
  const inp=document.createElement('input');inp.type='radio';inp.name='opt';inp.value=o.l;
  const k=document.createElement('span');k.className='k';k.textContent=o.l;
  const t=document.createElement('span');t.textContent=o.t;
  inp.addEventListener('change',()=>{document.querySelectorAll('.opt').forEach(e=>e.classList.remove('sel'));lab.classList.add('sel')});
  lab.appendChild(inp);lab.appendChild(k);lab.appendChild(t);opts.appendChild(lab)})}
function picked(){return [...document.querySelectorAll('input[name=opt]:checked')].map(x=>x.value)}
function setEq(a,b){a=a.slice().sort();b=b.slice().sort();return a.length===b.length&&a.every((v,i)=>v===b[i])}
function markOpts(q,sel){document.querySelectorAll('.opt').forEach(lab=>{const v=lab.querySelector('input').value;lab.querySelector('input').disabled=true;if(q.correct.includes(v))lab.classList.add('correct');else if(sel.includes(v))lab.classList.add('wrong')})}
function fb(ok,q){const el=$('fb');if(!el)return;el.classList.add('show',ok?'ok':'no');
 const cor=q.options.find(o=>q.correct.includes(o.l));
 el.innerHTML=ok?('✅ '+praise()+(streak>=3?' 🔥'+streak+' in Folge!':''))
              :('❌ '+oops()+'<span class="cor">✓ Richtig: '+esc(cor?cor.t:q.correct.join(', '))+'</span>')}

document.addEventListener('keydown',e=>{
 if(e.key===' '&&mode==='karten'&&!kFlip){e.preventDefault();if($('show'))kShow();return}
 if(e.key==='Enter'){const ck=$('ck'),nx=$('nx');if(nx&&!nx.classList.contains('hidden'))nx.click();else if(ck&&!ck.classList.contains('hidden'))ck.click();else if($('nx'))$('nx').click();return}
 if(['1','2','3','4'].includes(e.key)){const inp=document.querySelectorAll('input[name=opt]')[+e.key-1];if(inp&&!inp.disabled){inp.checked=true;inp.dispatchEvent(new Event('change'))}}});

function __APP_BOOT__(){
 // Duolingo-artig: letzten Zustand (Thema, Filter, Modus) wiederherstellen
 if(P.ui){
  if(P.ui.cat==='__all'||CATS.indexOf(P.ui.cat)!==-1){catSel.value=P.ui.cat}
  if(typeof P.ui.star==='boolean'){$('staronly').checked=P.ui.star}
 }
 const startMode=(P.ui&&MODES.some(m=>m[0]===P.ui.mode))?P.ui.mode:'ueben';
 setMode(startMode);
}
__APP_BOOT__();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});var _rl=false;navigator.serviceWorker.addEventListener('controllerchange',function(){if(_rl)return;_rl=true;location.reload();});}
</script></body></html>
