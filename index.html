dentisch."}, {"l": "B", "t": "Auf ein Viertel (0,25)"}, {"l": "C", "t": "Auf ein Achtel (0,125)"}, {"l": "D", "t": "Auf die Hälfte (0,5)"}], "correct": ["C"]}, {"id": "362d77bcf6", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(Rechenbeispiel A2 1:1-Regel) Ein Pilot fliegt in der Betriebskategorie A2 in einer Flughöhe von 45 Metern. Welchen horizontalen Sicherheitsabstand muss er gemäß der „1:1-Regel“ zwingend zu unbeteiligten Personen halten?", "options": [{"l": "A", "t": "150 Meter"}, {"l": "B", "t": "30 Meter"}, {"l": "C", "t": "5 Meter"}, {"l": "D", "t": "45 Meter"}], "correct": ["D"]}, {"id": "557ac1ef02", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Ein Fernpilot nutzt für seinen Flug eine FPV-Brille (First Person View). Was ist luftrechtlich zwingend vorgeschrieben, damit dieser Flug noch in der \"Offenen\" Kategorie als VLOS-Flug (Visual Line of Sight) gilt?", "options": [{"l": "A", "t": "Der Flug darf ausschließlich über unbewohntem, menschenleerem Gebiet stattfinden."}, {"l": "B", "t": "Eine zweite qualifizierte Person (Beobachter) muss neben dem Piloten stehen, die Drohne im direkten Sichtkontakt behalten und die Luftraumüberwachung gewährleisten."}, {"l": "C", "t": "Die Drohne muss durchgängig per Glasfaserkabel mit der Bodenstation verbunden sein."}, {"l": "D", "t": "Die Kamera muss zwingend in 4K-Auflösung senden, damit der Sichtkontakt rechtlich als ausreichend gilt."}], "correct": ["B"]}, {"id": "aee251338c", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Du betreibst eine Drohne, die weniger als 250 g wiegt (C0). Sie ist jedoch nicht als Spielzeug deklariert und besitzt eine Kamera. Musst du dich als UAS-Betreiber beim Luftfahrt-Bundesamt registrieren?", "options": [{"l": "A", "t": "Nein, unter 250 g ist man pauschal befreit."}, {"l": "B", "t": "Nur, wenn ich gewerblich fliege."}, {"l": "C", "t": "Ja, sobald ein Sensor zur Aufzeichnung persönlicher Daten (wie eine Kamera) verbaut ist, besteht Registrierungspflicht."}, {"l": "D", "t": "Nur, wenn die Drohne schneller als 19 m/s fliegt."}], "correct": ["C"]}, {"id": "d2efaec374", "ex": "uav", "cat": "Design & Antrieb", "q": "Welchen entscheidenden Vorteil bringt die \"VTOL\"-Fähigkeit (Vertical Take-Off and Landing) bei einer Fixed-Wing Drohne?", "options": [{"l": "A", "t": "Die Drohne wird dadurch komplett unsichtbar für Radar."}, {"l": "B", "t": "Sie verdoppelt die Batterielaufzeit im Vergleich zu reinen Fixed-Wings."}, {"l": "C", "t": "Sie kombiniert die extreme Flächenleistung und Reichweite eines Flächenflugzeugs mit der Fähigkeit, ohne Piste, Katapult oder Netz starten und landen zu können."}, {"l": "D", "t": "Sie ermöglicht Flüge im Weltraum."}], "correct": ["C"]}, {"id": "b17c6d74f4", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Welche Komponente der Drohne integriert die Signale aus Beschleunigungssensoren und Gyroskopen über die Zeit („Dead Reckoning“), akkumuliert dabei aber extrem schnell Messfehler (Drift)?", "options": [{"l": "A", "t": "Die Telemetrie-Antenne"}, {"l": "B", "t": "Das Optical-Flow-Modul"}, {"l": "C", "t": "Der LiDAR-Sensor"}, {"l": "D", "t": "Die MEMS Inertial Measurement Unit (IMU)"}], "correct": ["D"]}, {"id": "b6d1b7d8c2", "ex": "uav", "cat": "Autopiloten & Flugmodi", "q": "Was bewirkt der Flugmodus \"Acro\" bzw. \"Rate\" in ArduCopter im Gegensatz zum \"Stabilize\"-Mode?", "options": [{"l": "A", "t": "Er bietet keinerlei automatische Horizontausrichtung (Self-Leveling); die Drohne behält stur ihren Neigungswinkel bei, wenn man die Knüppel loslässt."}, {"l": "B", "t": "Er hält über das Barometer automatisch die Höhe."}, {"l": "C", "t": "Er leitet bei Empfangsverlust sofort das Return-to-Home (RTL) ein."}, {"l": "D", "t": "Er nutzt GPS, um die Drohne auf dem Zentimeter genau zu parken."}], "correct": ["A"]}, {"id": "7aa0c58b60", "ex": "uav", "cat": "Kommunikation & Protokolle", "q": "MAVLink, DroneCAN und Cyphal sind typische Beispiele für...", "options": [{"l": "A", "t": "...militärische Verschlüsselungsalgorithmen zur Absicherung von Kommandoverbindungen"}, {"l": "B", "t": "...Hersteller von Propellern, die sich auf UAV-Antriebskomponenten spezialisiert haben"}, {"l": "C", "t": "...generische Telemetrie- und Steuerungsprotokolle über UART/CAN, um Statusdaten und Befehle zwischen Flight Controller, Peripherie und Bodenstation auszutauschen."}, {"l": "D", "t": "...rein analoge FPV-Videoprotokolle zur direkten Bildübertragung an die Bodenstation"}], "correct": ["C"]}, {"id": "a9e84258c7", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Welche Flughöhe (Altitude) über Grund (AGL) darf im regulären, zertifikatsfreien Betrieb der offenen Kategorie (z. B. A1/A3) grundsätzlich nicht überschritten werden?,,", "options": [{"l": "A", "t": "120 m"}, {"l": "B", "t": "150 m"}, {"l": "C", "t": "500 m"}, {"l": "D", "t": "30 m"}], "correct": ["A"]}, {"id": "c51a319e4b", "ex": "uav", "cat": "Design & Antrieb", "q": "Warum müssen in Reihe geschaltete Lithium-Polymer (LiPo) Zellen zwingend über einen Balancer-Anschluss geladen werden?", "options": [{"l": "A", "t": "Damit die Telemetriedaten des Flugcontrollers über diesen Anschluss schneller gesendet werden."}, {"l": "B", "t": "Weil kleine Spannungsdifferenzen zwischen den Zellen sonst über die Ladezyklen anwachsen würden, was zu einer gefährlichen Überladung einzelner Zellen (Brandgefahr) führen kann."}, {"l": "C", "t": "Um regelmäßig die interne Firmware des im Akku verbauten Überwachungs-Chips zu aktualisieren."}, {"l": "D", "t": "Um über die zusätzlichen Kabel das physikalische Gewicht des Akkus gleichmäßiger zu verteilen."}], "correct": ["B"]}, {"id": "6bf72bc47a", "ex": "uav", "cat": "Aerodynamik & Flugmechanik", "q": "(Rechenbeispiel - ALOS Fixed-Wing) Du fliegst eine große Fixed-Wing-Drohne zur Vermessung. Sie hat eine charakteristische Dimension (CD) von 2,0 Metern. Wie groß ist die \"Attitude Line of Sight\" (ALOS) gemäß der spezifischen Formel für Fixed-Wings?", "options": [{"l": "A", "t": "674 m"}, {"l": "B", "t": "980 m"}, {"l": "C", "t": "1010 m"}, {"l": "D", "t": "2000 m"}], "correct": ["C"]}, {"id": "77de8ee9f7", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(Luftrecht) Fällt ein Drohnenflug zwingend in die \"Zulassungspflichtige\" (Certified) Kategorie, wenn Gefahrgut transportiert wird?", "options": [{"l": "A", "t": "Nein, Gefahrguttransporte sind in der EU generell verboten."}, {"l": "B", "t": "Nur, wenn die Drohne mehr als 25 kg wiegt."}, {"l": "C", "t": "Nein, das darf auch in der offenen Kategorie A3 stattfinden."}, {"l": "D", "t": "Ja, der Transport von Gefahrgut oder Menschen erfordert immer den Flug in der zulassungspflichtigen Kategorie."}], "correct": ["D"]}, {"id": "772dff0c80", "ex": "uav", "cat": "Sensorik & Navigation", "q": "(Sensorik) Welcher Navigationsansatz ist gemeint, wenn die Position einer Drohne ausschließlich durch das mathematische Aufsummieren (Integration) von IMU-Beschleunigungs- und Drehratendaten geschätzt wird?", "options": [{"l": "A", "t": "Dead Reckoning (Inertial Positioning)"}, {"l": "B", "t": "GNSS-Tracking"}, {"l": "C", "t": "Optical Flow"}, {"l": "D", "t": "Lidar-Scanning"}], "correct": ["A"]}, {"id": "5658ee878d", "ex": "uav", "cat": "Kommunikation & Protokolle", "q": "(Kommunikation) Warum wird das C2-Funksignal (Command & Control) oft als die kritischste Verbindung eines UAVs betrachtet?", "options": [{"l": "A", "t": "Weil es die einzige Verbindung ist, die niemals verschlüsselt werden darf."}, {"l": "B", "t": "Weil es extrem geringe Latenzen und höchste Zuverlässigkeit erfordert, um die zeitkritischen Steuerbefehle vom Piloten an die Drohne zu übertragen."}, {"l": "C", "t": "Weil darüber die 4K-Videos übertragen werden."}, {"l": "D", "t": "Weil es viel mehr Bandbreite benötigt als der Payload-Link."}], "correct": ["B"]}, {"id": "a43164ee82", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "(C-UAS / Abwehr) Was versteht man bei Drohnen unter \"Spoofing\"?", "options": [{"l": "A", "t": "Ein Sender überflutet das Frequenzband mit Rauschen, sodass keine echten Befehle mehr ankommen."}, {"l": "B", "t": "Das Zerstören der Elektronik durch Mikrowellen."}, {"l": "C", "t": "Ein Sender speist gefälschte Signale (z. B. GPS-Koordinaten oder Steuerbefehle) in das System ein, um die Kontrolle über die Drohne zu übernehmen oder ihre Navigation zu manipulieren."}, {"l": "D", "t": "Das physische Abfangen durch ein Netz."}], "correct": ["C"]}, {"id": "5a1a7bb293", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "(C-UAS / Abwehr) Warum wird der Einsatz ziviler oder militärischer FPV-Drohnen in der Drohnenabwehr als \"Cost Asymmetry\" (Kostenasymmetrie) bezeichnet?", "options": [{"l": "A", "t": "Weil ein billiger Multicopter (unter 500 €) einen enorm teuren wirtschaftlichen Schaden (z. B. Flughafensperrungen) oder den Abschuss einer millionenteuren Luftabwehrrakete erzwingen kann."}, {"l": "B", "t": "Weil die Drohnen in der Herstellung Millionen kosten, aber leicht abstürzen."}, {"l": "C", "t": "Weil Piloten für FPV-Drohnen teurer ausgebildet werden müssen als für Flächenflugzeuge."}, {"l": "D", "t": "Weil das GPS-System kostenlos ist, Radarsysteme aber nicht."}], "correct": ["A"]}, {"id": "e120feb557", "ex": "uav", "cat": "Betrieb & Anwendungen", "q": "(Trends / Betrieb) Im Modell der \"1:n Operator-to-Drone Ratio\" ändert sich die Kernrolle des Piloten massiv. Welche neue Funktion übernimmt er primär?", "options": [{"l": "A", "t": "Er kümmert sich in dieser Rolle ausschließlich um die technische Reparatur der Hardware am Boden."}, {"l": "B", "t": "Er steuert weiterhin nacheinander jede einzelne der n Drohnen manuell mit einem einzigen Joystick."}, {"l": "C", "t": "Er programmiert währenddessen aktiv neue Flugmodi für jede einzelne Drohne der Flotte."}, {"l": "D", "t": "Er wandelt sich vom aktiven Steuerer zum \"Supervisor\", der hochautomatisierte Flotten überwacht, Aufgaben priorisiert und nur im Notfall (bei Abweichungen) eingreift."}], "correct": ["D"]}, {"id": "9ae6912c9f", "ex": "uav", "cat": "Autopiloten & Flugmodi", "q": "(Autopilot) Welche Regelschleife im Autopiloten (Nested Control Loops) ist für die hochfrequente primäre Stabilisierung (Ausgleich von schnellen Windböen im Millisekundentakt) zuständig?", "options": [{"l": "A", "t": "Der Barometer-Loop"}, {"l": "B", "t": "Der Inner Loop (innere Regelschleife)"}, {"l": "C", "t": "Der Navigation-Loop"}, {"l": "D", "t": "Der Outer Loop (äußere Regelschleife)"}], "correct": ["B"]}, {"id": "73110a5bc5", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "(C-UAS / Abwehr) Gegen welche Art von Angriffsdrohnen sind klassische \"Soft-Kill\" Gegenmaßnahmen (wie Jamming) nahezu wirkungslos?", "options": [{"l": "A", "t": "Gegen handelsübliche DJI-Kameradrohnen, deren proprietäre Funkverbindung besonders resistent gegen Jamming ist."}, {"l": "B", "t": "Gegen große MALE-Drohnen (z. B. Reaper), deren Funkstrecken durch Jamming ohnehin kaum zu stören sind."}, {"l": "C", "t": "Gegen Drohnen, die ausschließlich nachts fliegen, da Jamming-Signale bei Dunkelheit stark an Reichweite verlieren."}, {"l": "D", "t": "Gegen Drohnen, die vollautonom über rein optische Kameras (Machine Vision) navigieren oder per Glasfaserkabel (Fiber-optic) gesteuert werden."}], "correct": ["D"]}, {"id": "02ea6657b0", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(LBA Szenario 1) Ein Pilot plant, eine 3 kg schwere Drohne (C2) für Inspektionsaufgaben in einem Industriegebiet zu verwenden. Sie wird in direkter Sichtweite (VLOS) betrieben, der Flug findet unter 120m Höhe statt und der horizontale Abstand zu unbeteiligten Personen beträgt durchgehend mehr als 30 Meter. Überflug von Menschenansammlungen findet nicht statt. In welche Betriebskategorie fällt dieser Flug nach dem LBA-Entscheidungsdiagramm?", "options": [{"l": "A", "t": "Offen A2"}, {"l": "B", "t": "Offen A1"}, {"l": "C", "t": "Speziell"}, {"l": "D", "t": "Offen A3"}], "correct": ["A"]}, {"id": "ad1032c5d5", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(LBA Szenario 4) Ein Logistikunternehmen will eine Drohne (18 kg, C3-Klassifizierung) einsetzen, um auf einem Firmengelände einen stoßgedämpften Behälter mit 1,2 Litern eines entzündbaren und ätzenden chemischen Gefahrstoffs über eine Strecke von 1,8 km zu transportieren. Die Drohne ist topmodern ausgestattet (Fallschirm, redundante Systeme, Geo-Awareness) und fliegt unter 90m Höhe. In welche Kategorie fällt dieser Flug?", "options": [{"l": "A", "t": "Offen A1"}, {"l": "B", "t": "Zulassungspflichtig (Certified)"}, {"l": "C", "t": "Offen A3 (da C3-Drohne, unter 120m und Industriegebiet)"}, {"l": "D", "t": "Speziell (Specific)"}], "correct": ["B"]}, {"id": "ac3f967f89", "ex": "uav", "cat": "Aerodynamik & Flugmechanik", "q": "(Echte Klausurfrage) Sie werden beauftragt, eine Drohne für den Forschungseinsatz im Himalaya-Gebirge auf über 5.500 m Höhe zu entwickeln. Welche aerodynamische Herausforderung ist hierbei das Hauptproblem und wie könnte ein technischer Lösungsansatz aussehen?", "options": [{"l": "A", "t": "Drohnen fallen auf dieser Höhe unter die Waffenkontrollgesetze. Maßnahme: Militärische Zulassung."}, {"l": "B", "t": "In dieser Höhe gibt es kein GPS mehr. Maßnahme: Navigation ausschließlich über Optical Flow."}, {"l": "C", "t": "Die extrem geringe Luftdichte erschwert die Erzeugung von ausreichend aerodynamischem Auftrieb massiv. Maßnahme: Die Propellerfläche (Pitch/Länge) oder die Motordrehzahl muss deutlich vergrößert werden; zudem benötigen die Akkus Isolation gegen die Kälte."}, {"l": "D", "t": "Die extreme Gravitation zieht die Drohne zu Boden. Maßnahme: Stärkere Magnete verbauen."}], "correct": ["C"]}, {"id": "d45a38c228", "ex": "uav", "cat": "Sensorik & Navigation", "q": "(Echte Klausurfrage) Ein UAV soll völlig autonom in einer großen Indoor-Kraftwerkshalle fliegen. Mit welchen primären Gefahrenquellen / Störfaktoren müssen Sie beim Systemdesign zwingend rechnen und wie kompensieren Sie diese?", "options": [{"l": "A", "t": "Störung der Funkverbindung durch Wolken. Maßnahme: Flug nur bei gutem Wetter."}, {"l": "B", "t": "Drohnenabwehrlaser. Maßnahme: Verspiegelter Rumpf."}, {"l": "C", "t": "Blendung der Kameras durch die Hallenbeleuchtung. Maßnahme: Sonnenbrillen für die Sensoren."}, {"l": "D", "t": "Völliger Ausfall von GPS (GNSS-Denied) und massive Störung des Magnetometers (Kompass) durch viel Stahl und stromführende Leitungen. Maßnahme: Navigation mittels LiDAR (SLAM), Optical Flow oder Ultraschall."}], "correct": ["D"]}, {"id": "dd5b6e9843", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(Echte Klausurfrage) Sie sehen in der DIPUL-Karten-App (Digitale Plattform unbemannte Luftfahrt), dass das Schwimmbad \"An der Lache\" blau markiert ist. Was definiert ein solches \"geografisches Gebiet\" und was bedeutet das für Sie als Pilot?", "options": [{"l": "A", "t": "Geografische Gebiete (Geozonen) sind von Luftfahrtbehörden definierte Lufträume, die den Drohnenbetrieb aus Sicherheits-, Datenschutz- oder Naturschutzgründen einschränken, verbieten oder an harte Auflagen (z. B. Flugverbot über Menschenansammlungen in Freibädern) knüpfen. Der Pilot muss diese Auflagen vor dem Flug verbindlich prüfen."}, {"l": "B", "t": "Dies bedeutet, dass eindringende Drohnen dort automatisch vom Betreiber des Schwimmbads per Funk elektronisch gehackt und zwangsgelandet werden"}, {"l": "C", "t": "Dies zeigt laut DIPUL lediglich eine meteorologische Wetter-Warnzone für zu erwartenden starken Regen in der Umgebung an"}, {"l": "D", "t": "Schwimmbäder gelten laut DIPUL pauschal als \"Free-Fly-Zonen\", in denen für Drohnen überhaupt keine luftrechtlichen Regeln gelten"}], "correct": ["A"]}, {"id": "dbb52aafce", "ex": "uav", "cat": "Betrieb & Anwendungen", "q": "(Mars-Rotorcraft Szenario) Die NASA-Studie \"Past, Present, and Future Mars Rotorcraft\" nennt die autonome Navigation als kritische Herausforderung, da auf dem Mars kein GPS verfügbar ist. Welchen technologischen Lösungsansatz schlägt das Paper vor?", "options": [{"l": "A", "t": "Ein mehrere hunderttausend Kilometer langes Glasfaserkabel, das die Drohne direkt mit der Erde verbindet"}, {"l": "B", "t": "Die Entwicklung von fortschrittlichen Bildverarbeitungssystemen (Kameras/LiDAR) gepaart mit Künstlicher Intelligenz (Machine Learning), um die Umgebung an Bord in Echtzeit zu kartieren, Hindernisse selbstständig zu umfliegen und Landeplätze zu finden."}, {"l": "C", "t": "Die direkte Live-Steuerung per Joystick durch Astronauten, die sich permanent auf der Erde befinden"}, {"l": "D", "t": "Den Einsatz klassischer, analoger Flüssigkeitskompasse, die auf Wasserbasis arbeiten und die Nordausrichtung anzeigen"}], "correct": ["B"]}, {"id": "228665624a", "ex": "uav", "cat": "Betrieb & Anwendungen", "q": "(Mars-Rotorcraft Szenario) Eine weitere große Herausforderung auf dem Mars ist die Energieeffizienz, da die Drohne extrem leicht sein muss. Welcher Lösungsansatz wird hierfür in der Studie evaluiert?", "options": [{"l": "A", "t": "Klassische Verbrennungsmotoren, die feinen Mars-Sand als Ersatztreibstoff nutzen, da flüssige Treibstoffe zu schwer wären."}, {"l": "B", "t": "Ein Miniatur-Atomreaktor (RTG) auf jeder einzelnen Drohne, ähnlich der Energieversorgung von Mars-Rovern."}, {"l": "C", "t": "Die Nutzung von leichten Hochleistungsbatterien (z. B. Lithium-Schwefel) mit sehr hoher Energiedichte in Kombination mit integrierten Solarpaneelen, damit sich die Drohne am Boden selbst aufladen kann."}, {"l": "D", "t": "Die Drohne fliegt völlig ohne Batterien und nutzt stattdessen die schwachen Mars-Winde als alleinige Energiequelle."}], "correct": ["C"]}, {"id": "16a871619c", "ex": "uav", "cat": "Betrieb & Anwendungen", "q": "(Mars-Rotorcraft Szenario) Auf dem Mars herrschen extreme Minusgrade, Staubstürme und hohe Strahlung. Welcher materialtechnische Lösungsansatz hilft, die Drohne widerstandsfähig zu machen, ohne sie zu schwer für den Flug in der dünnen Atmosphäre werden zu lassen?", "options": [{"l": "A", "t": "Die gesamte Drohne zum Schutz in eine dicke, aber sehr schwere Glasglocke einschließen."}, {"l": "B", "t": "Die Drohne komplett aus leichtem, aber wenig stabilem elastischem Gummi bauen."}, {"l": "C", "t": "Die komplette Drohnenstruktur aus massivem, aber sehr schwerem Blei gießen."}, {"l": "D", "t": "Die Nutzung von fortschrittlichen, extrem leichten Verbundmaterialien (wie kohlenstofffaserverstärktem Kunststoff (CFK) oder Graphen), optimiert durch 3D-Druck, sowie spezielle Schutzbeschichtungen gegen Staub und Strahlung."}], "correct": ["D"]}, {"id": "39c4fcae92", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(LBA Szenario 3) Ein Pilot besitzt das Fernpiloten-Zeugnis A2 sowie den A1/A3 Kompetenznachweis. Er nutzt eine sehr leichte C1-Drohne (720 g) in einem Stadtpark (max. 100m AGL). Er fliegt VLOS. Es befinden sich vereinzelt unbeteiligte Spaziergänger im Park, die er möglichst umfliegt. Menschenansammlungen meidet er komplett. In welche Kategorie fällt der Betrieb?", "options": [{"l": "A", "t": "Offen A1 (Nahe Menschen)"}, {"l": "B", "t": "Speziell"}, {"l": "C", "t": "Zulassungspflichtig"}, {"l": "D", "t": "Offen A2 (Sichere Distanz)"}], "correct": ["A"]}, {"id": "731eab47ec", "ex": "uav", "cat": "Sensorik & Navigation", "q": "(Szenario: Search & Rescue im dichten Wald) Kontext: Nach einem Erdbeben wird eine Person in einem sehr dichten, stark bewaldeten Berggebiet vermisst. Die Suche muss nachts bei völliger Dunkelheit stattfinden. Die Einsatzleitung bittet dich, das optimale UAV-System für diese Mission zusammenzustellen. Frage: Welche Kombination aus Hardware-Plattform und Sensor-Payload ist für dieses spezifische Szenario technisch am sinnvollsten?", "options": [{"l": "A", "t": "Ein Hybrid-VTOL mit einem Radar-System und passiven RF-Scannern."}, {"l": "B", "t": "Ein Multicopter ausgestattet mit einer Thermal-Kamera (IR) und einem LiDAR-Scanner."}, {"l": "C", "t": "Ein Blimp (Prallluftschiff) mit Ultraschallsensoren und Barometer."}, {"l": "D", "t": "Ein Fixed-Wing (Flächenflugzeug) mit einer hochauflösenden RGB-Kamera und optischem Fluss."}], "correct": ["B"]}, {"id": "76c0cd36b1", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(Szenario: Offshore-Windpark Inspektion) Kontext: Du sollst Rotorblätter von Windkraftanlagen überprüfen, die sich 30 Kilometer draußen auf dem Meer befinden. Der Pilot steuert die Drohne von Land aus. Um Haarrisse zu erkennen, muss ein hochauflösender Live-Videostream in Echtzeit an die Bodenstation gesendet werden. Frage: Welches rechtliche und kommunikationstechnische Setup ist für diese Mission erforderlich?", "options": [{"l": "A", "t": "Der Flug fällt in die Kategorie OFFEN A3. Als C2-Link und Payload-Link reicht das standardmäßige 2,4 GHz-Band (z.B. OcuSync)."}, {"l": "B", "t": "Der Flug ist erlaubnisfrei. Die Navigation erfolgt rein über ein Pitot-Rohr, Daten werden lokal gespeichert."}, {"l": "C", "t": "Der Flug fällt zwingend in die \"Spezielle\" (Specific) Kategorie. Für die Übertragung des Live-Videos auf diese Distanz wird ein High-Bandwidth-Link (z. B. via LTE/5G oder Satellitenkommunikation) benötigt."}, {"l": "D", "t": "Der Flug ist Zulassungspflichtig (Certified), da Wasser überflogen wird. Es darf nur eine analoge Funkübertragung genutzt werden."}], "correct": ["C"]}, {"id": "494cff94b3", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "(Szenario: C-UAS Abwehr beim G7-Gipfel) Kontext: Du bist für die Drohnenabwehr eines politischen Gipfels zuständig. Die Angreifer nutzen fortschrittliche Drohnen, die über ein abrollendes Glasfaserkabel (Fiber-optic) gesteuert werden oder völlig autonom per optischer Bilderkennung (Machine Vision) navigieren, ohne ein GPS-Signal zu benötigen. Frage: Welche Sensor- und Abwehrkombination hat hier als einzige eine echte Chance auf Erfolg?", "options": [{"l": "A", "t": "Erkennung durch GNSS-Monitoring; Abwehr durch GPS-Spoofing."}, {"l": "B", "t": "Erkennung durch RF-Sniffing; Abwehr durch Jamming (Stören der Frequenzen)."}, {"l": "C", "t": "Erkennung durch Abhören der Telemetriedaten; Abwehr durch Hacking der C2-Verbindung."}, {"l": "D", "t": "Erkennung durch Radar und LiDAR; Abwehr durch Hard-Kill-Effektoren (z. B. Netze, Laser oder High-Power Microwave)."}], "correct": ["D"]}, {"id": "901ea955bc", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(Szenario: Landwirtschaftliches \"Crop-Spraying\") Kontext: Ein Agrarunternehmen möchte ein riesiges, 500 Hektar großes Feld mit umweltschädlichen und toxischen Pestiziden besprühen. Der Pilot hat direkten Sichtkontakt. Frage: In welche rechtliche Betriebskategorie stuft das Luftfahrt-Bundesamt (LBA) diesen Flug ein und welche Plattform ist wirtschaftlich am klügsten?", "options": [{"l": "A", "t": "Zulassungspflichtig (Certified). Da extrem große Flächen abgedeckt werden müssen, bietet sich ein Fixed-Wing oder (falls eine Landebahn fehlt) eine Hybrid-VTOL Plattform an."}, {"l": "B", "t": "OFFEN A1, da landwirtschaftliche Flächen meist menschenleer sind. Eine kleine C0-Drohne reicht aus."}, {"l": "C", "t": "Speziell (Specific). Ein Blimp (Prallluftschiff) ist die beste Wahl, da er stundenlang schweben kann."}, {"l": "D", "t": "OFFEN A3. Ein FPV-Racer ist optimal, um die Pestizide besonders schnell zu verteilen."}], "correct": ["A"]}, {"id": "d32033845b", "ex": "uav", "cat": "Sensorik & Navigation", "q": "(Szenario: Exploration einer eingestürzten Mine) Kontext: Eine Drohne soll tief unter der Erde in einem eingestürzten Bergwerk nach Überlebenden suchen. Es ist stockfinster. Das Gestein ist extrem eisenhaltig (stark magnetisch) und schirmt jegliche Signale von außen ab. Frage: Welches Setup der Flugsteuerung (Autopilot) sichert das Überleben der Drohne?", "options": [{"l": "A", "t": "Die Drohne nutzt ein Pitot-Rohr zur Positionsbestimmung und ein Barometer zur Kollisionswarnung."}, {"l": "B", "t": "Das Magnetometer wird abgeschaltet. Die Drohne nutzt eine Kombination aus starken Scheinwerfern für optischen Fluss (Optical Flow) sowie einen LiDAR-Scanner für die SLAM-Navigation und Hindernisvermeidung."}, {"l": "C", "t": "Die Navigation stützt sich primär auf GPS und das Magnetometer (Kompass)."}, {"l": "D", "t": "Die Navigation stützt sich ausschließlich auf die Inertial Measurement Unit (IMU), da das Aufsummieren der Sensordaten (Dead Reckoning) hier am sichersten ist."}], "correct": ["B"]}, {"id": "93ac2c3ddc", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "(Szenario: Drone-in-a-Box bei Verbindungsausfall) Kontext: Du betreibst ein automatisiertes \"Drone-in-a-Box\" System auf einem Werksgelände. Die Drohne führt gerade autonom einen Patrouillenflug durch. Plötzlich wird die C2-Verbindung zur Basisstation durch einen vorbeifahrenden Störsender-LKW komplett unterbrochen (Jamming). Frage: Was sollte die Failsafe-Logik der Drohne in diesem Moment idealerweise auslösen?", "options": [{"l": "A", "t": "Wechsel in den manuellen Acro-Mode."}, {"l": "B", "t": "Sofortiger Stillstand aller Rotoren (Disarm), um ein unkontrolliertes Wegfliegen zu verhindern."}, {"l": "C", "t": "Aktivierung der vorprogrammierten RTH-Funktion (Return-to-Home) auf einer sicheren Flughöhe zurück zum Dock, alternativ das sichere Schweben (Hovering) auf der Stelle oder eine automatische Landung."}, {"l": "D", "t": "Die Drohne schaltet auf Infrarot-Steuerung um und sucht den LKW."}], "correct": ["C"]}, {"id": "79b9b8b30e", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(Klausur-Szenario: Geozonen & DIPUL) Kontext: Die DIPUL-Karte (Digitale Plattform unbemannte Luftfahrt) listet für den Standort des Freibads „An der Lache“ in Rüsselsheim ein überlappendes geografisches Gebiet. Frage: Was definiert luftrechtlich ein \"geografisches Gebiet\" und welche Pflicht leitet sich daraus für deinen Drohnenbetrieb über dem Freibad ab?", "options": [{"l": "A", "t": "Es sind steuerfreie Zonen, in denen zusätzlich auch keine Versicherungspflicht für den Drohnenbetrieb gilt."}, {"l": "B", "t": "Es sind von der Behörde definierte Lufträume, die den Drohnenbetrieb aus Sicherheits-, Naturschutz- oder Datenschutzgründen einschränken, verbieten oder an Auflagen (wie ein Flugverbot über der Menschenansammlung im Freibad) knüpfen. Der Pilot muss diese verbindlich prüfen."}, {"l": "C", "t": "Es sind Gebiete, in denen eindringende Drohnen automatisch von der Flugsicherung per Funk gehackt und zwangsgelandet werden."}, {"l": "D", "t": "Es sind Zonen, in denen ausschließlich autonome C0-Drohnen unter 250 g geflogen werden dürfen."}], "correct": ["B"]}, {"id": "f005d71a40", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(Szenario: Systemarchitektur für Stromtrassen-Inspektion) Kontext: Du konzipierst ein Inspektions-UAV für extrem lange Stromtrassen. Der Flug wird weit außerhalb der Sichtweite (BVLOS) stattfinden. Frage: Welche Hardware-Plattform und welche Sensoren für das \"Sense & Avoid\" (Umgebungserfassung) bieten sich für diese Langstrecken-Mission am ehesten an?", "options": [{"l": "A", "t": "Ein Blimp (Prallluftschiff) mit Optical Flow Kameras, da dessen extreme Langsamkeit ideale Voraussetzungen für Stromtrassen-Inspektionen bietet."}, {"l": "B", "t": "Ein kleiner Hexacopter mit Infrarotsensor, da dessen begrenzte Akkulaufzeit für lange Trassenabschnitte ausreichend kompensiert werden kann."}, {"l": "C", "t": "Ein Fixed-Wing oder Hybrid-VTOL (wegen der benötigten Reichweite/Flächenleistung) ausgestattet mit einem Radar zur Erkennung anderer, auch funkstiller (nicht-kooperativer) Luftfahrzeuge."}, {"l": "D", "t": "Ein FPV-Quadrocopter mit Ultraschallsensoren, da diese Kombination trotz kurzer Reichweite als Standard fuer BVLOS-Langstrecken gilt."}], "correct": ["C"]}, {"id": "bcc4d22402", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "(Szenario: Drohnenabwehr bei illegalem Schwebeflug) Kontext: Eine feindliche Spionagedrohne schwebt völlig regungslos und funkschweigend (Radio Silence) neben einem geheimen Firmengelände. Frage: Warum scheitern in diesem exakten Moment sowohl passive RF-Scanner als auch herkömmliche FMCW-Radarsysteme bei der Erkennung, und welcher Sensor wäre stattdessen erfolgreich?", "options": [{"l": "A", "t": "Sie scheitern an der geringen Akkugröße der Spionagedrohne; ein einzelnes Mikrofon wäre stattdessen erfolgreich"}, {"l": "B", "t": "Sie scheitern an der ungewöhnlich niedrigen Außentemperatur der Nacht; ein Barometer wäre stattdessen erfolgreich"}, {"l": "C", "t": "Sie scheitern am böigen Wind am Einsatzort; ein einfacher Ultraschallsensor wäre stattdessen erfolgreich"}, {"l": "D", "t": "RF-Scanner scheitern an der Funkstille; Radarsysteme filtern die schwebende Drohne wegen der fehlenden Radialgeschwindigkeit fälschlicherweise als statisches Objekt (Clutter) heraus (\"Hover Problem\"). Eine elektro-optische Kamera (EO/IR) oder ein hochauflösendes LiDAR wäre stattdessen erfolgreich."}], "correct": ["D"]}, {"id": "118df4d0e7", "ex": "uav", "cat": "Betrieb & Anwendungen", "q": "(Szenario: Schwarm vs. Cluster bei Waldbränden) Kontext: Bei einem massiven Waldbrand sollen mehrere Drohnen gleichzeitig zur Lageerkundung eingesetzt werden. Frage: Was ist laut der Trends-Vorlesung der technische Kernunterschied, wenn die Einsatzleitung statt eines zivilen \"Clusterbetriebs\" einen hochkomplexen \"Schwarmbetrieb\" anfordert?", "options": [{"l": "A", "t": "Beim Clusterbetrieb werden die Drohnen zentral von einer Bodenstation aus geplant; ein Schwarm hingegen kooperiert dezentral, die Drohnen tauschen sich untereinander aus und teilen Aufgaben (Task Allocation) dynamisch selbst auf."}, {"l": "B", "t": "Ein Cluster wird ausschließlich von Künstlicher Intelligenz gesteuert, während ein Schwarm stets manuell von mehreren Menschen geflogen wird."}, {"l": "C", "t": "Ein Schwarm darf laut Definition der Vorlesung rechtlich nur aus Fixed-Wing-Drohnen bestehen, niemals aus Multicoptern."}, {"l": "D", "t": "In einem echten Schwarmverbund fliegt entgegen der Bezeichnung technisch immer nur eine einzige Drohne gleichzeitig."}], "correct": ["A"]}, {"id": "6c5fc35706", "ex": "uav", "cat": "Autopiloten & Flugmodi", "q": "(Szenario: Notlandung bei Sensorausfall) Kontext: Während eines Flugs mit einem ArduCopter meldet die Telemetrie plötzlich einen Totalausfall des eingebauten Barometers (und es ist kein Laser-Altimeter an Bord). Frage: Welche Flugfunktion im Autopiloten wird dadurch sofort kritisch beeinträchtigt, und in welchen Modus sollte der Pilot wechseln, um die Drohne sicher manuell zurückzuholen?", "options": [{"l": "A", "t": "Das automatische horizontale Ausrichten fällt aus; Wechsel in den Acro-Modus."}, {"l": "B", "t": "Die automatische Höhenhaltung (Altitude Hold) funktioniert nicht mehr. Der Pilot sollte in den \"Stabilize\"-Modus wechseln, da er dort die Motorleistung (Throttle) und damit die Höhe rein manuell kontrolliert."}, {"l": "C", "t": "Die Kamera schaltet ab; Wechsel in den Auto-Modus."}, {"l": "D", "t": "Die GPS-Positionierung fällt aus; der Pilot muss in den Loiter-Modus wechseln."}], "correct": ["B"]}, {"id": "9b5e84c251", "ex": "uav", "cat": "Autopiloten & Flugmodi", "q": "(Szenario: PID-Tuning für Transportdrohne) Kontext: Deine selbstgebaute Transportdrohne reagiert bei schnellen Richtungswechseln extrem träge, schwingt aber bei jedem Bremsmanöver hochfrequent nach (\"Bouncing\") und oszilliert. Frage: An welchen Werten des PID-Reglers solltest du am ehesten drehen, um die Drohne agiler auf die Knüppel reagieren zu lassen und gleichzeitig das Nachschwingen abzudämpfen?", "options": [{"l": "A", "t": "Ausschließlich das Magnetometer neu kalibrieren, da dies vermeintlich das Bouncing verursacht"}, {"l": "B", "t": "Den D-Term komplett auf Null setzen, um das träge Verhalten bei Richtungswechseln zu beheben"}, {"l": "C", "t": "Den P-Term (Proportional) erhöhen für eine schnellere, direktere Reaktion auf Fehler; und den D-Term (Derivative) anpassen, um das Überschwingen/Bouncing prädiktiv besser abzudämpfen."}, {"l": "D", "t": "Den I-Term massiv reduzieren, da dieser für träges Reaktionsverhalten verantwortlich sei"}], "correct": ["C"]}, {"id": "90edd3d233", "ex": "uav", "cat": "Multicopter-Grundlagen", "q": "Welches deutsche Waffensystem aus dem Zweiten Weltkrieg gilt als früher Vorläufer moderner unbemannter Marschflugkörper?", "options": [{"l": "A", "t": "Messerschmitt Me 262"}, {"l": "B", "t": "Focke-Wulf Fw 190"}, {"l": "C", "t": "Junkers Ju 87"}, {"l": "D", "t": "V-1 (\"Fieseler Fi 103\")"}], "correct": ["D"]}, {"id": "63470f4d70", "ex": "uav", "cat": "Multicopter-Grundlagen", "q": "Welche unbemannte Aufklärungsdrohne wurde während des Vietnamkriegs in großer Stückzahl von einem DC-130-Mutterflugzeug aus gestartet?", "options": [{"l": "A", "t": "AQM-34 (Firebee)"}, {"l": "B", "t": "TDN-1"}, {"l": "C", "t": "RQ-2 Pioneer"}, {"l": "D", "t": "MQ-1 Predator"}], "correct": ["A"]}, {"id": "9ae414a5c6", "ex": "uav", "cat": "Multicopter-Grundlagen", "q": "Welches frühe funkgesteuerte Zieldrohnen-System der US Navy stammt bereits aus den 1930er Jahren?", "options": [{"l": "A", "t": "RQ-4 Global Hawk"}, {"l": "B", "t": "Curtiss N2C-2"}, {"l": "C", "t": "Bayraktar TB2"}, {"l": "D", "t": "MQ-9 Reaper"}], "correct": ["B"]}, {"id": "220a6fe8ef", "ex": "uav", "cat": "Multicopter-Grundlagen", "q": "Die TDN-1 war eine unbemannte Angriffsdrohne der US Navy aus dem Zweiten Weltkrieg. Welches Merkmal war für ihre Bauweise typisch?", "options": [{"l": "A", "t": "Ferngesteuert per Satellit"}, {"l": "B", "t": "Angetrieben durch einen Kernreaktor"}, {"l": "C", "t": "Bauweise überwiegend aus Holz/Verbundwerkstoffen, um kriegswichtiges Aluminium zu sparen"}, {"l": "D", "t": "Vollständig aus Titan gefertigt"}], "correct": ["C"]}, {"id": "73a925f0fc", "ex": "uav", "cat": "Multicopter-Grundlagen", "q": "Die RQ-2 Pioneer war eine gemeinsam von den USA und Israel entwickelte Aufklärungsdrohne, die insbesondere bekannt wurde durch ihren Einsatz in...", "options": [{"l": "A", "t": "...dem Ukrainekrieg"}, {"l": "B", "t": "...dem Zweiten Weltkrieg"}, {"l": "C", "t": "...der Mondlandung"}, {"l": "D", "t": "...dem Golfkrieg 1991"}], "correct": ["D"]}, {"id": "b15b7b5635", "ex": "uav", "cat  "8f95909696", "ex": "uav", "cat": "Aerodynamik & Flugmechanik", "q": "Eine Drohne wird um den Längen-Skalierungsfaktor λ = 3 vergrößert. Um welchen Faktor steigen dabei gemäß Froude-Skalierung ungefähr die benötigte Antriebsleistung und die Masse?", "options": [{"l": "A", "t": "Leistung ≈ 27-fach, Masse ≈ 47-fach"}, {"l": "B", "t": "Leistung ≈ 9-fach, Masse ≈ 27-fach"}, {"l": "C", "t": "Leistung ≈ 47-fach, Masse ≈ 27-fach"}, {"l": "D", "t": "Beide Größen steigen ≈ 27-fach"}], "correct": ["C"]}, {"id": "56482fd63c", "ex": "uav", "cat": "Aerodynamik & Flugmechanik", "q": "Drohne A (Multirotor, CD = 0,4 m) und Drohne B (Fixed-Wing, CD = 1,5 m) fliegen beide bei einer Bodensichtweite GV = 5 km. Welche der beiden Drohnen hat die größere gesetzlich zulässige VLOS-Distanz, und warum?", "options": [{"l": "A", "t": "Drohne A, weil Multirotoren grundsätzlich eine größere ALOS-Distanz haben"}, {"l": "B", "t": "Beide gleich groß, da die DLOS bei gleicher Sichtweite identisch ist"}, {"l": "C", "t": "Ohne Angabe der Windgeschwindigkeit nicht bestimmbar"}, {"l": "D", "t": "Drohne B (VLOS ≈ 765 m), da ihre ALOS deutlich größer ist als die von Drohne A (VLOS ≈ 150,8 m) und beide unter der gemeinsamen DLOS von 1500 m liegen"}], "correct": ["D"]}, {"id": "56dbed22c3", "ex": "uav", "cat": "Design & Antrieb", "q": "Ein LiPo-Akku mit der Bezeichnung 4S besteht aus Zellen mit je 3,7 V Nennspannung und hat eine Kapazität von 5000 mAh sowie ein C-Rating von 25C. Wie hoch ist die maximale Dauerleistung (in Watt), die dieser Akku liefern kann?", "options": [{"l": "A", "t": "125 W"}, {"l": "B", "t": "1850 W"}, {"l": "C", "t": "370 W"}, {"l": "D", "t": "462,5 W"}], "correct": ["B"]}, {"id": "23aae3ab8c", "ex": "uav", "cat": "Design & Antrieb", "q": "Ein LiPo-Pack mit der Bezeichnung 6S2P besteht aus Zellen mit je 3000 mAh Kapazität und einem C-Rating von 20C. Wie hoch ist der maximale Dauerentladestrom des GESAMTEN Packs?", "options": [{"l": "A", "t": "60 A"}, {"l": "B", "t": "20 A"}, {"l": "C", "t": "120 A"}, {"l": "D", "t": "240 A"}], "correct": ["C"]}, {"id": "40df078104", "ex": "uav", "cat": "Autopiloten & Flugmodi", "q": "Ein Flight Controller ist bereits sauber auf P und D eingestellt (kein Überschwingen, keine Oszillation), doch die Drohne driftet im Schwebeflug bei konstantem Seitenwind permanent leicht zur Seite ab, statt exakt an Ort zu bleiben. Welcher PID-Parameter behebt typischerweise genau dieses Symptom?", "options": [{"l": "A", "t": "Den D-Term erhöhen"}, {"l": "B", "t": "Den P-Term verringern"}, {"l": "C", "t": "Den P-Term erhöhen"}, {"l": "D", "t": "Den I-Term erhöhen"}], "correct": ["D"]}, {"id": "32bd76f834", "ex": "uav", "cat": "Autopiloten & Flugmodi", "q": "Im Gegensatz zu dem in Frage 7 beschriebenen Fall: Die Drohne oszilliert im Schwebeflug bei jeder kleinen Windböe mit wachsender Amplitude, bis sie fast kippt — kehrt aber nach jeder Böe wieder von selbst zurück, sobald diese abklingt. Welcher Parameter ist hier am ehesten falsch eingestellt?", "options": [{"l": "A", "t": "Der P-Term ist zu hoch eingestellt"}, {"l": "B", "t": "Der I-Term ist zu hoch eingestellt"}, {"l": "C", "t": "Der I-Term ist zu niedrig"}, {"l": "D", "t": "Der D-Term ist zu hoch eingestellt"}], "correct": ["A"]}, {"id": "bd959ecefb", "ex": "uav", "cat": "Autopiloten & Flugmodi", "q": "Warum muss die innere Regelschleife (Attitude/Rate) eines Autopiloten in der Kaskadenregelung deutlich schneller (höhere Taktrate) laufen als die äußere Positions-/Loiter-Schleife?", "options": [{"l": "A", "t": "Weil die äußere Schleife ausschließlich während der Startphase aktiv ist und danach komplett abgeschaltet wird"}, {"l": "B", "t": "Weil schnelle Störungen (z. B. Windböen, ungleiche Motorreaktion) eine hochfrequente Korrektur benötigen, während sich die Position nur träge ändert — die äußere Schleife liefert der inneren nur langsame Vorgabewerte"}, {"l": "C", "t": "Weil GPS-Daten grundsätzlich schneller verfügbar sind als IMU-Daten und die innere Schleife deshalb nur auf GPS wartet"}, {"l": "D", "t": "Weil sonst der Akku durch die zusätzliche Rechenlast der äußeren Schleife schneller leer wäre"}], "correct": ["B"]}, {"id": "2edb43d27e", "ex": "uav", "cat": "Kommunikation & Protokolle", "q": "Ein C2-Link wird von 2,4 GHz auf 900 MHz umgestellt, bei gleicher Sendeleistung und gleicher Kanalbandbreite. Was ist die realistische Konsequenz?", "options": [{"l": "A", "t": "Größere Reichweite UND größere Datenrate, da niedrigere Frequenzen grundsätzlich überlegen sind"}, {"l": "B", "t": "Geringere Reichweite und geringere Datenrate gleichzeitig"}, {"l": "C", "t": "Größere Reichweite durch geringere Pfaddämpfung, aber tendenziell geringere maximal mögliche Datenrate"}, {"l": "D", "t": "Keine Änderung, da nur die Sendeleistung die Reichweite bestimmt"}], "correct": ["C"]}, {"id": "c80451f2f7", "ex": "uav", "cat": "Kommunikation & Protokolle", "q": "Ein Ingenieur verdoppelt die Kanalbandbreite B eines Funklinks, hält die Sendeleistung aber konstant. Warum fällt die tatsächliche Verbesserung der Datenrate nach Shannon-Hartley oft deutlich geringer aus, als eine reine Verdopplung von B vermuten lässt?", "options": [{"l": "A", "t": "Weil die Datenrate nach Shannon-Hartley ausschließlich von der Frequenz abhängt, nicht von der Bandbreite"}, {"l": "B", "t": "Weil doppelte Bandbreite automatisch die Sendeleistung halbiert"}, {"l": "C", "t": "Weil Shannon-Hartley nur für analoge Signale gilt"}, {"l": "D", "t": "Weil das Rauschen proportional mit der Bandbreite mitwächst, wodurch das SNR sinkt und der log₂(1+SNR)-Term den Bandbreitengewinn teilweise kompensiert"}], "correct": ["D"]}, {"id": "4e4f7b17fe", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "Eine autonom per Kamera navigierende Drohne wird zusätzlich per Glasfaserkabel gesteuert. Welche Kombination aus Detektion und Gegenmaßnahme ist gegen diese Bedrohung die einzig realistische?", "options": [{"l": "A", "t": "Detektion via Radar oder EO/IR, Mitigation ausschließlich per Hard-Kill (z. B. Laser, Kinetik), da alle Soft-Kill-Maßnahmen wirkungslos sind"}, {"l": "B", "t": "Detektion via passivem RF-Scanner, Mitigation via GNSS-Spoofing"}, {"l": "C", "t": "Detektion via C2-Signalpeilung, Mitigation via C2-Jamming"}, {"l": "D", "t": "Detektion ist unmöglich, jede Gegenmaßnahme ist zwecklos"}], "correct": ["A"]}, {"id": "34ca3c5cad", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "Ein Schwarm aus 50 kleinen FPV-Drohnen nähert sich gleichzeitig einem Objekt. Ein klassisches Einzelziel-Tracking-Radar kann zwar Rückstreuung von allen Drohnen empfangen, aber die einzelnen Drohnen nicht sauber trennen und lokalisieren. Welche Zusatztechnologie adressiert genau dieses Lokalisierungsproblem bei großen Schwärmen?", "options": [{"l": "A", "t": "Ein zweites, baugleiches Tracking-Radar, das durch Triangulation dieselbe Trennschärfe wie LiDAR erreichen soll"}, {"l": "B", "t": "LiDAR, das laut aktueller Forschung auch bei 500+ Drohnen noch dezimetergenaue Einzel-Lokalisierung ermöglicht"}, {"l": "C", "t": "Akustische Mikrofon-Arrays, deren Auflösung bei 50 gleichzeitig fliegenden Drohnen für eine Einzeltrennung nicht ausreicht"}, {"l": "D", "t": "Passive RF-Peilung (TDOA), die allerdings bei funkstillen oder dicht fliegenden Drohnen an ihre Grenzen stößt"}], "correct": ["B"]}, {"id": "de4c377a72", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Ein Indoor-UAV fliegt in einer Lagerhalle mit viel verbautem Stahl (Magnetometer stark gestört), ohne GPS-Empfang, über einem einfarbigen, schlecht beleuchteten Boden (Optical Flow unzuverlässig). Welche Sensortechnologie bleibt für eine stabile Positionsschätzung realistisch übrig?", "options": [{"l": "A", "t": "Ein zweites Optical-Flow-Modul mit höherer Auflösung"}, {"l": "B", "t": "Ausschließlich das Magnetometer mit Filterung"}, {"l": "C", "t": "LiDAR/SLAM in Kombination mit der IMU"}, {"l": "D", "t": "RTK-GNSS mit Referenzstation"}], "correct": ["C"]}, {"id": "4c33a2ff3e", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Warum liefert die Kombination aus GPS UND Barometer eine bessere Höhenschätzung als GPS allein, obwohl beide Sensoren grundsätzlich absolute Höhe messen können?", "options": [{"l": "A", "t": "Weil GPS und Barometer nahezu identische systematische Fehlerquellen haben und sich bei der Fusion gegenseitig verstärken"}, {"l": "B", "t": "Weil das Barometer laut Kurs die einzige Sensorart ist, die überhaupt eine absolute Höhe bestimmen kann"}, {"l": "C", "t": "Weil GPS-Empfänger konstruktionsbedingt grundsätzlich überhaupt keine Höheninformation liefern können"}, {"l": "D", "t": "Weil GPS-Höhenmessung durch die ungünstige vertikale Satellitengeometrie deutlich ungenauer ist als die horizontale Positionsbestimmung, während das Barometer kurzfristige Höhenänderungen sehr präzise erfasst — die Fusion kombiniert beide Stärken"}], "correct": ["D"]}, {"id": "231e8e2ea4", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Ein Betreiber möchte eine 22 kg schwere, C3-klassifizierte Drohne für eine reguläre Vermessungsaufgabe einsetzen. Die Drohne fliegt unter 100 m Höhe, rein auf Sichtweite, weit entfernt von Personen und Wohngebieten (>150 m), transportiert kein Gefahrgut. Warum reicht die Klasse C3 hier NICHT automatisch für die Unterkategorie A3 aus, sondern es muss zusätzlich das MTOM-Limit geprüft werden?", "options": [{"l": "A", "t": "Weil die Unterkategorie A3 laut Vorschrift ausschließlich für C0- und C1-klassifizierte Drohnen zugelassen ist"}, {"l": "B", "t": "Weil die Unterkategorie A3 zusätzlich zur C-Klasse ein MTOM-Limit von unter 25 kg voraussetzt — 22 kg liegt zwar knapp darunter, macht aber deutlich, dass die Prüfung nicht bei der C-Klasse allein aufhören darf"}, {"l": "C", "t": "Weil C3-klassifizierte Drohnen grundsätzlich ausschließlich in der Speziellen Kategorie mit SORA-Genehmigung fliegen dürfen"}, {"l": "D", "t": "Weil C3-Drohnen laut Bauvorschrift grundsätzlich kein Gefahrgut transportieren dürfen, unabhängig vom MTOM-Limit"}], "correct": ["B"]}, {"id": "7ee93b41ff", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Wofür steht die Abkürzung UAS?", "options": [{"l": "A", "t": "Universal Avionics Standard"}, {"l": "B", "t": "Unmanned Autonomous Ship"}, {"l": "C", "t": "Unmanned Aircraft System (Fluggerät + Steuerstation + C2-Link)"}, {"l": "D", "t": "Unmanned Air Surveillance"}], "correct": ["C"]}, {"id": "156bc341b1", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Worin unterscheidet sich der Begriff RPAS von UAV?", "options": [{"l": "A", "t": "RPAS sind immer autonom, UAV immer ferngesteuert."}, {"l": "B", "t": "RPAS ist der militärische, UAV der rein zivile Begriff."}, {"l": "C", "t": "RPAS bezeichnet ausschließlich Multicopter, UAV nur Starrflügler."}, {"l": "D", "t": "RPAS (Remotely Piloted Aircraft System) betont die ferngesteuerte Führung durch einen verantwortlichen Piloten; ein UAV kann auch vollautonom fliegen."}], "correct": ["D"]}, {"id": "0dc2ea75f6", "ex": "uav", "cat": "Recht & Regulatorik", "q": "In welche drei Betriebskategorien teilt die EASA den zivilen Drohnenbetrieb ein?", "options": [{"l": "A", "t": "Open, Specific, Certified"}, {"l": "B", "t": "VLOS, EVLOS, BVLOS"}, {"l": "C", "t": "Leicht, Mittel, Schwer"}, {"l": "D", "t": "A1, A2, A3"}], "correct": ["A"]}, {"id": "643170f39c", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Welche Aussage beschreibt die EASA-Kategorie „Open\" korrekt?", "options": [{"l": "A", "t": "Hohes Risiko, Zulassung wie in der bemannten Luftfahrt."}, {"l": "B", "t": "Geringes Risiko, keine Betriebsgenehmigung nötig, MTOM < 25 kg, grundsätzlich in Sichtweite (VLOS) und max. 120 m über Grund."}, {"l": "C", "t": "Nur für rein autonome Flüge ohne Fernpilot zulässig."}, {"l": "D", "t": "Mittleres Risiko, immer mit SORA-Risikobewertung und Betriebsgenehmigung."}], "correct": ["B"]}, {"id": "f8d1a314e7", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Wovon hängt die Zuordnung eines Betriebs zur Kategorie „Specific\" ab?", "options": [{"l": "A", "t": "Ausschließlich davon, ob die Drohne über einen zertifizierten Rettungsfallschirm verfügt."}, {"l": "B", "t": "Ausschließlich vom reinen Startgewicht der Drohne, unabhängig von Betriebsart oder Umgebung."}, {"l": "C", "t": "Vom erhöhten Risiko, das über eine Risikobewertung (SORA) bewertet wird und eine Betriebsgenehmigung, STS oder LUC erfordert."}, {"l": "D", "t": "Ausschließlich von der vorgeschriebenen Farbe der verbauten Positionslichter."}], "correct": ["C"]}, {"id": "d158038814", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Was regeln die Unterkategorien A1, A2 und A3 der Open-Kategorie?", "options": [{"l": "A", "t": "Drei gesetzlich vorgeschriebene Stufen der maximal zulässigen Batteriekapazität."}, {"l": "B", "t": "Die maximale Flughöhe in drei gesetzlich festgelegten Stufen von 30, 60 und 120 Metern."}, {"l": "C", "t": "Die drei ausschließlich für Drohnen erlaubten Funkfrequenzbänder innerhalb der Open-Kategorie."}, {"l": "D", "t": "Die zulässige Nähe zu unbeteiligten Personen (A1 nahe/über Einzelpersonen, A2 mit Sicherheitsabstand, A3 weit entfernt von Menschen)."}], "correct": ["D"]}, {"id": "c1922e9e1f", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Was kennzeichnet die C-Klassen (C0 bis C4) bei EASA-Drohnen?", "options": [{"l": "A", "t": "Produktklassen mit steigenden Anforderungen (u. a. Gewicht/MTOM) für den Betrieb in der Open-Kategorie."}, {"l": "B", "t": "Die Farbcodierung der zulässigen Lufträume."}, {"l": "C", "t": "Die Anzahl der Rotoren (C0 = kein Rotor, C4 = vier Rotoren)."}, {"l": "D", "t": "Die Verschlüsselungsstufe des Funk-Links."}], "correct": ["A"]}, {"id": "1c326cfc2e", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Ab welcher Startmasse gilt eine Drohne der Klasse C0 typischerweise?", "options": [{"l": "A", "t": "unter 4 kg"}, {"l": "B", "t": "unter 250 g"}, {"l": "C", "t": "unter 25 kg"}, {"l": "D", "t": "unter 900 g"}], "correct": ["B"]}, {"id": "5bc7ace688", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Welche Voraussetzung ist charak : "uav", "cat": "Recht & Regulatorik", "q": "Eine Drohne mit 1,2 kg MTOM soll in geringem Abstand zu unbeteiligten Personen betrieben werden. Warum ist ein reiner A1-Betrieb hier i. d. R. unzulässig?", "options": [{"l": "A", "t": "Weil A1 den Betrieb nahe an Personen nur bis Klasse C1 (< 900 g) erlaubt; 1,2 kg liegt darüber, sodass eher A2 (C2, mit Abstand) oder die Specific-Kategorie greift."}, {"l": "B", "t": "Weil die Unterkategorie A1 ausschließlich für Starrflügler gilt und Multicopter grundsätzlich ausschließt."}, {"l": "C", "t": "Weil A1 grundsätzlich einen zertifizierten Rettungsfallschirm für den Betrieb nahe Personen zwingend vorschreibt."}, {"l": "D", "t": "Weil A1 grundsätzlich nur bei Dunkelheit und mit zusätzlicher Beleuchtung erlaubt ist."}], "correct": ["A"]}, {"id": "573100521a", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Eine geplante BVLOS-Mission ergibt in der SORA eine hohe Ground Risk Class, aber eine niedrige Air Risk Class. Was folgt daraus primär?", "options": [{"l": "A", "t": "Der Betrieb ist automatisch verboten."}, {"l": "B", "t": "Es steigen vor allem die Anforderungen an Maßnahmen zur Minderung des Bodenrisikos (und das geforderte SAIL); die Luftraum-Auflagen bleiben moderat."}, {"l": "C", "t": "Die Drohne muss zwingend schwerer als 25 kg sein."}, {"l": "D", "t": "Es müssen ausschließlich zusätzliche Funkfrequenzen beantragt werden."}], "correct": ["B"]}, {"id": "c8c3575091", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Warum reicht „Direct Remote ID\" allein nicht aus, um in dichtem BVLOS-Verkehr Kollisionen zu verhindern?", "options": [{"l": "A", "t": "Weil Remote ID-Signale technisch ausschließlich von Polizeibehörden empfangen werden können, nicht von anderen Luftfahrzeugen."}, {"l": "B", "t": "Weil Remote ID bei Erkennung eines Konflikts automatisch die Motoren der betroffenen Drohne abschaltet."}, {"l": "C", "t": "Weil Remote ID nur der Identifikation/Nachverfolgung dient, nicht der aktiven Staffelung – dafür braucht es Detect-and-Avoid bzw. U-space-Verkehrsinformation und Konfliktlösung."}, {"l": "D", "t": "Weil Remote ID nur am Boden funktioniert und ihr Signal in der Luft durch die eigenen Rotoren abgeschirmt wird."}], "correct": ["C"]}, {"id": "319b73dacf", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Ab wann fällt ein ansonsten „Open\"-tauglicher Flug trotzdem in die Specific-Kategorie?", "options": [{"l": "A", "t": "Sobald die Drohne älter als zwei Jahre ist, unabhängig von ihrem technischen Zustand oder ihrer Klassifizierung."}, {"l": "B", "t": "Sobald sich das Wetter merklich verschlechtert, unabhängig von Flughöhe, Gewicht oder Sichtweite."}, {"l": "C", "t": "Sobald mehr als ein Ersatzakku mitgeführt wird, da dies als erhöhtes Betriebsrisiko gilt."}, {"l": "D", "t": "Sobald eine Betriebsbedingung die Open-Grenzen verlässt – z. B. BVLOS, über 120 m Höhe, MTOM ≥ 25 kg oder Flug über Menschenansammlungen."}], "correct": ["D"]}, {"id": "cb57f10477", "ex": "uav", "cat": "Design & Antrieb", "q": "Ein Quadrocopter wiegt 1,2 kg; jeder seiner vier Motoren liefert maximal 900 g Schub. Wie groß ist das maximale Schub-Gewichts-Verhältnis?", "options": [{"l": "A", "t": "etwa 3,0 : 1"}, {"l": "B", "t": "etwa 0,75 : 1"}, {"l": "C", "t": "etwa 4,0 : 1"}, {"l": "D", "t": "etwa 1,3 : 1"}], "correct": ["A"]}, {"id": "c98b24c350", "ex": "uav", "cat": "Design & Antrieb", "q": "Warum gilt ein Schub-Gewichts-Verhältnis von rund 2 : 1 als gängige Auslegungsempfehlung für Multicopter?", "options": [{"l": "A", "t": "Weil die EASA in ihren Bauvorschriften ein Schub-Gewichts-Verhältnis von exakt 2:1 als verbindlichen Grenzwert vorschreibt."}, {"l": "B", "t": "Weil es genügend Reserve für Steuerbarkeit, Beschleunigung und Störungskompensation (Wind, Manöver) bietet, ohne unnötig ineffizient überdimensioniert zu sein."}, {"l": "C", "t": "Weil ein geringeres Schub-Gewichts-Verhältnis die Kalibrierung des Kompasses am Boden technisch unmöglich macht."}, {"l": "D", "t": "Weil ein Schub-Gewichts-Verhältnis unter 2:1 dazu führt, dass sich der Akku während des Fluges nicht mehr laden lässt."}], "correct": ["B"]}, {"id": "4d9a3d0958", "ex": "uav", "cat": "Design & Antrieb", "q": "Warum ist ein klassischer Quadrocopter nach Ausfall eines einzelnen Motors i. d. R. nicht mehr kontrolliert steuerbar, ein Hexacopter dagegen oft schon?", "options": [{"l": "A", "t": "Weil der Quadrocopter einen Motorausfall softwareseitig überhaupt nicht erkennen und melden kann"}, {"l": "B", "t": "Weil der Quadrocopter durch den fehlenden Motor spürbar leichter wird und dadurch instabil wird"}, {"l": "C", "t": "Weil beim Quad nach dem Ausfall das nötige Gegendrehmoment und die Steuerbarkeit um alle Achsen fehlen; sechs Motoren bieten genug Redundanz, um Gier- und Lageregelung aufrechtzuerhalten."}, {"l": "D", "t": "Weil ein Hexacopter im Gegensatz zum Quadrocopter grundsätzlich ganz ohne Flight Controller auskommt"}], "correct": ["C"]}, {"id": "dba0d128a0", "ex": "uav", "cat": "Design & Antrieb", "q": "Wie hoch ist der theoretische maximale Dauer-Entladestrom eines 4S-LiPo mit 5000 mAh und 25C?", "options": [{"l": "A", "t": "25 A"}, {"l": "B", "t": "100 A"}, {"l": "C", "t": "20 A"}, {"l": "D", "t": "125 A"}], "correct": ["D"]}, {"id": "9dc020f5f3", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Warum driftet eine rein IMU-basierte Positionsschätzung schnell, und was begrenzt diese Drift?", "options": [{"l": "A", "t": "Weil die doppelte Integration der Beschleunigung kleine Messfehler mit der Zeit stark anwachsen lässt; GNSS, Optical Flow oder Vision stützen und begrenzen die Drift."}, {"l": "B", "t": "Weil die IMU nur bei Nacht funktioniert; Scheinwerfer begrenzen die Drift."}, {"l": "C", "t": "Weil das Barometer die IMU stört; dessen Abschaltung begrenzt die Drift."}, {"l": "D", "t": "Weil die IMU den Akku entlädt; ein größerer Akku begrenzt die Drift."}], "correct": ["A"]}, {"id": "ca16a346d6", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Eine Vermessungsdrohne soll cm-genau georeferenzieren, ohne am Boden Passpunkte auszulegen. Welche Lösung ist am geeignetsten?", "options": [{"l": "A", "t": "Nur der Magnetkompass zur Ausrichtung."}, {"l": "B", "t": "RTK/PPK-GNSS mit Trägerphasenkorrektur, zeitsynchron zum Kameraauslöser."}, {"l": "C", "t": "Nur das Barometer zur Höhenreferenz."}, {"l": "D", "t": "Standard-GNSS (Meter-Genauigkeit) mit Mittelung."}], "correct": ["B"]}, {"id": "3d154e341c", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Beim Start beginnt eine GPS-Drohne, sich spiralförmig um einen Punkt zu drehen („Toilet-Bowl-Effekt\"). Was ist die wahrscheinlichste Ursache?", "options": [{"l": "A", "t": "Ein nahezu leerer Akku, der kurz vor dem automatischen Landevorgang steht"}, {"l": "B", "t": "Eine defekte Kamera, deren Bildsignal für die Positionsbestimmung ausfällt"}, {"l": "C", "t": "Eine fehlerhafte oder gestörte Kompasskalibrierung, sodass der Kursbezug bei der GPS-Positionshaltung falsch ist."}, {"l": "D", "t": "Ein Akku mit einer für die Motoren zu hoch gewählten C-Rate"}], "correct": ["C"]}, {"id": "512a57204d", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Warum zeigt ein Beschleunigungssensor auch im ruhenden Zustand rund 1 g an?", "options": [{"l": "A", "t": "Weil die Erdrotation um die eigene Achse eine konstante Beschleunigung von 1 g erzeugt."}, {"l": "B", "t": "Weil der Sensor grundsätzlich defekt ist und ein falsches Ruhesignal ausgibt."}, {"l": "C", "t": "Weil ihn die hochfrequente Motorvibration systematisch um genau 1 g verfälscht."}, {"l": "D", "t": "Weil er die spezifische Kraft misst – einschließlich der stützenden Reaktionskraft gegen die Gravitation – und nicht die reine kinematische Beschleunigung."}], "correct": ["D"]}, {"id": "24d82ab19a", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "Warum bietet 5,8-GHz-FPV-Video gegenüber 2,4 GHz mehr nutzbare Bandbreite, aber geringere Reichweite und Durchdringung?", "options": [{"l": "A", "t": "Weil die höhere Frequenz mehr Bandbreite erlaubt, aber stärker gedämpft wird und Hindernisse schlechter umbeugt/durchdringt."}, {"l": "B", "t": "Weil 2,4 GHz gar kein Video übertragen kann."}, {"l": "C", "t": "Weil 5,8 GHz nur über Satellit funktioniert."}, {"l": "D", "t": "Weil 5,8 GHz langsamer schwingt als 2,4 GHz."}], "correct": ["A"]}, {"id": "cd74c41332", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "Was geschieht im Freiraum mit der empfangenen Signalleistung, wenn sich die Entfernung zwischen Sender und Empfänger verdoppelt?", "options": [{"l": "A", "t": "Sie bleibt unverändert."}, {"l": "B", "t": "Sie sinkt auf ein Viertel (−6 dB)."}, {"l": "C", "t": "Sie sinkt auf ein Achtel (−9 dB)."}, {"l": "D", "t": "Sie halbiert sich (−3 dB)."}], "correct": ["B"]}, {"id": "049e73e619", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "Während einer BVLOS-Mission bricht der C2-Link ab, weil die Drohne hinter einem Hügel ist. Welche Auslegung minimiert das Bodenrisiko am besten?", "options": [{"l": "A", "t": "Das unveränderte Weiterfliegen in der zuletzt eingeschlagenen Richtung ohne jede Reaktion"}, {"l": "B", "t": "Das einfache Warten in der Luft auf einen telefonischen Anruf des zuständigen Fluglotsen"}, {"l": "C", "t": "Ein vordefiniertes Lost-Link-Failsafe (auf sichere Höhe steigen und definierte RTH-Route abfliegen), abgesichert durch ein unabhängiges Flight Termination System als Rückfallebene."}, {"l": "D", "t": "Ein sofortiger, bedingungsloser Motorstopp unabhängig vom aktuellen Aufenthaltsort der Drohne"}], "correct": ["C"]}, {"id": "aa8efd47fe", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "Warum ist ADS-B-Empfang an Bord einer Drohne für Detect-and-Avoid hilfreich, aber kein Allheilmittel?", "options": [{"l": "A", "t": "Weil der ADS-B-Empfang elektromagnetische Störungen verursacht, die die Motorregler beeinträchtigen"}, {"l": "B", "t": "Weil ADS-B ausschließlich meteorologische Wetterdaten und keinerlei Verkehrsinformationen überträgt"}, {"l": "C", "t": "Weil ADS-B-Empfänger technisch nur am Boden, nicht aber während des Flugs an Bord funktionieren können"}, {"l": "D", "t": "Weil man damit nur kooperative, selbst ADS-B aussendende Luftfahrzeuge „sieht\"; nicht-kooperative Objekte (z. B. Segelflugzeuge oder Drohnen ohne ADS-B) bleiben unsichtbar und erfordern zusätzliche Sensorik."}], "correct": ["D"]}]</script>
<script>
const ALL=JSON.parse(document.getElementById('data').textContent);
const CATS=["FADEC & Triebwerksregelung", "Fly-by-Wire & Flugsteuerung", "Autopilot & Flight Management System", "Autonomie, KI & Human Factors", "Redundanz & Sicherheitsanalyse", "Luftdatensensorik (Pitot, AoA, ADC)", "Inertialnavigation & Sensorfusion", "Funknavigation & Höhenmessung", "GNSS & Satellitennavigation", "Kommunikation (Funk & Datalink)", "Überwachung (Radar, ADS-B, TCAS)", "Normen, Zulassung & Zertifizierung", "Energieversorgung & Bordnetze", "Datenbusse & Avionik-Architektur", "Avionik Grundlagen"];const EXAMS=[{"id": "avionik", "name": "✈️ Avionik", "cats": ["FADEC & Triebwerksregelung", "Fly-by-Wire & Flugsteuerung", "Autopilot & Flight Management System", "Autonomie, KI & Human Factors", "Redundanz & Sicherheitsanalyse", "Luftdatensensorik (Pitot, AoA, ADC)", "Inertialnavigation & Sensorfusion", "Funknavigation & Höhenmessung", "GNSS & Satellitennavigation", "Kommunikation (Funk & Datalink)", "Überwachung (Radar, ADS-B, TCAS)", "Normen, Zulassung & Zertifizierung", "Energieversorgung & Bordnetze", "Datenbusse & Avionik-Architektur", "Avionik Grundlagen"]}, {"id": "uav", "name": "🚁 UAV & Drohnen", "cats": ["Multicopter-Grundlagen", "Design & Antrieb", "Aerodynamik & Flugmechanik", "Sensorik & Navigation", "Autopiloten & Flugmodi", "Kommunikation & Protokolle", "Counter-UAS & Sicherheit", "Recht & Regulatorik", "Betrieb & Anwendungen"]}];const GLOSSARY={"FBW": "Fly-by-Wire – elektronische Flugsteuerung: Piloteneingaben gehen als elektrische Signale an Rechner, die die Steuerflächen bewegen (keine mechanische Verbindung).", "Fly-by-Wire": "Elektronische Flugsteuerung ohne mechanische Verbindung zwischen Steuerorgan und Ruder; Signale laufen über Flugsteuerungsrechner.", "FCC": "Flight Control Computer – Flugsteuerungsrechner, der Piloteneingaben in Steuerbefehle umsetzt und die Flugbereichsgrenzen überwacht.", "FCPC": "Flight Control Primary Computer – primärer Flugsteuerungsrechner im Fly-by-Wire-System (Airbus).", "Normal Law": "Normaler Fly-by-Wire-Modus mit vollem Flugbereichsschutz (Hard Limits); der Computer verhindert kritische Fluglagen.", "Alternate Law": "Degradierter FBW-Modus nach Sensor-/Rechnerausfällen: reduzierter Schutz, einige Envelope Protections entfallen.", "Direct Law": "Stärkste FBW-Degradation: Steuereingaben gehen direkt und ungefiltert an die Ruder, keine Schutzfunktionen mehr.", "Envelope Protection": "Flugbereichsschutz – automatische Begrenzung, die verhindert, dass das Flugzeug kritische Zustände (z. B. Strömungsabriss, Überlast) erreicht.", "Hard Limit": "Absolute, vom Piloten nicht überschreitbare Systemgrenze (Airbus Normal Law).", "Soft Limit": "Grenze, die der Pilot mit erhöhtem Kraftaufwand bewusst überschreiten kann (Boeing-Philosophie).", "SAS": "Stability Augmentation System – dämpft automatisch Eigenschwingungen (z. B. Phugoide) und entlastet den Piloten.", "Artificial Feel": "Künstliches Steuergefühl: Feder-Dämpfer-System erzeugt eine Gegenkraft am Sidestick, da bei FBW die echte Rückmeldung der Luftkräfte fehlt.", "Inceptor": "Elektronisches Steuerorgan im Cockpit (z. B. Sidestick), das den Steuerwunsch rein elektrisch erfasst.", "EHA": "Elektrohydrostatischer Aktuator – erzeugt die Stellkraft lokal aus Strom über eine eigene kleine Hydraulikpumpe (Power-by-Wire).", "EMA": "Elektromechanischer Aktuator – bewegt die Steuerfläche rein mechanisch (Motor + Spindel), ganz ohne Hydraulikflüssigkeit.", "Power-by-Wire": "Konzept, bei dem die Stellkraft erst lokal am Aktuator aus elektrischem Strom erzeugt wird, statt über zentrale Hydraulikleitungen.", "FMS": "Flight Management System – plant und optimiert die Flugroute (4D-Trajektorie) und speist Vorgaben an den Autopiloten.", "FMC": "Flight Management Computer – der Rechner, der die FMS-Funktionen ausführt.", "MCDU": "Multipurpose Control and Display Unit – Ein-/Ausgabeeinheit im Cockpit zur Bedienung des FMS.", "EFIS": "Electronic Flight Instrument System – elektronische Anzeigebildschirme (PFD/ND) statt analoger Zeigerinstrumente.", "Cost Index": "Kennzahl im FMS, die Zeitkosten gegen Treibstoffkosten gewichtet und daraus die wirtschaftlichste Geschwindigkeit bestimmt.", "Top of Descent": "Vom FMS berechneter Punkt, ab dem der treibstoffoptimale Sinkflug zum Ziel eingeleitet werden sollte.", "Flare": "Abfangbogen kurz vor dem Aufsetzen – bei Autoland durch den Radarhöhenmesser ausgelöst.", "Kalman-Filter": "Rekursiver Schätzer, der ungenaue Messungen (z. B. GPS) und driftende Sensoren (z. B. IRS) optimal zur besten Positionsschätzung fusioniert.", "FORDEC": "Entscheidungsmethode im Cockpit: Facts, Options, Risks, Decision, Execution, Check.", "ALFUS": "Autonomy Levels for Unmanned Systems – Rahmenmodell zur Einordnung von Autonomiegraden (Mission-, Umgebungskomplexität, Human Independence).", "Auto-GCAS": "Automatic Ground Collision Avoidance System – leitet bei drohender Bodenkollision autonom einen Steigflug ein.", "FADEC": "Full Authority Digital Engine Control – digitale Triebwerkssteuerung mit voller Autorität, ohne mechanische Rückfallebene.", "EEC": "Electronic Engine Control – ältere, nur teil-elektronische Triebwerkssteuerung (Vorläufer der FADEC).", "PMG": "Permanentmagnetgenerator – versorgt die FADEC ab einer bestimmten Triebwerksdrehzahl autark mit Strom, unabhängig vom Bordnetz.", "EPR": "Engine Pressure Ratio – Triebwerks-Druckverhältnis, von manchen Herstellern (z. B. Rolls-Royce) als Schub-Regelgröße genutzt.", "N1": "Drehzahl der Fan-/Niederdruckwelle; von GE/PW häufig als Schub-Regelgröße der FADEC genutzt.", "Pitot": "Staudrucksonde: misst den Gesamtdruck (Pt) der frontal anströmenden, im Rohr abgebremsten Luft.", "TAT": "Total Air Temperature – Gesamttemperatur der bis zum Stillstand abgebremsten Luft; höher als SAT wegen kinetischer Aufheizung.", "SAT": "Static Air Temperature – ungestörte statische Außenlufttemperatur.", "IAS": "Indicated Airspeed – angezeigte Fluggeschwindigkeit, direkt aus dem dynamischen Druck (q) abgeleitet.", "TAS": "True Airspeed – wahre Eigengeschwindigkeit gegenüber der Luftmasse, IAS korrigiert um Luftdichte.", "CAS": "Calibrated Airspeed – um Instrumenten-/Einbaufehler korrigierte angezeigte Geschwindigkeit.", "AoA": "Angle of Attack – Anstellwinkel zwischen Profilsehne des Flügels und der Anströmrichtung der Luft.", "ADC": "Air Data Computer – berechnet aus Drücken und Temperatur die Luftdaten (Höhe, IAS, TAS, Mach).", "ADS": "Air Data System – Gesamtsystem der Luftdatenerfassung (Sonden, Ports, ADC).", "ADIRU": "Air Data Inertial Reference Unit – vereint Luftdatenreferenz (ADR) und Trägheitsreferenz (IR) in einem Gerät.", "ADIRS": "Air Data Inertial Reference System – das Gesamtsystem aus mehreren ADIRUs.", "IRS": "Inertial Reference System – Trägheitsnavigation: ermittelt Lage und Position aus Beschleunigungs- und Drehratensensoren, ohne externe Signale.", "INS": "Inertial Navigation System – Trägheitsnavigationssystem (klassische Bezeichnung des IRS).", "IMU": "Inertial Measurement Unit – Sensorblock aus je drei orthogonalen Beschleunigungs- und Drehratensensoren.", "Sagnac": "Sagnac-Effekt: Dreht sich ein optischer Ringkreisel, entsteht eine Frequenzdifferenz zwischen zwei gegenläufigen Lichtstrahlen – Maß für die Drehrate.", "RLG": "Ring Laser Gyro – optischer Drehratensensor, der den Sagnac-Effekt mit Laserstrahlen nutzt (verschleißfrei).", "Schuler": "Schuler-Schwingung: ungedämpfte Fehleroszillation der Trägheitsnavigation mit ca. 84 min Periode, heute meist per GPS gestützt.", "Specific Force": "Spezifische Kraft – das, was ein Beschleunigungssensor misst: Summe aus Bewegungsbeschleunigung und lokaler Gravitation.", "Strapdown": "Bauweise, bei der die Inertialsensoren starr mit der Flugzeugstruktur verbunden sind; die Rotation wird rechnerisch nachgeführt (statt mechanisch kardanisch).", "ILS": "Instrument Landing System – Instrumentenlandesystem aus Localizer (horizontal) und Glide Slope (vertikal).", "Localizer": "ILS-Sender für die horizontale Führung (Landebahn-Mittellinie), im VHF-Band 108–112 MHz.", "Glide Slope": "ILS-Sender für die vertikale Führung (typisch 3° Sinkwinkel), im UHF-Band.", "VOR": "VHF Omnidirectional Range – Funkfeuer, das per Phasenvergleich den magnetischen Kurs (Radial) zur Station liefert.", "DME": "Distance Measuring Equipment – misst die Schrägentfernung zur Bodenstation über die Laufzeit von Impulspaaren.", "NDB": "Non-Directional Beacon – ungerichtetes Funkfeuer; liefert nur die Peilung zur Station, keine Entfernung.", "RADALT": "Radio Altimeter / Radarhöhenmesser – misst per Radar den tatsächlichen Bodenabstand (AGL), unabhängig von Luftdruck und Wetter.", "AGL": "Above Ground Level – Höhe über dem Boden (im Gegensatz zur barometrischen Höhe über Meeresspiegel).", "GPWS": "Ground Proximity Warning System – warnt vor gefährlicher Bodenannäherung.", "EGPWS": "Enhanced GPWS – GPWS mit Geländedatenbank für vorausschauende Warnungen.", "GNSS": "Global Navigation Satellite System – Oberbegriff für Satellitennavigationssysteme (GPS, Galileo, GLONASS, BeiDou).", "GPS": "Global Positioning System – US-Satellitennavigation; Position aus Laufzeitmessung zu mind. 4 Satelliten.", "SBAS": "Satellite-Based Augmentation System – verbessert GNSS-Genauigkeit/Integrität über geostationäre Satelliten (z. B. für LPV-Anflüge).", "GBAS": "Ground-Based Augmentation System – lokale GNSS-Korrektur per Bodensender am Flughafen für Präzisionsanflüge.", "RAIM": "Receiver Autonomous Integrity Monitoring – bordautonome Überwachung der GNSS-Signalintegrität.", "RNP": "Required Navigation Performance – leistungsbasierte Navigationsanforderung mit Genauigkeit und bordeigener Integritätsüberwachung.", "PBN": "Performance-Based Navigation – Navigation nach messbaren Leistungsvorgaben statt starrer Funkfeuer-Routen.", "ADS-B": "Automatic Dependent Surveillance-Broadcast – das Flugzeug ermittelt seine Position per GNSS und sendet sie unaufgefordert (1090 MHz).", "SSR": "Sekundärradar – fragt den Transponder des Flugzeugs ab; liefert Kennung und Höhe (kooperativ).", "PSR": "Primärradar – ortet Ziele rein über Reflexion von Mikrowellen; erfasst auch Ziele ohne Transponder, aber ohne Kennung/Höhe.", "TCAS": "Traffic Alert and Collision Avoidance System – bordautonomes Antikollisionssystem, gibt vertikale Ausweichempfehlungen (RA).", "RA": "Resolution Advisory – verbindliche, koordinierte Ausweichempfehlung des TCAS (Steigen/Sinken).", "TA": "Traffic Advisory – Verkehrshinweis des TCAS, Vorstufe zur Resolution Advisory.", "Squawk": "Vierstelliger Transpondercode (Mode A), den der Lotse dem Flugzeug zur Identifizierung zuweist.", "CPDLC": "Controller Pilot Data Link Communications – Text-Datenlink zwischen Lotse und Pilot; entlastet den Sprechfunk.", "ACARS": "Aircraft Communications Addressing and Reporting System – älteres System für kurze betriebliche Datennachrichten (VHF/SATCOM).", "SATCOM": "Satellitenkommunikation – Daten-/Sprachverbindung über Satelliten (z. B. Inmarsat, Iridium), auch über Ozeanen.", "MLAT": "Multilateration – bestimmt die Position über Laufzeitunterschiede (TDOA) eines Transpondersignals an mehreren Bodenempfängern.", "CNS": "Communication, Navigation, Surveillance – die drei Säulen der Flugverkehrsdienste.", "EHS": "Enhanced Surveillance – Mode-S-Erweiterung, die zusätzliche Bordparameter (Kursabsicht, Rollrate, Geschwindigkeit) übermittelt.", "MEA": "More Electric Aircraft – Konzept, bei dem hydraulische/pneumatische Funktionen zunehmend elektrisch ersetzt werden (z. B. B787).", "APU": "Auxiliary Power Unit – kleine Gasturbine (meist im Heck), liefert Strom und Druckluft am Boden und als Reserve im Flug.", "GPU": "Ground Power Unit – externe Bodenstromversorgung am Gate (z. B. 115 V AC / 28 V DC), entlastet APU und Triebwerke.", "RAT": "Ram Air Turbine – ausklappbare Notfallturbine, die vom Fahrtwind angetrieben bei Totalausfall flugkritische Systeme versorgt.", "CSD": "Constant Speed Drive – Ausgleichsgetriebe, das die variable Triebwerksdrehzahl konstant hält, damit der Generator exakt 400 Hz liefert.", "IDG": "Integrated Drive Generator – Kombination aus Constant Speed Drive und Generator in einem Gehäuse.", "TRU": "Transformer Rectifier Unit – wandelt Wechselspannung (115 V AC) in Gleichspannung (28 V DC) für Avionik und Sensoren.", "GLC": "Generator Line Contactor – Schutzschalter, der den Generator bei Überstrom, Über-/Unterspannung oder Frequenzfehler vom Netz trennt.", "BTB": "Bus Tie Breaker – normalerweise offener Schalter, der bei Generatorausfall beide Stromschienen über einen intakten Generator verbindet.", "Load Shedding": "Automatisches Abschalten nicht-essentieller Verbraucher bei Leistungsengpass, um kritische Avionik zu sichern.", "ARINC 429": "Klassischer, unidirektionaler Punkt-zu-Punkt-Datenbus (max. 100 kbit/s); sehr robust, aber hoher Kabelaufwand.", "ARINC 664": "Norm des AFDX-Netzwerks (Switched Ethernet) für moderne Avionik.", "AFDX": "Avionics Full-Duplex Switched Ethernet – deterministisches Netzwerk mit garantierter Bandbreite über 'Virtual Links' (A380/A350).", "ARINC 653": "Standard für strikte zeitliche/räumliche Partitionierung von Software auf IMA-Rechnern (Rückwirkungsfreiheit).", "IMA": "Integrated Modular Avionics – mehrere Software-Anwendungen laufen partitioniert auf gemeinsamen Zentralrechnern statt in Einzelboxen.", "LRU": "Line Replaceable Unit – austauschbare Hardwarebox; in klassischer ('federated') Architektur eine pro Funktion.", "CPM": "Core Processing Module – zentrales Rechenmodul, auf dem in der IMA mehrere Anwendungen laufen.", "CAN": "Controller Area Network (ARINC 825) – robuster, nachrichtenorientierter Bus für lokale Subsysteme (z. B. Batterie, APU, Pumpen).", "FMEA": "Failure Mode and Effects Analysis – induktive (Bottom-up) Analyse: vom Einzelfehler eines Bauteils zu dessen Systemauswirkung.", "FTA": "Fault Tree Analysis – deduktive (Top-down) Analyse: von einem Top-Event über logische Gatter zu den Einzelursachen.", "FHA": "Functional Hazard Assessment – bewertet mögliche Funktionsausfälle und // --- Glossar / Begriffshilfe ---------------------------------------
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function reEsc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
// Begriffe nach Laenge sortiert (laengste zuerst), damit "ARINC 429" vor "RA" greift.
const GKEYS=Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length);
const GRES=GKEYS.map(k=>({k:k,re:new RegExp('(?:^|[^0-9A-Za-zÄÖÜäöüß])'+reEsc(k)+'(?![0-9A-Za-zÄÖÜäöüß])')}));
function glossFor(q){
 // Sucht Begriffe in Frage + allen Optionen; jede Definition nur einmal.
 const hay=q.q+' '+q.options.map(o=>o.t).join(' ');
 const found=[];const used=new Set();
 for(const g of GRES){if(used.has(g.k))continue;if(g.re.test(hay)){used.add(g.k);found.push(g.k);}}
 return found;
}
function imgHTML(q){return (q.img&&IMAGES[q.img])?('<div class="qimg">'+IMAGES[q.img]+'</div>'):''}
function glossHTML(q){
 const terms=glossFor(q);if(!terms.length)return '';
 const body=terms.map(k=>'<div class="gterm"><div class="gk">'+esc(k)+'</div><div class="gd">'+esc(GLOSSARY[k])+'</div></div>').join('');
 return '<details class="gloss"><summary>ℹ️ Begriffe erklären <span style="color:var(--mut);font-weight:600">('+terms.length+')</span><span class="chev">▾</span></summary><div class="glossbody">'+body+'</div></details>';
}

const PKEY='avionik_progress_v2';
let P=load();
function load(){let p;try{p=JSON.parse(localStorage.getItem(PKEY))}catch(e){p=null}
 if(!p)p={cards:{},log:{a:0,c:0}};
 if(!p.streakDaily)p.streakDaily={count:0,last:''};
 if(!p.ui)p.ui={mode:'ueben',cat:'__all',star:false};
 if(!p.ui.exam||!EXAMS.some(e=>e.id===p.ui.exam))p.ui.exam=EXAMS[0].id;

// Spaced Repetition: Intervalle je Box (in Minuten) – auf Klausur-Lernen ausgelegt.
// Box 1 (neu/falsch) ist sofort wieder fällig und kommt in der nächsten Runde zuerst;
// wer eine Karte mehrfach richtig hat, sieht sie mit wachsendem Abstand seltener.
const SR_MIN=[0,0,5,30,120,720]; // Index=Box: 1->sofort, 2->5min, 3->30min, 4->2h, 5->12h
function nextDue(box){return Date.now()+ (SR_MIN[Math.min(5,Math.max(1,box))]||0)*60000}

function addDays(s,delta){const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+delta);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')}

 P.streakDaily.count=(P.streakDaily.last===y)?(P.streakDaily.count||0)+1:1;P.streakDaily.last=t}

function empty(){$('main').innerHTML='<div class="card center" style="color:var(--mut)"><div class="emo">🔎</div>Keine Karten in dieser Auswahl.<br>Wähle ein anderes Thema oder entferne den ⭐-Filter.</div>'}
function renderOpts(q){const opts=$('opts');opts.innerHTML='';
 q.options.forEach(o=>{const lab=document.createElement('label');lab.className='opt';
  const inp=document.createElement('input');inp.type='radio';inp.name='opt';inp.value=o.l;
  const k=document.createElement('span');k.className='k';k.textContent=o.l;
  const t=document.createElement('span');t.textContent=o.t;
  inp.addEventListener('change',()=>{document.querySelectorAll('.opt').forEach(e=>e.classList.remove('sel'));lab.classList.add('sel')});
  lab.appendChild(inp);lab.appendChild(k);lab.appendChild(t);opts.appendChild(lab)})}
function picked(){return [...document.querySelectorAll('input[name=opt]:checked')].map(x=>x.value)}
function setEq(a,b){a=a.slice().sort();b=b.slice().sort();return a.length===b.length&&a.every((v,i)=>v===b[i])}
function markOpts(q,sel){document.querySelectorAll('.opt').forEach(lab=>{const v=lab.querySelector('input').value;lab.querySelector('input').disabled=true;if(q.correct.includes(v))lab.classList.add('correct');else if(sel.includes(v))lab.classList.add('wrong')})}
function fb(ok,q){const el=$('fb');if(!el)return;el.classList.add('show',ok?'ok':'no');
 const cor=q.options.find(o=>q.correct.includes(o.l));
 el.innerHTML=ok?('✅ '+praise()+(streak>=3?' 🔥'+streak+' in Folge!':''))
              :('❌ '+oops()+'<span class="cor">✓ Richtig: '+esc(cor?cor.t:q.correct.join(', '))+'</span>')}

document.addEventListener('keydown',e=>{
 if(e.key===' '&&mode==='karten'&&!kFlip){e.preventDefault();if($('show'))kShow();return}
 if(e.key==='Enter'){const ck=$('ck'),nx=$('nx');if(nx&&!nx.classList.contains('hidden'))nx.click();else if(ck&&!ck.classList.contains('hidden'))ck.click();else if($('nx'))$('nx').click();return}
 if(['1','2','3','4'].includes(e.key)){const inp=document.querySelectorAll('input[name=opt]')[+e.key-1];if(inp&&!inp.disabled){inp.checked=true;inp.dispatchEvent(new Event('change'))}}});
