<script>
const ALL=JSON.parse(document.getElementById('data').textContent);
const CATS=["Paper 1", "Paper 2", "Paper 3", "Paper 4", "Paper 5", "Paper 6", "Fett", "Gemischte Verständnisfragen", "Nitcheu", "Scepik", "Zahlen-Drill", "Zakriti", "„Erwartete Prüfungsfragen\""];const $=id=>document.getElementById(id);
ALL.forEach(q=>{const o=q.options.find(o=>q.correct.includes(o.l));q.ans=o?o.t:'';});

const PKEY='avionik_progress_v2';
let P=load();
function load(){try{return JSON.parse(localStorage.getItem(PKEY))||{cards:{},log:{a:0,c:0}}}catch(e){return{cards:{},log:{a:0,c:0}}}}
function save(){try{localStorage.setItem(PKEY,JSON.stringify(P))}catch(e){}}
function cardOf(id){return P.cards[id]||(P.cards[id]={box:1,seen:0,correct:0,wrong:0,star:false,last:0})}
function record(id,ok){const c=cardOf(id);c.seen++;ok?c.correct++:c.wrong++;c.box=ok?Math.min(5,(c.box||1)+1):1;c.last=Date.now();P.log.a++;if(ok)P.log.c++;save()}
function toggleStar(id){const c=cardOf(id);c.star=!c.star;save();return c.star}

const catSel=$('cat');
catSel.innerHTML='<option value="__all">Alle Themen ('+ALL.length+')</option>'+
 CATS.map(c=>{const n=ALL.filter(q=>q.cat===c).length;return '<option value="'+c.replace(/"/g,'&quot;')+'">'+c+' ('+n+')</option>';}).join('');
function pool(){let p=catSel.value==='__all'?ALL:ALL.filter(q=>q.cat===catSel.value);if($('staronly').checked)p=p.filter(q=>cardOf(q.id).star);return p}
function shuffle(a){a=a.slice();for(let j=a.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[a[j],a[k]]=[a[k],a[j]];}return a;}
function esc(s){return s.replace(/</g,'&lt;')}
function topStat(){const t=ALL.length;const m=Object.values(P.cards).filter(c=>c.box>=5).length;const acc=P.log.a?Math.round(P.log.c/P.log.a*100):0;$('topstat').innerHTML='Gemeistert <b>'+m+'</b>/'+t+' · <b>'+acc+'%</b>'}

const MODES=[['ueben','Üben','✏️'],['karten','Karten','🗂️'],['test','Test','📝'],['lernen','Lernen','🎯'],['stat','Statistik','📊']];
let mode='ueben';
$('tabs').innerHTML=MODES.map(m=>'<button class="tab" data-m="'+m[0]+'"><span class="ic">'+m[2]+'</span><span>'+m[1]+'</span></button>').join('');
$('tabs').addEventListener('click',e=>{const b=e.target.closest('.tab');if(!b)return;setMode(b.dataset.m)});
function setMode(m){mode=m;[...document.querySelectorAll('.tab')].forEach(t=>t.classList.toggle('active',t.dataset.m===m));window.scrollTo(0,0);render()}
catSel.onchange=render;$('staronly').onchange=render;
function render(){topStat();({ueben:mUeben,karten:mKarten,test:mTest,lernen:mLernen,stat:mStat}[mode])()}

function starHTML(id){return '<span class="star '+(cardOf(id).star?'on':'')+'" data-star="'+id+'">★</span>'}
function bindStar(){document.querySelectorAll('[data-star]').forEach(el=>el.onclick=()=>{const on=toggleStar(el.dataset.star);el.classList.toggle('on',on)})}

let uP=[],ui=0,uScore=0,uAns=false;
function mUeben(){uP=shuffle(pool());ui=0;uScore=0;if(!uP.length)return empty();uRender()}
function uRender(){uAns=false;const q=uP[ui];
 $('main').innerHTML='<div class="prog"><i style="width:'+(ui/uP.length*100)+'%"></i></div>'+
 '<div class="card"><span class="tag">Üben</span><span class="catlbl">'+q.cat+'</span>'+starHTML(q.id)+
 '<div class="q">'+esc(q.q)+'</div><div id="opts"></div><div class="fb" id="fb"></div>'+
 '<div class="actions"><button class="btn" id="ck">Antwort prüfen</button>'+
 '<button class="btn sec hidden" id="nx">Weiter →</button><span class="cnt">'+(ui+1)+'/'+uP.length+' · ✓'+uScore+'</span></div></div>';
 renderOpts(q,'radio');bindStar();$('ck').onclick=uCheck;$('nx').onclick=uNext}
function uCheck(){if(uAns)return;const q=uP[ui];const sel=picked();if(!sel.length)return;uAns=true;
 markOpts(q,sel);const ok=setEq(sel,q.correct);if(ok)uScore++;record(q.id,ok);
 fb(ok,q);$('ck').classList.add('hidden');$('nx').classList.remove('hidden');topStat()}
function uNext(){ui++;if(ui>=uP.length)return uDone();uRender()}
function uDone(){const pct=Math.round(uScore/uP.length*100);$('main').innerHTML='<div class="card center"><div>Durchgang fertig</div><div class="big">'+pct+'%</div><div class="cnt" style="margin:0">'+uScore+' / '+uP.length+' richtig</div><div class="actions" style="justify-content:center;margin-top:14px"><button class="btn" id="ag">Nochmal</button></div></div>';$('ag').onclick=mUeben}

let kP=[],ki=0,kFlip=false;

 '<div class="card"><span class="tag">Karteikarte</span><span class="catlbl">'+q.cat+'</span>'+starHTML(q.id)+
 '<div class="flip" id="flip"><div>'+esc(q.q)+'</div></div>'+
 '<div class="actions"><button class="btn" id="show">Antwort zeigen</button>'+

 '<span class="cnt">'+(ki+1)+'/'+kP.length+'</span></div></div>';

function kShow(){kFlip=true;const q=kP[ki];$('flip').innerHTML='<div><div style="color:var(--mut);font-size:.85rem;margin-bottom:8px">'+esc(q.q)+'</div><div class="ans">'+esc(q.ans)+'</div></div>';$('show').classList.add('hidden');$('rate').classList.remove('hidden')}
function kRate(ok){record(kP[ki].id,ok);ki++;if(ki>=kP.length)return kDone();kRender();topStat()}
function kDone(){$('main').innerHTML='<div class="card center"><div>Stapel durch! 🎉</div><div class="actions" style="justify-content:center;margin-top:14px"><button class="btn" id="ag">Nochmal</button></div></div>';$('ag').onclick=mKarten}

let tP=[],ti=0,tAnswers=[];
function mTest(){const p=pool();$('main').innerHTML='<div class="card"><span class="tag">Test</span><div class="q">Test starten</div>'+

function tStart(n){tP=shuffle(pool()).slice(0,n);ti=0;tAnswers=[];tRender()}
function tRender(){const q=tP[ti];
 $('main').innerHTML='<div class="prog"><i style="width:'+(ti/tP.length*100)+'%"></i></div>'+
 '<div class="card"><span class="tag">Test</span><span class="catlbl">'+q.cat+'</span>'+
 '<div class="q">'+esc(q.q)+'</div><div id="opts"></div>'+
 '<div class="actions"><button class="btn" id="nx">'+(ti===tP.length-1?'Test abgeben':'Weiter →')+'</button><span class="cnt">'+(ti+1)+'/'+tP.length+'</span></div></div>';
 renderOpts(q,'radio');$('nx').onclick=tNext}
function tNext(){const sel=picked();if(!sel.length)return;tAnswers.push({q:tP[ti],sel});record(tP[ti].id,setEq(sel,tP[ti].correct));ti++;topStat();if(ti>=tP.length)return tDone();tRender()}
function tDone(){const good=tAnswers.filter(a=>setEq(a.sel,a.q.correct)).length;const pct=Math.round(good/tAnswers.length*100);
 const wrong=tAnswers.filter(a=>!setEq(a.sel,a.q.correct));
 let rev=wrong.map(a=>{const cor=a.q.options.find(o=>a.q.correct.includes(o.l));const mine=a.q.options.find(o=>a.sel.includes(o.l));
   return '<div class="rev"><div class="yq">'+esc(a.q.q)+'</div><div class="rw">✗ Deine: '+esc(mine?mine.t:'—')+'</div><div class="rc">✓ Richtig: '+esc(cor?cor.t:'')+'</div></div>'}).join('');
 $('main').innerHTML='<div class="card center"><div>Testergebnis</div><div class="big">'+pct+'%</div><div class="cnt" style="margin:0">'+good+' / '+tAnswers.length+' richtig</div>'+
 '<div class="actions" style="justify-content:center;margin:14px 0 0"><button class="btn" id="ag">Neuer Test</button></div></div>'+
 (wrong.length?'<div class="card" style="margin-top:12px"><b>Falsche Fragen ('+wrong.length+')</b>'+rev+'</div>':'');
 $('ag').onclick=mTest}

let lP=[],li=0,lAns=false;
function dueSort(p){return p.slice().sort((a,b)=>{const ca=cardOf(a.id),cb=cardOf(b.id);return (ca.box-cb.box)||(ca.last-cb.last)})}
function mLernen(){const p=pool();lP=dueSort(p).slice(0,20);li=0;lAns=false;if(!lP.length)return empty();lRender()}
function boxBar(){const p=pool();const cnt=[0,0,0,0,0];p.forEach(q=>{cnt[Math.min(5,cardOf(q.id).box||1)-1]++});
 return '<div class="boxwrap">'+cnt.map((n,ix)=>'<div class="b'+(ix===4?' m':'')+'"><div class="n">'+n+'</div><div class="l">Box '+(ix+1)+(ix===4?' ✓':'')+'</div></div>').join('')+'</div>'}
function lRender(){lAns=false;const q=lP[li];
 $('main').innerHTML=boxBar()+'<div class="card"><span class="tag">Lernen</span><span class="catlbl">'+q.cat+' · Box '+(cardOf(q.id).box||1)+'</span>'+starHTML(q.id)+
 '<div class="q">'+esc(q.q)+'</div><div id="opts"></div><div class="fb" id="fb"></div>'+
 '<div class="actions"><button class="btn" id="ck">Prüfen</button><button class="btn sec hidden" id="nx">Weiter →</button><span class="cnt">'+(li+1)+'/'+lP.length+'</span></div></div>';
 renderOpts(q,'radio');bindStar();$('ck').onclick=lCheck;$('nx').onclick=lNext}
function lCheck(){if(lAns)return;const q=lP[li];const sel=picked();if(!sel.length)return;lAns=true;const ok=setEq(sel,q.correct);markOpts(q,sel);record(q.id,ok);fb(ok,q);$('ck').classList.add('hidden');$('nx').classList.remove('hidden');topStat()}
function lNext(){li++;if(li>=lP.length)return lDone();lRender()}
function lDone(){$('main').innerHTML=boxBar()+'<div class="card center"><div>Lern-Runde fertig ✔</div><div class="cnt" style="margin:0">Karten wandern je nach Antwort in höhere/niedrigere Boxen.</div><div class="actions" style="justify-content:center;margin-top:14px"><button class="btn" id="ag">Weiter lernen</button></div></div>';$('ag').onclick=mLernen}

function mStat(){const t=ALL.length;const seen=Object.values(P.cards).filter(c=>c.seen>0).length;
 const m=Object.values(P.cards).filter(c=>c.box>=5).length;const st=Object.values(P.cards).filter(c=>c.star).length;
 const acc=P.log.a?Math.round(P.log.c/P.log.a*100):0;
 let rows=CATS.map(c=>{const qs=ALL.filter(q=>q.cat===c);const mm=qs.filter(q=>cardOf(q.id).box>=5).length;const pct=Math.round(mm/qs.length*100);
   return '<div class="row"><div class="nm">'+c+'</div><div class="mini"><i style="width:'+pct+'%"></i></div><div class="cnt" style="width:56px;text-align:right;margin:0">'+mm+'/'+qs.length+'</div></div>'}).join('');
 $('main').innerHTML='<div class="grid"><div class="kpi"><div class="n">'+m+'/'+t+'</div><div class="l">Gemeistert (Box 5)</div></div>'+
 '<div class="kpi"><div class="n">'+acc+'%</div><div class="l">Genauigkeit</div></div>'+
 '<div class="kpi"><div class="n">'+seen+'</div><div class="l">Karten gesehen</div></div>'+
 '<div class="kpi"><div class="n">'+P.log.a+'</div><div class="l">Antworten gesamt</div></div></div>'+
 '<div class="card" style="margin-top:12px"><b>Fortschritt pro Thema</b>'+rows+'</div>'+
 '<div class="actions"><button class="btn sec sm" id="rs">⚠ Fortschritt zurücksetzen</button><span class="cnt">⭐ '+st+'</span></div>';
 $('rs').onclick=()=>{if(confirm('Wirklich den gesamten Lernfortschritt löschen?')){P={cards:{},log:{a:0,c:0}};save();render()}}}

function empty(){$('main').innerHTML='<div class="card center" style="color:var(--mut)">Keine Karten in dieser Auswahl. Thema oder „⭐" anpassen.</div>'}
function renderOpts(q,type){const opts=$('opts');opts.innerHTML='';
 q.options.forEach(o=>{const lab=document.createElement('label');lab.className='opt';
  const inp=document.createElement('input');inp.type=type;inp.name='opt';inp.value=o.l;
  const k=document.createElement('span');k.className='k';k.textContent=o.l+')';
  const t=document.createElement('span');t.textContent=o.t;
  inp.addEventListener('change',()=>{document.querySelectorAll('.opt').forEach(e=>e.classList.remove('sel'));lab.classList.add('sel')});
  lab.appendChild(inp);lab.appendChild(k);lab.appendChild(t);opts.appendChild(lab)})}
function picked(){return [...document.querySelectorAll('input[name=opt]:checked')].map(x=>x.value)}
function setEq(a,b){a=a.slice().sort();b=b.slice().sort();return a.length===b.length&&a.every((v,i)=>v===b[i])}
function markOpts(q,sel){document.querySelectorAll('.opt').forEach(lab=>{const v=lab.querySelector('input').value;lab.querySelector('input').disabled=true;if(q.correct.includes(v))lab.classList.add('correct');else if(sel.includes(v))lab.classList.add('wrong')})}
function fb(ok,q){const el=$('fb');if(!el)return;el.classList.add('show',ok?'ok':'no');const cor=q.options.find(o=>q.correct.includes(o.l));el.innerHTML=ok?'✅ Richtig!':'❌ Falsch. Richtig: '+esc(cor?cor.t:q.correct.join(', '))}

document.addEventListener('keydown',e=>{
 if(e.key===' '&&mode==='karten'&&!kFlip){e.preventDefault();if($('show'))kShow();return}
 if(e.key==='Enter'){const ck=$('ck'),nx=$('nx');if(nx&&!nx.classList.contains('hidden'))nx.click();else if(ck&&!ck.classList.contains('hidden'))ck.click();else if($('nx'))$('nx').click();return}
 if(['1','2','3','4'].includes(e.key)){const inp=document.querySelectorAll('input[name=opt]')[+e.key-1];if(inp&&!inp.disabled){inp.checked=true;inp.dispatchEvent(new Event('change'))}}});

setMode('ueben');
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}
</script></body></html>
