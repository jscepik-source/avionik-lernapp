<style>
 :root{
  --bg:#edf3fa; --card:#ffffff; --inset:#f3f8fd;
  --ink:#17324e; --mut:#61758c; --line:#dbe6f2;
  --acc:#1f6fe0; --acc-soft:#e4eefc;
  --warm:#f6a821; --warm-soft:#fdf1dc;
  --good:#189653; --good-bg:#e5f6ec;
  --bad:#df4f4a; --bad-bg:#fdecea;
  --shadow:0 6px 20px rgba(23,51,80,.08);
  --nav:rgba(255,255,255,.92); --top:rgba(237,243,250,.92);
 }
 :root[data-theme="dark"]{
  --bg:#0d1726; --card:#16233a; --inset:#0f1b2e;
  --ink:#e9f1fa; --mut:#93a7bf; --line:#263c5c;
  --acc:#5aa2ff; --acc-soft:#1b3050;
  --warm:#f5b23e; --warm-soft:#3a2d13;
  --good:#3ecf7a; --good-bg:#14331f;
  --bad:#ef6a64; --bad-bg:#3a1b1b;
  --shadow:0 6px 20px rgba(0,0,0,.35);
  --nav:rgba(15,25,42,.92); --top:rgba(13,23,38,.92);
 }
 @media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
   --bg:#0d1726; --card:#16233a; --inset:#0f1b2e;
   --ink:#e9f1fa; --mut:#93a7bf; --line:#263c5c;
   --acc:#5aa2ff; --acc-soft:#1b3050;
   --warm:#f5b23e; --warm-soft:#3a2d13;
   --good:#3ecf7a; --good-bg:#14331f;
   --bad:#ef6a64; --bad-bg:#3a1b1b;
   --shadow:0 6px 20px rgba(0,0,0,.35);
   --nav:rgba(15,25,42,.92); --top:rgba(13,23,38,.92);
  }
 }
 *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
 html,body{margin:0}
 body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.55;-webkit-text-size-adjust:100%}
 .disp{font-family:ui-rounded,"SF Pro Rounded",-apple-system,"Segoe UI",system-ui,sans-serif}
 :focus-visible{outline:2.5px solid var(--acc);outline-offset:2px;border-radius:8px}
 .app{max-width:720px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

 .stickytop{position:sticky;top:0;z-index:6;background:var(--top);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
 .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:calc(env(safe-area-inset-top) + 12px) 16px 6px}
 .tt{font-weight:800;font-size:1.15rem;letter-spacing:.01em}
 .right{display:flex;align-items:center;gap:8px}
 .chip{background:var(--card);border:1px solid var(--line);border-radius:99px;padding:5px 12px;font-size:.78rem;color:var(--mut);font-variant-numeric:tabular-nums;box-shadow:var(--shadow)}
 .chip b{color:var(--ink)}
 .iconbtn{background:var(--card);border:1px solid var(--line);border-radius:99px;width:36px;height:36px;font-size:1rem;cursor:pointer;box-shadow:var(--shadow)}
 .controls{display:flex;gap:8px;align-items:stretch;padding:8px 16px 12px}
 select{flex:1;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:13px;padding:11px 12px;font:inherit;font-size:.95rem;box-shadow:var(--shadow)}
 .ck{display:flex;align-items:center;gap:7px;color:var(--mut);font-size:.88rem;border:1px solid var(--line);background:var(--card);border-radius:13px;padding:10px 13px;white-space:nowrap;cursor:pointer;box-shadow:var(--shadow)}
 .ck input{width:17px;height:17px;accent-color:var(--warm)}

 .content{flex:1;padding:14px 16px calc(env(safe-area-inset-bottom) + 104px)}

 .prog{position:relative;height:10px;background:var(--card);border:1px solid var(--line);border-radius:99px;margin:2px 6px 18px}
 .prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),#6fb2ff);border-radius:99px;width:0;transition:width .3s ease}
 .prog .plane{position:absolute;top:50%;transform:translate(-45%,-58%);font-size:1.05rem;transition:left .3s ease;filter:drop-shadow(0 2px 3px rgba(23,51,80,.25))}

 .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow);animation:rise .3s cubic-bezier(.2,.7,.3,1)}
 @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
 .tag{display:inline-block;font-size:.72rem;letter-spacing:.05em;color:var(--acc);background:var(--acc-soft);border-radius:99px;padding:3px 11px;font-weight:800}
 .catlbl{color:var(--mut);font-size:.78rem;margin-left:8px}
 .star{float:right;cursor:pointer;font-size:1.45rem;line-height:1;color:var(--line);padding:0 2px;margin-top:-2px;background:none;border:none}
 .star.on{color:var(--warm)}
 .q{font-size:1.14rem;font-weight:650;margin:13px 0 15px;text-wrap:balance}
 .qimg{margin:10px 0 4px;padding:12px;background:var(--inset);border:1.5px solid var(--line);border-radius:14px;display:flex;justify-content:center}
 .qimg svg{max-width:100%;height:auto;display:block}

 .opt{position:relative;display:flex;gap:12px;align-items:flex-start;border:1.5px solid var(--line);background:var(--inset);border-radius:15px;padding:13px 14px;margin:10px 0;cursor:pointer;transition:border-color .13s,background .13s,transform .08s;touch-action:manipulation}
 .opt:active{transform:scale(.985)}
 .opt .k{width:27px;height:27px;border-radius:50%;background:var(--acc-soft);color:var(--acc);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;flex:none;margin-top:1px}
 .opt.sel{border-color:var(--acc);background:var(--acc-soft)}
 .opt.sel .k{background:var(--acc);color:#fff}
 .opt.correct{border-color:var(--good);background:var(--good-bg)}
 .opt.correct .k{background:var(--good);color:#fff}
 .opt.wrong{border-color:var(--bad);background:var(--bad-bg)}
 .opt.wrong .k{background:var(--bad);color:#fff}
 .opt input{position:absolute;opacity:0;pointer-events:none}
 .opt:focus-within{outline:2.5px solid var(--acc);outline-offset:2px}

 .fb{margin-top:14px;padding:13px 15px;border-radius:14px;font-size:.97rem;display:none}
 .fb.show{display:block}
 .fb.ok{background:var(--good-bg);border:1px solid var(--good)}
 .fb.no{background:var(--bad-bg);border:1px solid var(--bad)}
 .fb .cor{display:block;margin-top:5px;color:var(--mut);font-size:.9rem}

 .actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;align-items:center}
 .btn{background:var(--acc);color:#fff;border:none;border-radius:14px;padding:14px 21px;font-weight:750;cursor:pointer;font:inherit;font-size:1rem;touch-action:manipulation;transition:transform .08s,filter .12s;box-shadow:0 4px 12px rgba(31,111,224,.28)}
 .btn:active{transform:scale(.97)}
 .btn.sec{background:var(--card);color:var(--ink);border:1.5px solid var(--line);box-shadow:var(--shadow)}
 .btn.sm{padding:10px 15px;font-size:.9rem}
 .cnt{margin-left:auto;align-self:center;color:var(--mut);font-size:.85rem;font-variant-numeric:tabular-nums}

 .flip{min-height:185px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:1.18rem;padding:22px 10px;text-wrap:balance}
 .flip .ans{color:var(--good);font-weight:700}
 .flip .qq{color:var(--mut);font-size:.86rem;margin-bottom:10px}

 .big{font-size:2.8rem;font-weight:800;color:var(--acc);font-variant-numeric:tabular-nums}
 .emo{font-size:2.2rem;margin-bottom:4px}
 .msg{font-weight:700;font-size:1.05rem;margin-top:2px}
 .center{text-align:center}

 .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
 .kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;text-align:center;box-shadow:var(--shadow)}
 .kpi .n{font-size:1.55rem;font-weight:800;color:var(--acc);font-variant-numeric:tabular-nums}
 .kpi .l{color:var(--mut);font-size:.78rem;margin-top:3px}
 .row{display:flex;align-items:center;gap:10px;margin:9px 0}
 .row .nm{width:92px;font-size:.82rem;color:var(--mut)}
 .mini{flex:1;height:10px;background:var(--inset);border:1px solid var(--line);border-radius:99px;overflow:hidden}
 .mini>i{display:block;height:100%;background:linear-gradient(90deg,var(--good),#5fd98f);border-radius:99px}
 .rev{border-top:1px solid var(--line);padding:12px 0;font-size:.92rem}
 .rev .yq{font-weight:650}.rev .rc{color:var(--good)}.rev .rw{color:var(--bad)}

 .boxwrap{display:flex;gap:7px;margin:0 0 14px}
 .boxwrap .b{flex:1;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 4px;box-shadow:var(--shadow)}
 .boxwrap .b .n{font-weight:800;color:var(--acc);font-size:1.05rem;font-variant-numeric:tabular-nums}
 .boxwrap .b.m .n{color:var(--good)}
 .boxwrap .b .l{font-size:.66rem;color:var(--mut)}

 .hidden{display:none}
 .foot{color:var(--mut);font-size:.74rem;text-align:center;padding:2px 14px 8px}

 .nav{position:fixed;left:0;right:0;bottom:0;z-index:10;background:var(--nav);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
 .nav .inner{max-width:720px;margin:0 auto;display:flex}
 .nav button{flex:1;background:none;border:none;color:var(--mut);padding:8px 2px 8px;cursor:pointer;font:inherit;font-size:.66rem;font-weight:650;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation}
 .nav button .ic{font-size:1.3rem;line-height:1.25;padding:3px 14px;border-radius:12px;transition:background .15s}
 .nav button.active{color:var(--acc)}
 .nav button.active .ic{background:var(--acc-soft)}

 /* Glossar / Begriffshilfe */
 .gloss{margin-top:14px;border:1px solid var(--line);border-radius:14px;background:var(--inset);overflow:hidden}
 .gloss>summary{list-style:none;cursor:pointer;padding:11px 14px;font-size:.9rem;font-weight:650;color:var(--acc);display:flex;align-items:center;gap:8px;user-select:none}
 .gloss>summary::-webkit-details-marker{display:none}
 .gloss>summary .chev{margin-left:auto;transition:transform .2s;color:var(--mut);font-size:.8rem}
 .gloss[open]>summary .chev{transform:rotate(180deg)}
 .gloss[open]>summary{border-bottom:1px solid var(--line)}
 .glossbody{padding:6px 14px 12px}
 .gterm{padding:9px 0;border-bottom:1px solid var(--line)}
 .gterm:last-child{border-bottom:none}
 .gterm .gk{font-weight:750;color:var(--ink);font-size:.92rem}
 .gterm .gd{color:var(--mut);font-size:.88rem;margin-top:2px;line-height:1.5}

 /* Klausur-Umschalter (segmented control) */
 .examsel{display:flex;gap:6px;padding:2px 16px 0}
 .exbtn{flex:1;font:inherit;font-weight:750;font-size:.9rem;cursor:pointer;padding:9px 10px;border-radius:12px;
   border:1.5px solid var(--line);background:var(--card);color:var(--mut);box-shadow:var(--shadow);
   display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;touch-action:manipulation}
 .exbtn.active{background:var(--acc);color:#fff;border-color:var(--acc);box-shadow:0 4px 12px rgba(31,111,224,.28)}
 .exbtn:active{transform:scale(.98)}

 /* Zurück-Button + Fälligkeits-Badge */
 .btn.gho{background:transparent;color:var(--mut);border:1.5px solid var(--line);box-shadow:none;padding:14px 16px}
 .due{display:inline-block;background:var(--warm-soft);color:var(--warm);border-radius:99px;padding:3px 10px;font-size:.76rem;font-weight:700;font-variant-numeric:tabular-nums}
 .boxwrap .b.due{outline:2px solid var(--warm)}

 @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style></head>

here Frequenz bedeutet automatisch eine geringere Reichweite, unabhängig von der Antenne."}, {"l": "D", "t": "Erhöht man die Bandbreite bei gleichbleibender Sendeleistung, steigt das Rauschen an, wodurch das Signal-Rausch-Verhältnis sinkt und mehr Bitfehler entstehen."}], "correct": ["D"]}, {"id": "4c5ad4bba3", "ex": "uav", "cat": "Betrieb & Anwendungen", "q": "Was kennzeichnet \"Abnormal Operations\" in einer Standard-Flugcheckliste für Drohnen?", "options": [{"l": "A", "t": "Eine Abweichung vom Normalzustand, bei der Systeme unerwartet reagieren und ein aktives Eingreifen oder Notverfahren (z.B. durch den Piloten) erforderlich ist."}, {"l": "B", "t": "Ein Vorführflug auf einer Flugshow."}, {"l": "C", "t": "Das Fliegen bei klarem Himmel in der offenen Kategorie."}, {"l": "D", "t": "Jeder Flug außerhalb der direkten Sichtweite (BVLOS)."}], "correct": ["A"]}, {"id": "7f5990077b", "ex": "uav", "cat": "Kommunikation & Protokolle", "q": "Welche technische Einschränkung haben elektro-optische (EO) und Infrarot (IR) Kamerasysteme bei der Drohnenerkennung (Counter-UAS)?", "options": [{"l": "A", "t": "Sie können keine schwebenden Drohnen erkennen (\"Hover Problem\")."}, {"l": "B", "t": "Sie sind stark wetterabhängig (Nebel, Regen) und funktionieren extrem schlecht bei niedrigem Kontrast (z.B. kleine Drohne vor einem hellen Himmel oder vor Gebäuden)."}, {"l": "C", "t": "Sie senden selbst gefährliche Radarstrahlung aus."}, {"l": "D", "t": "Sie können nur Drohnen erkennen, die aktiv Funksignale senden."}], "correct": ["B"]}, {"id": "c42afdc9b3", "ex": "uav", "cat": "Autopiloten & Flugmodi", "q": "Wie verhält sich ein Multicopter im manuellen \"Acro\" bzw. \"Rate\" Flugmodus, wenn der Pilot die Steuerknüppel der Fernbedienung zentriert (loslässt)?", "options": [{"l": "A", "t": "Er kehrt sofort automatisch in eine exakt waagerechte Position zurück."}, {"l": "B", "t": "Er leitet eine Notlandung ein."}, {"l": "C", "t": "Er behält seine momentane Neigung (Attitude) im Raum bei und l": "C", "t": "Die hinteren Rotoren erhöhen ihre Drehzahl im Vergleich zu den vorderen, wodurch sich das Heck hebt und der Schubvektor nach vorne geneigt wird."}, {"l": "D", "t": "Er verstellt den Anstellwinkel der Rotorblätter mechanisch (wie ein Hubschrauber)."}], "correct": ["C"]}, {"id": "e12519e02a", "ex": "uav", "cat": "Autopiloten & Flugmodi", "q": "Welchem Zweck dienen \"Low-Pass Filters\" (Tiefpassfilter) in der Software eines Flight Controllers?", "options": [{"l": "A", "t": "Sie sorgen dafür, dass die Drohne bei tiefem Sonnenstand besser gesehen wird."}, {"l": "B", "t": "Sie blockieren tief fliegende, fremde Drohnen auf dem Radar."}, {"l": "C", "t": "Sie drosseln die maximale Flughöhe auf 120 Meter."}, {"l": "D", "t": "Sie glätten die Rohdaten der Sensoren, indem sie hochfrequentes mechanisches Rauschen (z. B. durch Motorvibrationen) herausfiltern, bevor die Signale die Regelung stören."}], "correct": ["D"]}, {"id": "cd231724a4", "ex": "uav", "cat": "Autopiloten & Flugmodi", "q": "Was passiert typischerweise mit dem Flugverhalten, wenn der \"P-Gain\" (Proportional-Wert) in einem PID-Regler der Drohne viel zu hoch eingestellt ist?", "options": [{"l": "A", "t": "Die Drohne überkorrigiert massiv, schwingt über das Ziel hinaus und beginnt hochfrequent zu oszillieren (zu \"wackeln\" oder zu \"zittern\")."}, {"l": "B", "t": "Die Drohne reagiert extrem träge und steuert gar nicht mehr gegen."}, {"l": "C", "t": "Die Motoren schalten sich im Flug aus."}, {"l": "D", "t": "Der Akku lädt sich durch Rekuperation wieder auf."}], "correct": ["A"]}, {"id": "9214d2e1be", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Warum benötigt ein Drohnen-Autopilot zwingend Daten von einem GNSS-Empfänger (GPS), obwohl die IMU Bewegungen viel schneller messen kann?", "options": [{"l": "A", "t": "Um die Temperatur der Propeller zu berechnen."}, {"l": "B", "t": "Da die winzigen MEMS-Sensoren der IMU über Zeit kleine Messfehler aufsummieren (Drift), wird das absolute, driftfreie Posi  150 Joule"}, {"l": "C", "t": "> 80 Joule"}, {"l": "D", "t": "> 250 Joule"}], "correct": ["C"]}, {"id": "b8a265fb51", "ex": "uav", "cat": "Recht & Regulatorik", "q": "In welche offene Unterkategorie (Open Category) fällt typischerweise der Flugbetrieb mit einer Drohne der Klasse C1 (unter 900 g) im Standard-Szenario?", "options": [{"l": "A", "t": "A2 (Sichere Distanz zu Menschen)"}, {"l": "B", "t": "A3 (Weit von Menschen entfernt)"}, {"l": "C", "t": "Speziell"}, {"l": "D", "t": "A1 (Nahe Menschen)"}], "correct": ["D"]}, {"id": "518d19aa21", "ex": "uav", "cat": "Autopiloten & Flugmodi", "q": "Welchen Autopilot-Modus würde ein FPV-Racer wählen, der volle manuelle Kontrolle und keine automatische Horizont-Stabilisierung (Self-Leveling) wünscht?", "options": [{"l": "A", "t": "Acro / Rate Mode"}, {"l": "B", "t": "Stabilize Mode"}, {"l": "C", "t": "Altitude Hold Mode"}, {"l": "D", "t": "Loiter Mode"}], "correct": ["A"]}, {"id": "0232471bea", "ex": "uav", "cat": "Autopiloten & Flugmodi", "q": "Wozu dient der Begriff der \"Saturation\" (Sättigung) in den Einstellungen der Autopilot-Software?", "options": [{"l": "A", "t": "Zur Messung der Farbsättigung im Videostream der Kamera."}, {"l": "B", "t": "Er legt physische Sicherheitslimits fest, z.B. wie weit sich ein Servo maximal bewegen oder wie schnell ein Motor drehen darf."}, {"l": "C", "t": "Er zeigt an, wann der Akku vollständig geladen ist."}, {"l": "D", "t": "Er begrenzt die Funkreichweite."}], "correct": ["B"]}, {"id": "5e1dfc1883", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Warum werden \"Fixed-Wing\"-Drohnen (Flächenflugzeuge) häufig mit einem Pitot-Rohr ausgestattet?", "options": [{"l": "A", "t": "Um die Drehzahl der Motoren zu messen."}, {"l": "B", "t": "Um die Übertragungsrate des Funks zu bestimmen."}, {"l": "C", "t": "Um den dynamischen Druck und damit die Fluggeschwindigkeit (Airspeed) zu messen, da Fixed-Wings eine Mindestgeschwindigkeit benötigen, um nicht abzustürzen (Stall)."}, {"l": "D", "t": "Um Ra gnal."}, {"l": "C", "t": "Er schaltet die Motoren bei einem Crash ab."}, {"l": "D", "t": "Er schätzt anhand der Änderungsrate das zukünftige Verhalten ab und wirkt dämpfend, um ein hochfrequentes Übersteuern (Overshoot) zu verhindern."}], "correct": ["D"]}, {"id": "ee8e9d22c5", "ex": "uav", "cat": "Sensorik & Navigation", "q": "(Sensorik / ADS) Welche Messgrößen liefert ein klassisches \"Air Data System\" (ADS) bei einer Flächenflugzeug-Drohne mithilfe eines Pitot-Rohrs?", "options": [{"l": "A", "t": "Nur die Höhe über Grund."}, {"l": "B", "t": "Den dynamischen und statischen Druck, um die relative Fluggeschwindigkeit (Airspeed) und die Flughöhe zu berechnen."}, {"l": "C", "t": "Die exakte Rotordrehzahl der Motoren."}, {"l": "D", "t": "Die Windrichtung in Grad."}], "correct": ["B"]}, {"id": "e8aafc2b47", "ex": "uav", "cat": "Betrieb & Anwendungen", "q": "(Orga / Praktikum) Wo muss die gesamte Gruppenarbeit im Rahmen des UAV-Laborpraktikums zwingend dokumentiert werden?", "options": [{"l": "A", "t": "In einem geteilten Google Drive-Ordner."}, {"l": "B", "t": "In einer privaten WhatsApp-Gruppe."}, {"l": "C", "t": "Im hochschuleigenen ELT Wiki als \"Single source of truth\"."}, {"l": "D", "t": "Als ausgedrucktes Handbuch im Labor."}], "correct": ["C"]}, {"id": "73110a5bc5", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "(C-UAS / Abwehr) Gegen welche Art von Angriffsdrohnen sind klassische \"Soft-Kill\" Gegenmaßnahmen (wie Jamming) nahezu wirkungslos?", "options": [{"l": "A", "t": "Gegen Drohnen, die vollautonom über rein optische Kameras (Machine Vision) navigieren oder per Glasfaserkabel (Fiber-optic) gesteuert werden."}, {"l": "B", "t": "Gegen große MALE-Drohnen (z. B. Reaper)."}, {"l": "C", "t": "Gegen handelsübliche DJI-Kameradrohnen."}, {"l": "D", "t": "Gegen Drohnen, die nachts fliegen."}], "correct": ["A"]}, {"id": "02ea6657b0", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(LBA Szenario 1) Ein Pilot plant, eine 3 kg schwere Drohne (C2) für Inspektionsaufgaben in einem Industriegebiet zu verwenden. Sie wird in direkter Sichtweite (VLOS) betrieben, der Flug findet unter 120m Höhe statt und der horizontale Abstand zu unbeteiligten Personen beträgt durchgehend mehr als 30 Meter. Überflug von Menschenansammlungen findet nicht statt. In welche Betriebskategorie fällt dieser Flug nach dem LBA-Entscheidungsdiagramm?", "options": [{"l": "A", "t": "Offen A1"}, {"l": "B", "t": "Offen A2"}, {"l": "C", "t": "Offen A3"}, {"l": "D", "t": "Speziell"}], "correct": ["B"]}, {"id": "b54cd4b06b", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(LBA Szenario 2) Eine Filmproduktionsfirma möchte in einer Stadt Drohnenaufnahmen machen. Die verwendete Drohne hat ein MTOM von 10 kg. Um bestimmte Perspektiven zu erzielen, muss die Drohne zeitweise hinter Gebäuden herfliegen, ist also außerhalb der direkten Sichtweite des Piloten (BVLOS). Zudem kann ein horizontaler Sicherheitsabstand zu unbeteiligten Personen auf der Straße nicht durchgängig eingehalten werden. In welche Kategorie fällt dieser Betrieb zwingend?", "options": [{"l": "A", "t": "Offen A2 (mit Sondergenehmigung)"}, {"l": "B", "t": "Zulassungspflichtig (Certified)"}, {"l": "C", "t": "Speziell (Specific)"}, {"l": "D", "t": "Offen A3"}], "correct": ["C"]}, {"id": "ad1032c5d5", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(LBA Szenario 4) Ein Logistikunternehmen will eine Drohne (18 kg, C3-Klassifizierung) einsetzen, um auf einem Firmengelände einen stoßgedämpften Behälter mit 1,2 Litern eines entzündbaren und ätzenden chemischen Gefahrstoffs über eine Strecke von 1,8 km zu transportieren. Die Drohne ist topmodern ausgestattet (Fallschirm, redundante Systeme, Geo-Awareness) und fliegt unter 90m Höhe. In welche Kategorie fällt dieser Flug?", "options": [{"l": "A", "t": "Offen A3 (da C3-Drohne, unter 120m und Industriegebiet)"}, {"l": "B", "t": "Speziell (Specific)"}, {"l": "C", "t": "Offen A1"}, {"l": "D", "t": "Zulassungspflichtig (Certified)"}], "correct": ["D"]}, {"id": "ac3f967f89", "ex": "uav", "cat": "Aerodynamik & Flugmechanik", "q": "(Echte Klausurfrage) Sie werden beauftragt, eine Drohne für den Forschungseinsatz im Himalaya-Gebirge auf über 5.500 m Höhe zu entwickeln. Welche aerodynamische Herausforderung ist hierbei das Hauptproblem und wie könnte ein technischer Lösungsansatz aussehen?", "options": [{"l": "A", "t": "Die extrem geringe Luftdichte erschwert die Erzeugung von ausreichend aerodynamischem Auftrieb massiv. Maßnahme: Die Propellerfläche (Pitch/Länge) oder die Motordrehzahl muss deutlich vergrößert werden; zudem benötigen die Akkus Isolation gegen die Kälte."}, {"l": "B", "t": "Die extreme Gravitation zieht die Drohne zu Boden. Maßnahme: Stärkere Magnete verbauen."}, {"l": "C", "t": "In dieser Höhe gibt es kein GPS mehr. Maßnahme: Navigation ausschließlich über Optical Flow."}, {"l": "D", "t": "Drohnen fallen auf dieser Höhe unter die Waffenkontrollgesetze. Maßnahme: Militärische Zulassung."}], "correct": ["A"]}, {"id": "d45a38c228", "ex": "uav", "cat": "Sensorik & Navigation", "q": "(Echte Klausurfrage) Ein UAV soll völlig autonom in einer großen Indoor-Kraftwerkshalle fliegen. Mit welchen primären Gefahrenquellen / Störfaktoren müssen Sie beim Systemdesign zwingend rechnen und wie kompensieren Sie diese?", "options": [{"l": "A", "t": "Drohnenabwehrlaser. Maßnahme: Verspiegelter Rumpf."}, {"l": "B", "t": "Völliger Ausfall von GPS (GNSS-Denied) und massive Störung des Magnetometers (Kompass) durch viel Stahl und stromführende Leitungen. Maßnahme: Navigation mittels LiDAR (SLAM), Optical Flow oder Ultraschall."}, {"l": "C", "t": "Blendung der Kameras durch die Hallenbeleuchtung. Maßnahme: Sonnenbrillen für die Sensoren."}, {"l": "D", "t": "Störung der Funkverbindung durch Wolken. Maßnahme: Flug nur bei gutem Wetter."}], "correct": ["B"]}, {"id": "dd5b6e9843", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(Echte Klausurfrage) Sie sehen in der DIPUL-Karten-App (Digitale Plattform unbemannte Luftfahrt), dass das Schwimmbad \"An der Lache\" blau markiert ist. Was definiert ein solches \"geografisches Gebiet\" und was bedeutet das für Sie als Pilot?", "options": [{"l": "A", "t": "Schwimmbäder sind \"Free-Fly-Zones\", dort gelten keine Regeln."}, {"l": "B", "t": "Dies bedeutet, dass dort Drohnen automatisch vom Betreiber des Schwimmbads gehackt werden."}, {"l": "C", "t": "Geografische Gebiete (Geozonen) sind von Luftfahrtbehörden definierte Lufträume, die den Drohnenbetrieb aus Sicherheits-, Datenschutz- oder Naturschutzgründen einschränken, verbieten oder an harte Auflagen (z. B. Flugverbot über Menschenansammlungen in Freibädern) knüpfen. Der Pilot muss diese Auflagen vor dem Flug verbindlich prüfen."}, {"l": "D", "t": "Dies zeigt eine Wetter-Warnzone für starken Regen an."}], "correct": ["C"]}, {"id": "dbb52aafce", "ex": "uav", "cat": "Betrieb & Anwendungen", "q": "(Mars-Rotorcraft Szenario) Die NASA-Studie \"Past, Present, and Future Mars Rotorcraft\" nennt die autonome Navigation als kritische Herausforderung, da auf dem Mars kein GPS verfügbar ist. Welchen technologischen Lösungsansatz schlägt das Paper vor?", "options": [{"l": "A", "t": "Ein sehr langes Glasfaserkabel, das die Drohne mit der Erde verbindet."}, {"l": "B", "t": "Den Einsatz von analogen Kompassen auf Wasserbasis."}, {"l": "C", "t": "Die Steuerung per Live-Joystick durch Astronauten auf der Erde."}, {"l": "D", "t": "Die Entwicklung von fortschrittlichen Bildverarbeitungssystemen (Kameras/LiDAR) gepaart mit Künstlicher Intelligenz (Machine Learning), um die Umgebung an Bord in Echtzeit zu kartieren, Hindernisse selbstständig zu umfliegen und Landeplätze zu finden."}], "correct": ["D"]}, {"id": "228665624a", "ex": "uav", "cat": "Betrieb & Anwendungen", "q": "(Mars-Rotorcraft Szenario) Eine weitere große Herausforderung auf dem Mars ist die Energieeffizienz, da die Drohne extrem leicht sein muss. Welcher Lösungsansatz wird hierfür in der Studie evaluiert?", "options": [{"l": "A", "t": "Die Nutzung von leichten Hochleistungsbatterien (z. B. Lithium-Schwefel) mit sehr hoher Energiedichte in Kombination mit integrierten Solarpaneelen, damit sich die Drohne am Boden selbst aufladen kann."}, {"l": "B", "t": "Ein Miniatur-Atomreaktor (RTG) auf jeder Drohne."}, {"l": "C", "t": "Verbrennungsmotoren mit Mars-Sand als Treibstoff."}, {"l": "D", "t": "Die Drohne fliegt völlig ohne Batterien nur durch Windkraft."}], "correct": ["A"]}, {"id": "16a871619c", "ex": "uav", "cat": "Betrieb & Anwendungen", "q": "(Mars-Rotorcraft Szenario) Auf dem Mars herrschen extreme Minusgrade, Staubstürme und hohe Strahlung. Welcher materialtechnische Lösungsansatz hilft, die Drohne widerstandsfähig zu machen, ohne sie zu schwer für den Flug in der dünnen Atmosphäre werden zu lassen?", "options": [{"l": "A", "t": "Drohnen aus massivem Blei gießen."}, {"l": "B", "t": "Die Nutzung von fortschrittlichen, extrem leichten Verbundmaterialien (wie kohlenstofffaserverstärktem Kunststoff (CFK) oder Graphen), optimiert durch 3D-Druck, sowie spezielle Schutzbeschichtungen gegen Staub und Strahlung."}, {"l": "C", "t": "Drohnen komplett aus elastischem Gummi bauen."}, {"l": "D", "t": "Die Drohne in einer dicken Glasglocke einschließen."}], "correct": ["B"]}, {"id": "39c4fcae92", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(LBA Szenario 3) Ein Pilot besitzt das Fernpiloten-Zeugnis A2 sowie den A1/A3 Kompetenznachweis. Er nutzt eine sehr leichte C1-Drohne (720 g) in einem Stadtpark (max. 100m AGL). Er fliegt VLOS. Es befinden sich vereinzelt unbeteiligte Spaziergänger im Park, die er möglichst umfliegt. Menschenansammlungen meidet er komplett. In welche Kategorie fällt der Betrieb?", "options": [{"l": "A", "t": "Offen A2 (Sichere Distanz)"}, {"l": "B", "t": "Zulassungspflichtig"}, {"l": "C", "t": "Offen A1 (Nahe Menschen)"}, {"l": "D", "t": "Speziell"}], "correct": ["C"]}, {"id": "731eab47ec", "ex": "uav", "cat": "Sensorik & Navigation", "q": "(Szenario: Search & Rescue im dichten Wald) Kontext: Nach einem Erdbeben wird eine Person in einem sehr dichten, stark bewaldeten Berggebiet vermisst. Die Suche muss nachts bei völliger Dunkelheit stattfinden. Die Einsatzleitung bittet dich, das optimale UAV-System für diese Mission zusammenzustellen. Frage: Welche Kombination aus Hardware-Plattform und Sensor-Payload ist für dieses spezifische Szenario technisch am sinnvollsten?", "options": [{"l": "A", "t": "Ein Fixed-Wing (Flächenflugzeug) mit einer hochauflösenden RGB-Kamera und optischem Fluss."}, {"l": "B", "t": "Ein Blimp (Prallluftschiff) mit Ultraschallsensoren und Barometer."}, {"l": "C", "t": "Ein Hybrid-VTOL mit einem Radar-System und passiven RF-Scannern."}, {"l": "D", "t": "Ein Multicopter ausgestattet mit einer Thermal-Kamera (IR) und einem LiDAR-Scanner."}], "correct": ["D"]}, {"id": "76c0cd36b1", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(Szenario: Offshore-Windpark Inspektion) Kontext: Du sollst Rotorblätter von Windkraftanlagen überprüfen, die sich 30 Kilometer draußen auf dem Meer befinden. Der Pilot steuert die Drohne von Land aus. Um Haarrisse zu erkennen, muss ein hochauflösender Live-Videostream in Echtzeit an die Bodenstation gesendet werden. Frage: Welches rechtliche und kommunikationstechnische Setup ist für diese Mission erforderlich?", "options": [{"l": "A", "t": "Der Flug fällt zwingend in die \"Spezielle\" (Specific) Kategorie. Für die Übertragung des Live-Videos auf diese Distanz wird ein High-Bandwidth-Link (z. B. via LTE/5G oder Satellitenkommunikation) benötigt."}, {"l": "B", "t": "Der Flug fällt in die Kategorie OFFEN A3. Als C2-Link und Payload-Link reicht das standardmäßige 2,4 GHz-Band (z.B. OcuSync)."}, {"l": "C", "t": "Der Flug ist Zulassungspflichtig (Certified), da Wasser überflogen wird. Es darf nur eine analoge Funkübertragung genutzt werden."}, {"l": "D", "t": "Der Flug ist erlaubnisfrei. Die Navigation erfolgt rein über ein Pitot-Rohr, Daten werden lokal gespeichert."}], "correct": ["A"]}, {"id": "494cff94b3", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "(Szenario: C-UAS Abwehr beim G7-Gipfel) Kontext: Du bist für die Drohnenabwehr eines politischen Gipfels zuständig. Die Angreifer nutzen fortschrittliche Drohnen, die über ein abrollendes Glasfaserkabel (Fiber-optic) gesteuert werden oder völlig autonom per optischer Bilderkennung (Machine Vision) navigieren, ohne ein GPS-Signal zu benötigen. Frage: Welche Sensor- und Abwehrkombination hat hier als einzige eine echte Chance auf Erfolg?", "options": [{"l": "A", "t": "Erkennung durch RF-Sniffing; Abwehr durch Jamming (Stören der Frequenzen)."}, {"l": "B", "t": "Erkennung durch Radar und LiDAR; Abwehr durch Hard-Kill-Effektoren (z. B. Netze, Laser oder High-Power Microwave)."}, {"l": "C", "t": "Erkennung durch GNSS-Monitoring; Abwehr durch GPS-Spoofing."}, {"l": "D", "t": "Erkennung durch Abhören der Telemetriedaten; Abwehr durch Hacking der C2-Verbindung."}], "correct": ["B"]}, {"id": "901ea955bc", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(Szenario: Landwirtschaftliches \"Crop-Spraying\") Kontext: Ein Agrarunternehmen möchte ein riesiges, 500 Hektar großes Feld mit umweltschädlichen und toxischen Pestiziden besprühen. Der Pilot hat direkten Sichtkontakt. Frage: In welche rechtliche Betriebskategorie stuft das Luftfahrt-Bundesamt (LBA) diesen Flug ein und welche Plattform ist wirtschaftlich am klügsten?", "options": [{"l": "A", "t": "OFFEN A1, da landwirtschaftliche Flächen meist menschenleer sind. Eine kleine C0-Drohne reicht aus."}, {"l": "B", "t": "Speziell (Specific). Ein Blimp (Prallluftschiff) ist die beste Wahl, da er stundenlang schweben kann."}, {"l": "C", "t": "Zulassungspflichtig (Certified). Da extrem große Flächen abgedeckt werden müssen, bietet sich ein Fixed-Wing oder (falls eine Landebahn fehlt) eine Hybrid-VTOL Plattform an."}, {"l": "D", "t": "OFFEN A3. Ein FPV-Racer ist optimal, um die Pestizide besonders schnell zu verteilen."}], "correct": ["C"]}, {"id": "d32033845b", "ex": "uav", "cat": "Sensorik & Navigation", "q": "(Szenario: Exploration einer eingestürzten Mine) Kontext: Eine Drohne soll tief unter der Erde in einem eingestürzten Bergwerk nach Überlebenden suchen. Es ist stockfinster. Das Gestein ist extrem eisenhaltig (stark magnetisch) und schirmt jegliche Signale von außen ab. Frage: Welches Setup der Flugsteuerung (Autopilot) sichert das Überleben der Drohne?", "options": [{"l": "A", "t": "Die Navigation stützt sich primär auf GPS und das Magnetometer (Kompass)."}, {"l": "B", "t": "Die Navigation stützt sich ausschließlich auf die Inertial Measurement Unit (IMU), da das Aufsummieren der Sensordaten (Dead Reckoning) hier am sichersten ist."}, {"l": "C", "t": "Die Drohne nutzt ein Pitot-Rohr zur Positionsbestimmung und ein Barometer zur Kollisionswarnung."}, {"l": "D", "t": "Das Magnetometer wird abgeschaltet. Die Drohne nutzt eine Kombination aus starken Scheinwerfern für optischen Fluss (Optical Flow) sowie einen LiDAR-Scanner für die SLAM-Navigation und Hindernisvermeidung."}], "correct": ["D"]}, {"id": "93ac2c3ddc", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "(Szenario: Drone-in-a-Box bei Verbindungsausfall) Kontext: Du betreibst ein automatisiertes \"Drone-in-a-Box\" System auf einem Werksgelände. Die Drohne führt gerade autonom einen Patrouillenflug durch. Plötzlich wird die C2-Verbindung zur Basisstation durch einen vorbeifahrenden Störsender-LKW komplett unterbrochen (Jamming). Frage: Was sollte die Failsafe-Logik der Drohne in diesem Moment idealerweise auslösen?", "options": [{"l": "A", "t": "Aktivierung der vorprogrammierten RTH-Funktion (Return-to-Home) auf einer sicheren Flughöhe zurück zum Dock, alternativ das sichere Schweben (Hovering) auf der Stelle oder eine automatische Landung."}, {"l": "B", "t": "Sofortiger Stillstand aller Rotoren (Disarm), um ein unkontrolliertes Wegfliegen zu verhindern."}, {"l": "C", "t": "Wechsel in den manuellen Acro-Mode."}, {"l": "D", "t": "Die Drohne schaltet auf Infrarot-Steuerung um und sucht den LKW."}], "correct": ["A"]}, {"id": "79b9b8b30e", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(Klausur-Szenario: Geozonen & DIPUL) Kontext: Die DIPUL-Karte (Digitale Plattform unbemannte Luftfahrt) listet für den Standort des Freibads „An der Lache“ in Rüsselsheim ein überlappendes geografisches Gebiet. Frage: Was definiert luftrechtlich ein \"geografisches Gebiet\" und welche Pflicht leitet sich daraus für deinen Drohnenbetrieb über dem Freibad ab?", "options": [{"l": "A", "t": "Es sind steuerfreie Zonen, in denen keine Versicherungspflicht gilt."}, {"l": "B", "t": "Es sind Gebiete, in denen Drohnen automatisch von der Flugsicherung gehackt und gelandet werden."}, {"l": "C", "t": "Es sind Zonen, in denen ausschließlich autonome C0-Drohnen geflogen werden dürfen."}, {"l": "D", "t": "Es sind von der Behörde definierte Lufträume, die den Drohnenbetrieb aus Sicherheits-, Naturschutz- oder Datenschutzgründen einschränken, verbieten oder an Auflagen (wie ein Flugverbot über der Menschenansammlung im Freibad) knüpfen. Der Pilot muss diese verbindlich prüfen."}], "correct": ["D"]}, {"id": "f005d71a40", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(Szenario: Systemarchitektur für Stromtrassen-Inspektion) Kontext: Du konzipierst ein Inspektions-UAV für extrem lange Stromtrassen. Der Flug wird weit außerhalb der Sichtweite (BVLOS) stattfinden. Frage: Welche Hardware-Plattform und welche Sensoren für das \"Sense & Avoid\" (Umgebungserfassung) bieten sich für diese Langstrecken-Mission am ehesten an?", "options": [{"l": "A", "t": "Ein Fixed-Wing oder Hybrid-VTOL (wegen der benötigten Reichweite/Flächenleistung) ausgestattet mit einem Radar zur Erkennung anderer, auch funkstiller (nicht-kooperativer) Luftfahrzeuge."}, {"l": "B", "t": "Ein FPV-Quadrocopter mit Ultraschallsensoren."}, {"l": "C", "t": "Ein Blimp (Prallluftschiff) mit Optical Flow Kameras."}, {"l": "D", "t": "Ein kleiner Hexacopter mit Infrarotsensor."}], "correct": ["A"]}, {"id": "bcc4d22402", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "(Szenario: Drohnenabwehr bei illegalem Schwebeflug) Kontext: Eine feindliche Spionagedrohne schwebt völlig regungslos und funkschweigend (Radio Silence) neben einem geheimen Firmengelände. Frage: Warum scheitern in diesem exakten Moment sowohl passive RF-Scanner als auch herkömmliche FMCW-Radarsysteme bei der Erkennung, und welcher Sensor wäre stattdessen erfolgreich?", "options": [{"l": "A", "t": "Sie scheitern wegen der Außentemperatur; ein Barometer wäre erfolgreich."}, {"l": "B", "t": "RF-Scanner scheitern an der Funkstille; Radarsysteme filtern die schwebende Drohne wegen der fehlenden Radialgeschwindigkeit fälschlicherweise als statisches Objekt (Clutter) heraus (\"Hover Problem\"). Eine elektro-optische Kamera (EO/IR) oder ein hochauflösendes LiDAR wäre stattdessen erfolgreich."}, {"l": "C", "t": "Sie scheitern am Wind; ein Ultraschallsensor wäre erfolgreich."}, {"l": "D", "t": "Sie scheitern an der Akkugröße; ein Mikrofon wäre erfolgreich."}], "correct": ["B"]}, {"id": "118df4d0e7", "ex": "uav", "cat": "Betrieb & Anwendungen", "q": "(Szenario: Schwarm vs. Cluster bei Waldbränden) Kontext: Bei einem massiven Waldbrand sollen mehrere Drohnen gleichzeitig zur Lageerkundung eingesetzt werden. Frage: Was ist laut der Trends-Vorlesung der technische Kernunterschied, wenn die Einsatzleitung statt eines zivilen \"Clusterbetriebs\" einen hochkomplexen \"Schwarmbetrieb\" anfordert?", "options": [{"l": "A", "t": "Ein Cluster wird von Künstlicher Intelligenz gesteuert, ein Schwarm manuell von Menschen."}, {"l": "B", "t": "Im Schwarm fliegt immer nur eine einzige Drohne gleichzeitig."}, {"l": "C", "t": "Beim Clusterbetrieb werden die Drohnen zentral von einer Bodenstation aus geplant; ein Schwarm hingegen kooperiert dezentral, die Drohnen tauschen sich untereinander aus und teilen Aufgaben (Task Allocation) dynamisch selbst auf."}, {"l": "D", "t": "Ein Schwarm darf rechtlich nur aus Fixed-Wings bestehen."}], "correct": ["C"]}, {"id": "6c5fc35706", "ex": "uav", "cat": "Autopiloten & Flugmodi", "q": "(Szenario: Notlandung bei Sensorausfall) Kontext: Während eines Flugs mit einem ArduCopter meldet die Telemetrie plötzlich einen Totalausfall des eingebauten Barometers (und es ist kein Laser-Altimeter an Bord). Frage: Welche Flugfunktion im Autopiloten wird dadurch sofort kritisch beeinträchtigt, und in welchen Modus sollte der Pilot wechseln, um die Drohne sicher manuell zurückzuholen?", "options": [{"l": "A", "t": "Die GPS-Positionierung fällt aus; der Pilot muss in den Loiter-Modus wechseln."}, {"l": "B", "t": "Das automatische horizontale Ausrichten fällt aus; Wechsel in den Acro-Modus."}, {"l": "C", "t": "Die Kamera schaltet ab; Wechsel in den Auto-Modus."}, {"l": "D", "t": "Die automatische Höhenhaltung (Altitude Hold) funktioniert nicht mehr. Der Pilot sollte in den \"Stabilize\"-Modus wechseln, da er dort die Motorleistung (Throttle) und damit die Höhe rein manuell kontrolliert."}], "correct": ["D"]}, {"id": "a0a7ed7dc5", "ex": "uav", "cat": "Recht & Regulatorik", "q": "(Szenario: LBA Risikobewertung bei Großveranstaltungen) Kontext: Du wurdest gebeten, das Finale eines Open-Air-Konzerts mit einer 18 kg schweren Drohne (C3) direkt über den Köpfen der tausenden Zuschauer (Menschenansammlung) zu filmen. Frage: In welche EASA-Betriebskategorie fällt dieser Flug gemäß LBA-Entscheidungsdiagramm zwingend und warum?", "options": [{"l": "A", "t": "Zulassungspflichtig (Certified), da der direkte Überflug von Menschenansammlungen in der Offenen und Speziellen Kategorie grundsätzlich ausgeschlossen und extrem risikobehaftet ist."}, {"l": "B", "t": "Offen A2, weil die Flughöhe unter 120m liegt."}, {"l": "C", "t": "Speziell, weil es sich um ein Konzert handelt."}, {"l": "D", "t": "Offen A3, weil die Drohne unter 25 kg wiegt."}], "correct": ["A"]}, {"id": "9b5e84c251", "ex": "uav", "cat": "Autopiloten & Flugmodi", "q": "(Szenario: PID-Tuning für Transportdrohne) Kontext: Deine selbstgebaute Transportdrohne reagiert bei schnellen Richtungswechseln extrem träge, schwingt aber bei jedem Bremsmanöver hochfrequent nach (\"Bouncing\") und oszilliert. Frage: An welchen Werten des PID-Reglers solltest du am ehesten drehen, um die Drohne agiler auf die Knüppel reagieren zu lassen und gleichzeitig das Nachschwingen abzudämpfen?", "options": [{"l": "A", "t": "Den I-Term massiv reduzieren."}, {"l": "B", "t": "Den P-Term (Proportional) erhöhen für eine schnellere, direktere Reaktion auf Fehler; und den D-Term (Derivative) anpassen, um das Überschwingen/Bouncing prädiktiv besser abzudämpfen."}, {"l": "C", "t": "Den D-Term komplett auf Null setzen."}, {"l": "D", "t": "Ausschließlich das Magnetometer neu kalibrieren."}], "correct": ["B"]}, {"id": "83f26ec6c6", "ex": "uav", "cat": "Sensorik & Navigation", "q": "(Szenario: Praktikum Final Race Strategie) Kontext: Im \"Final Race\" (Aufgabe 0100) eures Laborpraktikums fliegt eure Crazyflie-Drohne zeitgleich gegen das Konkurrenz-Team. Beide nutzen die programmierten ToF-Sensoren. Frage: Wie kann die Drohne algorithmisch am effizientesten zwischen einem statischen Hindernis (der Hallenwand) und der sich schnell kreuzenden Gegner-Drohne (dynamisches Hindernis) unterscheiden?", "options": [{"l": "A", "t": "Durch das optische Scannen eines QR-Codes am Gegner."}, {"l": "B", "t": "Durch ein Mikrofon, das die Motorengeräusche aufnimmt."}, {"l": "C", "t": "Durch die Auswertung eines gleitenden Mittelwerts (Moving Average) der Sensordaten, um kurzfristige, schnelle Abweichungen (dynamischer Gegner) von konstanten Werten (statische Wand) zu differenzieren."}, {"l": "D", "t": "Durch die Nutzung des GPS-Signals im Labor."}], "correct": ["C"]}, {"id": "90edd3d233", "ex": "uav", "cat": "Multicopter-Grundlagen", "q": "Welches deutsche Waffensystem aus dem Zweiten Weltkrieg gilt als früher Vorläufer moderner unbemannter Marschflugkörper?", "options": [{"l": "A", "t": "Messerschmitt Me 262"}, {"l": "B", "t": "Junkers Ju 87"}, {"l": "C", "t": "Focke-Wulf Fw 190"}, {"l": "D", "t": "V-1 (\"Fieseler Fi 103\")"}], "correct": ["D"]}, {"id": "63470f4d70", "ex": "uav", "cat": "Multicopter-Grundlagen", "q": "Welche unbemannte Aufklärungsdrohne wurde während des Vietnamkriegs in großer Stückzahl von einem DC-130-Mutterflugzeug aus gestartet?", "options": [{"l": "A", "t": "AQM-34 (Firebee)"}, {"l": "B", "t": "RQ-2 Pioneer"}, {"l": "C", "t": "MQ-1 Predator"}, {"l": "D", "t": "TDN-1"}], "correct": ["A"]}, {"id": "9ae414a5c6", "ex": "uav", "cat": "Multicopter-Grundlagen", "q": "Welches frühe funkgesteuerte Zieldrohnen-System der US Navy stammt bereits aus den 1930er Jahren?", "options": [{"l": "A", "t": "RQ-4 Global Hawk"}, {"l": "B", "t": "Curtiss N2C-2"}, {"l": "C", "t": "MQ-9 Reaper"}, {"l": "D", "t": "Bayraktar TB2"}], "correct": ["B"]}, {"id": "220a6fe8ef", "ex": "uav", "cat": "Multicopter-Grundlagen", "q": "Die TDN-1 war eine unbemannte Angriffsdrohne der US Navy aus dem Zweiten Weltkrieg. Welches Merkmal war für ihre Bauweise typisch?", "options": [{"l": "A", "t": "Vollständig aus Titan gefertigt"}, {"l": "B", "t": "Angetrieben durch einen Kernreaktor"}, {"l": "C", "t": "Bauweise überwiegend aus Holz/Verbundwerkstoffen, um kriegswichtiges Aluminium zu sparen"}, {"l": "D", "t": "Ferngesteuert per Satellit"}], "correct": ["C"]}, {"id": "73a925f0fc", "ex": "uav", "cat": "Multicopter-Grundlagen", "q": "Die RQ-2 Pioneer war eine gemeinsam von den USA und Israel entwickelte Aufklärungsdrohne, die insbesondere bekannt wurde durch ihren Einsatz in...", "options": [{"l": "A", "t": "...dem Zweiten Weltkrieg"}, {"l": "B", "t": "...der Mondlandung"}, {"l": "C", "t": "...dem Ukrainekrieg"}, {"l": "D", "t": "...dem Golfkrieg 1991"}], "correct": ["D"]}, {"id": "b15b7b5635", "ex": "uav", "cat": "Multicopter-Grundlagen", "q": "Welche grundlegende Klassifikation unterscheidet UAVs zusätzlich in \"leichter als Luft\" und \"schwerer als Luft\"?", "options": [{"l": "A", "t": "Nach der Antriebsart"}, {"l": "B", "t": "Nach dem physikalischen Auftriebsprinzip (Auftrieb durch Gas vs. aerodynamischer Auftrieb)"}, {"l": "C", "t": "Nach der Farbe"}, {"l": "D", "t": "Nach dem Herstellungsjahr"}], "correct": ["B"]}, {"id": "2019c9b149", "ex": "uav", "cat": "Multicopter-Grundlagen", "q": "Was zählt zu den \"leichter als Luft\"-UAV-Konzepten (im Gegensatz zu \"schwerer als Luft\")?", "options": [{"l": "A", "t": "Multicopter"}, {"l": "B", "t": "Fixed-Wing-Drohnen"}, {"l": "C", "t": "Luftschiffe/Ballons"}, {"l": "D", "t": "Hubschrauber"}], "correct": ["C"]}, {"id": "ed0766eacb", "ex": "uav", "cat": "Design & Antrieb", "q": "Nach welchem Exponenten des Längen-Skalierungsfaktors λ skaliert laut der genauen Froude-Skalierungstabelle die benötigte Antriebsleistung (Power required)?", "options": [{"l": "A", "t": "λ²"}, {"l": "B", "t": "λ³"}, {"l": "C", "t": "λ^5"}, {"l": "D", "t": "λ^3,5"}], "correct": ["D"]}, {"id": "f380c79e9a", "ex": "uav", "cat": "Design & Antrieb", "q": "Ein UAV wird mit dem Längenfaktor λ=2 (doppelte Größe) hochskaliert. Um welchen Faktor steigt gemäß Froude-Skalierung ungefähr die benötigte Antriebsleistung?", "options": [{"l": "A", "t": "Etwa das 11-fache"}, {"l": "B", "t": "Etwa das 2-fache"}, {"l": "C", "t": "Etwa das 8-fache"}, {"l": "D", "t": "Etwa das 32-fache"}], "correct": ["A"]}, {"id": "b9f2938d94", "ex": "uav", "cat": "Design & Antrieb", "q": "Warum können UAV-Systeme im Vergleich zu bemannten Flugzeugen extrem dicht gepackt (\"Packaging Density\") gebaut werden?", "options": [{"l": "A", "t": "Weil UAVs immer aus Kohlefaser bestehen"}, {"l": "B", "t": "Weil keine Rücksicht auf die Unterbringung eines Menschen genommen werden muss"}, {"l": "C", "t": "Weil UAVs grundsätzlich keine Sensoren benötigen"}, {"l": "D", "t": "Weil UAVs keine Elektronik enthalten"}], "correct": ["B"]}, {"id": "385f3eec6a", "ex": "uav", "cat": "Design & Antrieb", "q": "Laut Reg Austin kann eine mit Überwachungssensoren ausgestattete Drohne im Vergleich zu einem leichten bemannten Flugzeug mit ähnlicher Aufgabe wie viel Pr t": "Aerodynamik & Flugmechanik", "q": "Nach der Froude-Skalierung mit Längenfaktor λ: Mit welchem Exponenten skaliert die dynamisch ähnliche Fluggeschwindigkeit?", "options": [{"l": "A", "t": "λ^0,5 (Quadratwurzel von λ)"}, {"l": "B", "t": "λ²"}, {"l": "C", "t": "λ³"}, {"l": "D", "t": "linear mit λ"}], "correct": ["A"]}, {"id": "25453708df", "ex": "uav", "cat": "Aerodynamik & Flugmechanik", "q": "Warum verwenden die meisten Starrflügel-UAVs einen heckmontierten Propeller (Pusher-Konfiguration)?", "options": [{"l": "A", "t": "Weil Pusher-Propeller grundsätzlich leiser sind als jede andere Bauart"}, {"l": "B", "t": "Aerodynamische Vorteile (weniger Widerstand/Störungen) und freies Sichtfeld für Sensoren nach vorn"}, {"l": "C", "t": "Weil dadurch kein Autopilot nötig ist"}, {"l": "D", "t": "Weil es die einzig zulässige EASA-Konfiguration ist"}], "correct": ["B"]}, {"id": "32c43587a3", "ex": "uav", "cat": "Aerodynamik & Flugmechanik", "q": "Welche Starrflügel-Konfiguration gilt als aerodynamisch effizienter, da beide Flächen (Haupt- und Vorderflügel) Auftrieb erzeugen, hat aber eine geringere Gierstabilität (Yaw)?", "options": [{"l": "A", "t": "Tailplane aft (konventionell)"}, {"l": "B", "t": "Tailless / Flying Wing"}, {"l": "C", "t": "Canard (Tailplane forward)"}, {"l": "D", "t": "Doppeldecker"}], "correct": ["C"]}, {"id": "9848b550dc", "ex": "uav", "cat": "Aerodynamik & Flugmechanik", "q": "Welcher Vorteil wird für die Canard-Konfiguration bezüglich des Strömungsabrisses (Stall) genannt?", "options": [{"l": "A", "t": "Das Hauptflügel strömt zuerst ab, was besonders gefährlich ist"}, {"l": "B", "t": "Es kommt bei dieser Konfiguration nie zum Strömungsabriss"}, {"l": "C", "t": "Der Stall betrifft immer beide Flächen exakt gleichzeitig"}, {"l": "D", "t": "Das vordere Flügelchen strömt zuerst ab, was eine sanfte, kontrollierbare Erholung ermöglicht"}], "correct": ["D"]}, {"id": "f2269cb775", "ex": "uav", "cat": "Aerodynamik & Flugmechanik", "q": "Welche Starrflügel-Konfiguration hat wegen des fehlenden Höhenleitwerks den geringsten Luftwiderstand und eignet sich gut für robuste Bauweisen (z.B. Fallschirmlandung)?", "options": [{"l": "A", "t": "Tailless (Flying Wing / Delta)"}, {"l": "B", "t": "Tailplane aft"}, {"l": "C", "t": "Canard"}, {"l": "D", "t": "Doppelrumpf-Konfiguration"}], "correct": ["A"]}, {"id": "51577851c4", "ex": "uav", "cat": "Aerodynamik & Flugmechanik", "q": "Welche Steuerfläche eines Starrflügel-UAVs kontrolliert primär die Nickbewegung (Pitch, Nase hoch/runter)?", "options": [{"l": "A", "t": "Querruder (Ailerons)"}, {"l": "B", "t": "Höhenruder (Elevator)"}, {"l": "C", "t": "Seitenruder (Rudder)"}, {"l": "D", "t": "Landeklappen (Flaps)"}], "correct": ["B"]}, {"id": "c0930681c8", "ex": "uav", "cat": "Aerodynamik & Flugmechanik", "q": "Welche Steuerfläche wird primär beim Start und bei der Landung eingesetzt, um Auftrieb (und Widerstand) zu erhöhen und die nötige Startbahnlänge zu reduzieren?", "options": [{"l": "A", "t": "Querruder"}, {"l": "B", "t": "Höhenruder"}, {"l": "C", "t": "Landeklappen (Flaps)"}, {"l": "D", "t": "Seitenruder"}], "correct": ["C"]}, {"id": "90c8a8eb81", "ex": "uav", "cat": "Aerodynamik & Flugmechanik", "q": "Warum benötigen klassische Multicopter-Rotorsysteme laut Design-Vorlesung eine GERADE Anzahl gegenläufig drehender Rotoren?", "options": [{"l": "A", "t": "Aus rein ästhetischen Gründen"}, {"l": "B", "t": "Weil ungerade Rotorzahlen gesetzlich verboten sind"}, {"l": "C", "t": "Um die Motorenkosten zu senken"}, {"l": "D", "t": "Um das Reaktionsdrehmoment (Torque-Effekt) auszugleichen"}], "correct": ["D"]}, {"id": "9c84a9516d", "ex": "uav", "cat": "Aerodynamik & Flugmechanik", "q": "Wie werden Multicopter mit einer UNGERADEN Anzahl an Rotoren (z.B. Tricopter/Y3) typischerweise gegen den Torque-Effekt stabilisiert?", "options": [{"l": "A", "t": "Über einen Heckrotor oder gekippte (tilted) Rotoren"}, {"l": "B", "t": "Gar nicht, das ist physikalisch unmöglich"}, {"l": "C", "t": "Über einen zus  am Boden zu begrenzen."}, {"l": "D", "t": "Das Abschalten nur der Kamera."}], "correct": ["C"]}, {"id": "56cf63d081", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "Warum sind UAV-Systeme oft geringer redundant ausgelegt als Verkehrsflugzeuge?", "options": [{"l": "A", "t": "Weil Vorschriften Redundanz bei Drohnen generell verbieten."}, {"l": "B", "t": "Weil Drohnen keine Sensoren besitzen."}, {"l": "C", "t": "Weil Redundanz das Fluggewicht verringert."}, {"l": "D", "t": "Weil bei fehlender Person an Bord das akzeptierte Risiko (v. a. Ground Risk) und die Gewichts-/Kostenrahmen andere Kompromisse erlauben – abgesichert über Betriebsauflagen und Recovery-Systeme."}], "correct": ["D"]}, {"id": "59956ae3de", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Eine Drohne mit 1,2 kg MTOM soll in geringem Abstand zu unbeteiligten Personen betrieben werden. Warum ist ein reiner A1-Betrieb hier i. d. R. unzulässig?", "options": [{"l": "A", "t": "Weil A1 den Betrieb nahe an Personen nur bis Klasse C1 (< 900 g) erlaubt; 1,2 kg liegt darüber, sodass eher A2 (C2, mit Abstand) oder die Specific-Kategorie greift."}, {"l": "B", "t": "Weil A1 grundsätzlich nur nachts erlaubt ist."}, {"l": "C", "t": "Weil A1 einen Fallschirm zwingend vorschreibt."}, {"l": "D", "t": "Weil A1 ausschließlich für Starrflügler gilt."}], "correct": ["A"]}, {"id": "573100521a", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Eine geplante BVLOS-Mission ergibt in der SORA eine hohe Ground Risk Class, aber eine niedrige Air Risk Class. Was folgt daraus primär?", "options": [{"l": "A", "t": "Der Betrieb ist automatisch verboten."}, {"l": "B", "t": "Es steigen vor allem die Anforderungen an Maßnahmen zur Minderung des Bodenrisikos (und das geforderte SAIL); die Luftraum-Auflagen bleiben moderat."}, {"l": "C", "t": "Es müssen ausschließlich zusätzliche Funkfrequenzen beantragt werden."}, {"l": "D", "t": "Die Drohne muss zwingend schwerer als 25 kg sein."}], "correct": ["B"]}, {"id": "c8c3575091", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Warum reicht „Direct Remote ID\" allein nicht aus, um in dichtem BVLOS-Verkehr Kollisionen zu verhindern?", "options": [{"l": "A", "t": "Weil Remote ID nur am Boden funktioniert."}, {"l": "B", "t": "Weil Remote ID die Motoren abschaltet."}, {"l": "C", "t": "Weil Remote ID nur der Identifikation/Nachverfolgung dient, nicht der aktiven Staffelung – dafür braucht es Detect-and-Avoid bzw. U-space-Verkehrsinformation und Konfliktlösung."}, {"l": "D", "t": "Weil Remote ID ausschließlich für die Polizei sichtbar ist."}], "correct": ["C"]}, {"id": "319b73dacf", "ex": "uav", "cat": "Recht & Regulatorik", "q": "Ab wann fällt ein ansonsten „Open\"-tauglicher Flug trotzdem in die Specific-Kategorie?", "options": [{"l": "A", "t": "Sobald das Wetter umschlägt."}, {"l": "B", "t": "Sobald die Drohne älter als zwei Jahre ist."}, {"l": "C", "t": "Sobald mehr als ein Akku mitgeführt wird."}, {"l": "D", "t": "Sobald eine Betriebsbedingung die Open-Grenzen verlässt – z. B. BVLOS, über 120 m Höhe, MTOM ≥ 25 kg oder Flug über Menschenansammlungen."}], "correct": ["D"]}, {"id": "cb57f10477", "ex": "uav", "cat": "Design & Antrieb", "q": "Ein Quadrocopter wiegt 1,2 kg; jeder seiner vier Motoren liefert maximal 900 g Schub. Wie groß ist das maximale Schub-Gewichts-Verhältnis?", "options": [{"l": "A", "t": "etwa 3,0 : 1"}, {"l": "B", "t": "etwa 0,75 : 1"}, {"l": "C", "t": "etwa 1,3 : 1"}, {"l": "D", "t": "etwa 4,0 : 1"}], "correct": ["A"]}, {"id": "c98b24c350", "ex": "uav", "cat": "Design & Antrieb", "q": "Warum gilt ein Schub-Gewichts-Verhältnis von rund 2 : 1 als gängige Auslegungsempfehlung für Multicopter?", "options": [{"l": "A", "t": "Weil darunter der Akku nicht lädt."}, {"l": "B", "t": "Weil es genügend Reserve für Steuerbarkeit, Beschleunigung und Störungskompensation (Wind, Manöver) bietet, ohne unnötig ineffizient überdimensioniert zu sein."}, {"l": "C", "t": "Weil die EASA exakt 2 : 1 vorschreibt."}, {"l": "D", "t": "Weil sonst der Kompass nicht kalibriert werden kann."}], "correct": ["B"]}, {"id": "4d9a3d0958", "ex": "uav", "cat": "Design & Antrieb", "q": "Warum ist ein klassischer Quadrocopter nach Ausfall eines einzelnen Motors i. d. R. nicht mehr kontrolliert steuerbar, ein Hexacopter dagegen oft schon?", "options": [{"l": "A", "t": "Weil der Quad dann zu leicht wird."}, {"l": "B", "t": "Weil ein Hexacopter keinen Flight Controller braucht."}, {"l": "C", "t": "Weil beim Quad nach dem Ausfall das nötige Gegendrehmoment und die Steuerbarkeit um alle Achsen fehlen; sechs Motoren bieten genug Redundanz, um Gier- und Lageregelung aufrechtzuerhalten."}, {"l": "D", "t": "Weil der Quad den Ausfall gar nicht bemerkt."}], "correct": ["C"]}, {"id": "dba0d128a0", "ex": "uav", "cat": "Design & Antrieb", "q": "Wie hoch ist der theoretische maximale Dauer-Entladestrom eines 4S-LiPo mit 5000 mAh und 25C?", "options": [{"l": "A", "t": "25 A"}, {"l": "B", "t": "20 A"}, {"l": "C", "t": "100 A"}, {"l": "D", "t": "125 A"}], "correct": ["D"]}, {"id": "9dc020f5f3", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Warum driftet eine rein IMU-basierte Positionsschätzung schnell, und was begrenzt diese Drift?", "options": [{"l": "A", "t": "Weil die doppelte Integration der Beschleunigung kleine Messfehler mit der Zeit stark anwachsen lässt; GNSS, Optical Flow oder Vision stützen und begrenzen die Drift."}, {"l": "B", "t": "Weil die IMU nur bei Nacht funktioniert; Scheinwerfer begrenzen die Drift."}, {"l": "C", "t": "Weil die IMU den Akku entlädt; ein größerer Akku begrenzt die Drift."}, {"l": "D", "t": "Weil das Barometer die IMU stört; dessen Abschaltung begrenzt die Drift."}], "correct": ["A"]}, {"id": "ca16a346d6", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Eine Vermessungsdrohne soll cm-genau georeferenzieren, ohne am Boden Passpunkte auszulegen. Welche Lösung ist am geeignetsten?", "options": [{"l": "A", "t": "Standard-GNSS (Meter-Genauigkeit) mit Mittelung."}, {"l": "B", "t": "RTK/PPK-GNSS mit Trägerphasenkorrektur, zeitsynchron zum Kameraauslöser."}, {"l": "C", "t": "Nur das Barometer zur Höhenreferenz."}, {"l": "D", "t": "Nur der Magnetkompass zur Ausrichtung."}], "correct": ["B"]}, {"id": "3d154e341c", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Beim Start beginnt eine GPS-Drohne, sich spiralförmig um einen Punkt zu drehen („Toilet-Bowl-Effekt\"). Was ist die wahrscheinlichste Ursache?", "options": [{"l": "A", "t": "Ein leerer Akku."}, {"l": "B", "t": "Eine defekte Kamera."}, {"l": "C", "t": "Eine fehlerhafte oder gestörte Kompasskalibrierung, sodass der Kursbezug bei der GPS-Positionshaltung falsch ist."}, {"l": "D", "t": "Eine zu hohe C-Rate des Akkus."}], "correct": ["C"]}, {"id": "512a57204d", "ex": "uav", "cat": "Sensorik & Navigation", "q": "Warum zeigt ein Beschleunigungssensor auch im ruhenden Zustand rund 1 g an?", "options": [{"l": "A", "t": "Weil er defekt ist."}, {"l": "B", "t": "Weil ihn die Motorvibration verfälscht."}, {"l": "C", "t": "Weil die Erdrotation 1 g erzeugt."}, {"l": "D", "t": "Weil er die spezifische Kraft misst – einschließlich der stützenden Reaktionskraft gegen die Gravitation – und nicht die reine kinematische Beschleunigung."}], "correct": ["D"]}, {"id": "24d82ab19a", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "Warum bietet 5,8-GHz-FPV-Video gegenüber 2,4 GHz mehr nutzbare Bandbreite, aber geringere Reichweite und Durchdringung?", "options": [{"l": "A", "t": "Weil die höhere Frequenz mehr Bandbreite erlaubt, aber stärker gedämpft wird und Hindernisse schlechter umbeugt/durchdringt."}, {"l": "B", "t": "Weil 5,8 GHz langsamer schwingt als 2,4 GHz."}, {"l": "C", "t": "Weil 2,4 GHz gar kein Video übertragen kann."}, {"l": "D", "t": "Weil 5,8 GHz nur über Satellit funktioniert."}], "correct": ["A"]}, {"id": "cd74c41332", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "Was geschieht im Freiraum mit der empfangenen Signalleistung, wenn sich die Entfernung zwischen Sender und Empfänger verdoppelt?", "options": [{"l": "A", "t": "Sie halbiert sich (−3 dB)."}, {"l": "B", "t": "Sie sinkt auf ein Viertel (−6 dB)."}, {"l": "C", "t": "Sie bleibt unverändert."}, {"l": "D", "t": "Sie sinkt auf ein Achtel (−9 dB)."}], "correct": ["B"]}, {"id": "049e73e619", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "Während einer BVLOS-Mission bricht der C2-Link ab, weil die Drohne hinter einem Hügel ist. Welche Auslegung minimiert das Bodenrisiko am besten?", "options": [{"l": "A", "t": "Sofortiger Motorstopp, unabhängig vom Ort."}, {"l": "B", "t": "Unverändertes Weiterfliegen in der aktuellen Richtung."}, {"l": "C", "t": "Ein vordefiniertes Lost-Link-Failsafe (auf sichere Höhe steigen und definierte RTH-Route abfliegen), abgesichert durch ein unabhängiges Flight Termination System als Rückfallebene."}, {"l": "D", "t": "Warten auf einen Anruf des Fluglotsen."}], "correct": ["C"]}, {"id": "aa8efd47fe", "ex": "uav", "cat": "Counter-UAS & Sicherheit", "q": "Warum ist ADS-B-Empfang an Bord einer Drohne für Detect-and-Avoid hilfreich, aber kein Allheilmittel?", "options": [{"l": "A", "t": "Weil ADS-B nur am Boden empfangen werden kann."}, {"l": "B", "t": "Weil ADS-B die Motoren stört."}, {"l": "C", "t": "Weil ADS-B nur Wetterdaten liefert."}, {"l": "D", "t": "Weil man damit nur kooperative, selbst ADS-B aussendende Luftfahrzeuge „sieht\"; nicht-kooperative Objekte (z. B. Segelflugzeuge oder Drohnen ohne ADS-B) bleiben unsichtbar und erfordern zusätzliche Sensorik."}], "correct": ["D"]}]</script>
<script>
const ALL=JSON.parse(document.getElementById('data').textContent);
const CATS=["FADEC & Triebwerksregelung", "Fly-by-Wire & Flugsteuerung", "Autopilot & Flight Management System", "Autonomie, KI & Human Factors", "Redundanz & Sicherheitsanalyse", "Luftdatensensorik (Pitot, AoA, ADC)", "Inertialnavigation & Sensorfusion", "Funknavigation & Höhenmessung", "GNSS & Satellitennavigation", "Kommunikation (Funk & Datalink)", "Überwachung (Radar, ADS-B, TCAS)", "Normen, Zulassung & Zertifizierung", "Energieversorgung & Bordnetze", "Datenbusse & Avionik-Architektur", "Avionik Grundlagen"];const EXAMS=[{"id": "avionik", "name": "✈️ Avionik", "cats": ["FADEC & Triebwerksregelung", "Fly-by-Wire & Flugsteuerung", "Autopilot & Flight Management System", "Autonomie, KI & Human Factors", "Redundanz & Sicherheitsanalyse", "Luftdatensensorik (Pitot, AoA, ADC)", "Inertialnavigation & Sensorfusion", "Funknavigation & Höhenmessung", "GNSS & Satellitennavigation", "Kommunikation (Funk & Datalink)", "Überwachung (Radar, ADS-B, TCAS)", "Normen, Zulassung & Zertifizierung", "Energieversorgung & Bordnetze", "Datenbusse & Avionik-Architektur", "Avionik Grundlagen"]}, {"id": "uav", "name": "🚁 UAV & Drohnen", "cats": ["Multicopter-Grundlagen", "Design & Antrieb", "Aerodynamik & Flugmechanik", "Sensorik & Navigation", "Autopiloten & Flugmodi", "Kommunikation & Protokolle", "Counter-UAS & Sicherheit", "Recht & Regulatorik", "Betrieb & Anwendungen"]}];const GLOSSARY={"FBW": "Fly-by-Wire – elektronische Flugsteuerung: Piloteneingaben gehen als elektrische Signale an Rechner, die die Steuerflächen bewegen (keine mechanische Verbindung).", "Fly-by-Wire": "Elektronische Flugsteuerung ohne mechanische Verbindung zwischen Steuerorgan und Ruder; Signale laufen über Flugsteuerungsrechner.", "FCC": "Flight Control Computer – Flugsteuerungsrechner, der Piloteneingaben in Steuerbefehle umsetzt und die Flugbereichsgrenzen überwacht.", "FCPC": "Flight Control Primary Computer – primärer Flugsteuerungsrechner im Fly-by-Wire-System (Airbus).", "Normal Law": "Normaler Fly-by-Wire-Modus mit vollem Flugbereichsschutz (Hard Limits); der Computer verhindert kritische Fluglagen.", "Alternate Law": "Degradierter FBW-Modus nach Sensor-/Rechnerausfällen: reduzierter Schutz, einige Envelope Protections entfallen.", "Direct Law": "Stärkste FBW-Degradation: Steuereingaben gehen direkt und ungefiltert an die Ruder, keine Schutzfunktionen mehr.", "Envelope Protection": "Flugbereichsschutz – automatische Begrenzung, die verhindert, dass das Flugzeug kritische Zustände (z. B. Strömungsabriss, Überlast) erreicht.", "Hard Limit": "Absolute, vom Piloten nicht überschreitbare Systemgrenze (Airbus Normal Law).", "Soft Limit": "Grenze, die der Pilot mit erhöhtem Kraftaufwand bewusst überschreiten kann (Boeing-Philosophie).", "SAS": "Stability Augmentation System – dämpft automatisch Eigenschwingungen (z. B. Phugoide) und entlastet den Piloten.", "Artificial Feel": "Künstliches Steuergefühl: Feder-Dämpfer-System erzeugt eine Gegenkraft am Sidestick, da bei FBW die echte Rückmeldung der Luftkräfte fehlt.", "Inceptor": "Elektronisches Steuerorgan im Cockpit (z. B. Sidestick), das den Steuerwunsch rein elektrisch erfasst.", "EHA": "Elektrohydrostatischer Aktuator – erzeugt die Stellkraft lokal aus Strom über eine eigene kleine Hydraulikpumpe (Power-by-Wire).", "EMA": "Elektromechanischer Aktuator – bewegt die Steuerfläche rein mechanisch (Motor + Spindel), ganz ohne Hydraulikflüssigkeit.", "Power-by-Wire": "Konzept, bei dem die Stellkraft erst lokal am Aktuator aus elektrischem Strom erzeugt wird, statt über zentrale Hydraulikleitungen.", "FMS": "Flight Management System – plant und optimiert die Flugroute (4D-Trajektorie) und speist Vorgaben an den Autopiloten.", "FMC": "Flight Management Computer – der Rechner, der die FMS-Funktionen ausführt.", "MCDU": "Multipurpose Control and Display Unit – Ein-/Ausgabeeinheit im Cockpit zur Bedienung des FMS.", "EFIS": "Electronic Flight Instrument System – elektronische Anzeigebildschirme (PFD/ND) statt analoger Zeigerinstrumente.", "Cost Index": "Kennzahl im FMS, die Zeitkosten gegen Treibstoffkosten gewichtet und daraus die wirtschaftlichste Geschwindigkeit bestimmt.", "Top of Descent": "Vom FMS berechneter Punkt, ab dem der treibstoffoptimale Sinkflug zum Ziel eingeleitet werden sollte.", "Flare": "Abfangbogen kurz vor dem Aufsetzen – bei Autoland durch den Radarhöhenmesser ausgelöst.", "Kalman-Filter": "Rekursiver Schätzer, der ungenaue Messungen (z. B. GPS) und driftende Sensoren (z. B. IRS) optimal zur besten Positionsschätzung fusioniert.", "FORDEC": "Entscheidungsmethode im Cockpit: Facts, Options, Risks, Decision, Execution, Check.", "ALFUS": "Autonomy Levels for Unmanned Systems – Rahmenmodell zur Einordnung von Autonomiegraden (Mission-, Umgebungskomplexität, Human Independence).", "Auto-GCAS": "Automatic Ground Collision Avoidance System – leitet bei drohender Bodenkollision autonom einen Steigflug ein.", "FADEC": "Full Authority Digital Engine Control – digitale Triebwerkssteuerung mit voller Autorität, ohne mechanische Rückfallebene.", "EEC": "Electronic Engine Control – ältere, nur teil-elektronische Triebwerkssteuerung (Vorläufer der FADEC).", "PMG": "Permanentmagnetgenerator – versorgt die FADEC ab einer bestimmten Triebwerksdrehzahl autark mit Strom, unabhängig vom Bordnetz.", "EPR": "Engine Pressure Ratio – Triebwerks-Druckverhältnis, von manchen Herstellern (z. B. Rolls-Royce) als Schub-Regelgröße genutzt.", "N1": "Drehzahl der Fan-/Niederdruckwelle; von GE/PW häufig als Schub-Regelgröße der FADEC genutzt.", "Pitot": "Staudrucksonde: misst den Gesamtdruck (Pt) der frontal anströmenden, im Rohr abgebremsten Luft.", "TAT": "Total Air Temperature – Gesamttemperatur der bis zum Stillstand abgebremsten Luft; höher als SAT wegen kinetischer Aufheizung.", "SAT": "Static Air Temperature – ungestörte statische Außenlufttemperatur.", "IAS": "Indicated Airspeed – angezeigte Fluggeschwindigkeit, direkt aus dem dynamischen Druck (q) abgeleitet.", "TAS": "True Airspeed – wahre Eigengeschwindigkeit gegenüber der Luftmasse, IAS korrigiert um Luftdichte.", "CAS": "Calibrated Airspeed – um Instrumenten-/Einbaufehler korrigierte angezeigte Geschwindigkeit.", "AoA": "Angle of Attack – Anstellwinkel zwischen Profilsehne des Flügels und der Anströmrichtung der Luft.", "ADC": "Air Data Computer – berechnet aus Drücken und Temperatur die Luftdaten (Höhe, IAS, TAS, Mach).", "ADS": "Air Data System – Gesamtsystem der Luftdatenerfassung (Sonden, Ports, ADC).", "ADIRU": "Air Data Inertial Reference Unit – vereint Luftdatenreferenz (ADR) und Trägheitsreferenz (IR) in einem Gerät.", "ADIRS": "Air Data Inertial Reference System – das Gesamtsystem aus mehreren ADIRUs.", "IRS": "Inertial Reference System – Trägheitsnavigation: ermittelt Lage und Position aus Beschleunigungs- und Drehratensensoren, ohne externe Signale.", "INS": "Inertial Navigation System – Trägheitsnavigationssystem (klassische Bezeichnung des IRS).", "IMU": "Inertial Measurement Unit – Sensorblock aus je drei orthogonalen Beschleunigungs- und Drehratensensoren.", "Sagnac": "Sagnac-Effekt: Dreht sich ein optischer Ringkreisel, entsteht eine Frequenzdifferenz zwischen zwei gegenläufigen Lichtstrahlen – Maß für die Drehrate.", "RLG": "Ring Laser Gyro – optischer Drehratensensor, der den Sagnac-Effekt mit Laserstrahlen nutzt (verschleißfrei).", "Schuler": "Schuler-Schwingung: ungedämpfte Fehleroszillation der Trägheitsnavigation mit ca. 84 min Periode, heute meist per GPS gestützt.", "Specific Force": "Spezifische Kraft – das, was ein Beschleunigungssensor misst: Summe aus Bewegungsbeschleunigung und lokaler Gravitation.", "Strapdown": "Bauweise, bei der die Inertialsensoren starr mit der Flugzeugstruktur verbunden sind; die Rotation wird rechnerisch nachgeführt (statt mechanisch kardanisch).", "ILS": "Instrument Landing System – Instrumentenlandesystem aus Localizer (horizontal) und Glide Slope (vertikal).", "Localizer": "ILS-Sender für die horizontale Führung (Landebahn-Mittellinie), im VHF-Band 108–112 MHz.", "Glide Slope": "ILS-Sender für die vertikale Führung (typisch 3° Sinkwinkel), im UHF-Band.", "VOR": "VHF Omnidirectional Range – Funkfeuer, das per Phasenvergleich den magnetischen Kurs (Radial) zur Station liefert.", "DME": "Distance Measuring Equipment – misst die Schrägentfernung zur Bodenstation über die Laufzeit von Impulspaaren.", "NDB": "Non-Directional Beacon – ungerichtetes Funkfeuer; liefert nur die Peilung zur Station, keine Entfernung.", "RADALT": "Radio Altimeter / Radarhöhenmesser – misst per Radar den tatsächlichen Bodenabstand (AGL), unabhängig von Luftdruck und Wetter.", "AGL": "Above Ground Level – Höhe über dem Boden (im Gegensatz zur barometrischen Höhe über Meeresspiegel).", "GPWS": "Ground Proximity Warning System – warnt vor gefährlicher Bodenannäherung.", "EGPWS": "Enhanced GPWS – GPWS mit Geländedatenbank für vorausschauende Warnungen.", "GNSS": "Global Navigation Satellite System – Oberbegriff für Satellitennavigationssysteme (GPS, Galileo, GLONASS, BeiDou).", "GPS": "Global Positioning System – US-Satellitennavigation; Position aus Laufzeitmessung zu mind. 4 Satelliten.", "SBAS": "Satellite-Based Augmentation System – verbessert GNSS-Genauigkeit/Integrität über geostationäre Satelliten (z. B. für LPV-Anflüge).", "GBAS": "Ground-Based Augmentation System – lokale GNSS-Korrektur per Bodensender am Flughafen für Präzisionsanflüge.", "RAIM": "Receiver Autonomous Integrity Monitoring – bordautonome Überwachung der GNSS-Signalintegrität.", "RNP": "Required Navigation Performance – leistungsbasierte Navigationsanforderung mit Genauigkeit und bordeigener Integritätsüberwachung.", "PBN": "Performance-Based Navigation – Navigation nach messbaren Leistungsvorgaben statt starrer Funkfeuer-Routen.", "ADS-B": "Automatic Dependent Surveillance-Broadcast – das Flugzeug ermittelt seine Position per GNSS und sendet sie unaufgefordert (1090 MHz).", "SSR": "Sekundärradar – fragt den Transponder des Flugzeugs ab; liefert Kennung und Höhe (kooperativ).", "PSR": "Primärradar – ortet Ziele rein über Reflexion von Mikrowellen; erfasst auch Ziele ohne Transponder, aber ohne Kennung/Höhe.", "TCAS": "Traffic Alert and Collision Avoidance System – bordautonomes Antikollisionssystem, gibt vertikale Ausweichempfehlungen (RA).", "RA": "Resolution Advisory – verbindliche, koordinierte Ausweichempfehlung des TCAS (Steigen/Sinken).", "TA": "Traffic Advisory – Verkehrshinweis des TCAS, Vorstufe zur Resolution Advisory.", "Squawk": "Vierstelliger Transpondercode (Mode A), den der Lotse dem Flugzeug zur Identifizierung zuweist.", "CPDLC": "Controller Pilot Data Link Communications – Text-Datenlink zwischen Lotse und Pilot; entlastet den Sprechfunk.", "ACARS": "Aircraft Communications Addressing and Reporting System – älteres System für kurze betriebliche Datennachrichten (VHF/SATCOM).", "SATCOM": "Satellitenkommunikation – Daten-/Sprachverbindung über Satelliten (z. B. Inmarsat, Iridium), auch über Ozeanen.", "MLAT": "Multilateration – bestimmt die Position über Laufzeitunterschiede (TDOA) eines Transpondersignals an mehreren Bodenempfängern.", "CNS": "Communication, Navigation, Surveillance – die drei Säulen der Flugverkehrsdienste.", "EHS": "Enhanced Surveillance – Mode-S-Erweiterung, die zusätzliche Bordparameter (Kursabsicht, Rollrate, Geschwindigkeit) übermittelt.", "MEA": "More Electric Aircraft – Konzept, bei dem hydraulische/pneumatische Funktionen zunehmend elektrisch ersetzt werden (z. B. B787).", "APU": "Auxiliary Power Unit – kleine Gasturbine (meist im Heck), liefert Strom und Druckluft am Boden und als Reserve im Flug.", "GPU": "Ground Power Unit – externe Bodenstromversorgung am Gate (z. B. 115 V AC / 28 V DC), entlastet APU und Triebwerke.", "RAT": "Ram Air Turbine – ausklappbare Notfallturbine, die vom Fahrtwind angetrieben bei Totalausfall flugkritische Systeme versorgt.", "CSD": "Constant Speed Drive – Ausgleichsgetriebe, das die variable Triebwerksdrehzahl konstant hält, damit der Generator exakt 400 Hz liefert.", "IDG": "Integrated Drive Generator – Kombination aus Constant Speed Drive und Generator in einem Gehäuse.", "TRU": "Transformer Rectifier Unit – wandelt Wechselspannung (115 V AC) in Gleichspannung (28 V DC) für Avionik und Sensoren.", "GLC": "Generator Line Contactor – Schutzschalter, der den Generator bei Überstrom, Über-/Unterspannung oder Frequenzfehler vom Netz trennt.", "BTB": "Bus Tie Breaker – normalerweise offener Schalter, der bei Generatorausfall beide Stromschienen über einen intakten Generator verbindet.", "Load Shedding": "Automatisches Abschalten nicht-essentieller Verbraucher bei Leistungsengpass, um kritische Avionik zu sichern.", "ARINC 429": "Klassischer, unidirektionaler Punkt-zu-Punkt-Datenbus (max. 100 kbit/s); sehr robust, aber hoher Kabelaufwand.", "ARINC 664": "Norm des AFDX-Netzwerks (Switched Ethernet) für moderne Avionik.", "AFDX": "Avionics Full-Duplex Switched Ethernet – deterministisches Netzwerk mit garantierter Bandbreite über 'Virtual Links' (A380/A350).", "ARINC 653": "Standard für strikte zeitliche/räumliche Partitionierung von Software auf IMA-Rechnern (Rückwirkungsfreiheit).", "IMA": "Integrated Modular Avionics – mehrere Software-Anwendungen laufen partitioniert auf gemeinsamen Zentralrechnern statt in Einzelboxen.", "LRU": "Line Replaceable Unit – austauschbare Hardwarebox; in klassischer ('federated') Architektur eine pro Funktion.", "CPM": "Core Processing Module – zentrales Rechenmodul, auf dem in der IMA mehrere Anwendungen laufen.", "CAN": "Controller Area Network (ARINC 825) – robuster, nachrichtenorientierter Bus für lokale Subsysteme (z. B. Batterie, APU, Pumpen).", "FMEA": "Failure Mode and Effects Analysis – induktive (Bottom-up) Analyse: vom Einzelfehler eines Bauteils zu dessen Systemauswirkung.", "FTA": "Fault Tree Analysis – deduktive (Top-down) Analyse: von einem Top-Event über logische Gatter zu den Einzelursachen.", "FHA": "Functional Hazard Assessment – bewertet mögliche Funktionsausfälle und // --- Glossar / Begriffshilfe ---------------------------------------
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function reEsc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
// Begriffe nach Laenge sortiert (laengste zuerst), damit "ARINC 429" vor "RA" greift.
const GKEYS=Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length);
const GRES=GKEYS.map(k=>({k:k,re:new RegExp('(?:^|[^0-9A-Za-zÄÖÜäöüß])'+reEsc(k)+'(?![0-9A-Za-zÄÖÜäöüß])')}));
function glossFor(q){
 // Sucht Begriffe in Frage + allen Optionen; jede Definition nur einmal.
 const hay=q.q+' '+q.options.map(o=>o.t).join(' ');
 const found=[];const used=new Set();
 for(const g of GRES){if(used.has(g.k))continue;if(g.re.test(hay)){used.add(g.k);found.push(g.k);}}
 return found;
}
function imgHTML(q){return (q.img&&IMAGES[q.img])?('<div class="qimg">'+IMAGES[q.img]+'</div>'):''}
function glossHTML(q){
 const terms=glossFor(q);if(!terms.length)return '';
 const body=terms.map(k=>'<div class="gterm"><div class="gk">'+esc(k)+'</div><div class="gd">'+esc(GLOSSARY[k])+'</div></div>').join('');
 return '<details class="gloss"><summary>ℹ️ Begriffe erklären <span style="color:var(--mut);font-weight:600">('+terms.length+')</span><span class="chev">▾</span></summary><div class="glossbody">'+body+'</div></details>';
}

const PKEY='avionik_progress_v2';
let P=load();
function load(){let p;try{p=JSON.parse(localStorage.getItem(PKEY))}catch(e){p=null}
 if(!p)p={cards:{},log:{a:0,c:0}};
 if(!p.streakDaily)p.streakDaily={count:0,last:''};
 if(!p.ui)p.ui={mode:'ueben',cat:'__all',star:false};
 if(!p.ui.exam||!EXAMS.some(e=>e.id===p.ui.exam))p.ui.exam=EXAMS[0].id;

// Spaced Repetition: Intervalle je Box (in Minuten) – auf Klausur-Lernen ausgelegt.
// Box 1 (neu/falsch) ist sofort wieder fällig und kommt in der nächsten Runde zuerst;
// wer eine Karte mehrfach richtig hat, sieht sie mit wachsendem Abstand seltener.
const SR_MIN=[0,0,5,30,120,720]; // Index=Box: 1->sofort, 2->5min, 3->30min, 4->2h, 5->12h
function nextDue(box){return Date.now()+ (SR_MIN[Math.min(5,Math.max(1,box))]||0)*60000}

function addDays(s,delta){const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+delta);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')}

 P.streakDaily.count=(P.streakDaily.last===y)?(P.streakDaily.count||0)+1:1;P.streakDaily.last=t}

function empty(){$('main').innerHTML='<div class="card center" style="color:var(--mut)"><div class="emo">🔎</div>Keine Karten in dieser Auswahl.<br>Wähle ein anderes Thema oder entferne den ⭐-Filter.</div>'}
function renderOpts(q){const opts=$('opts');opts.innerHTML='';
 q.options.forEach(o=>{const lab=document.createElement('label');lab.className='opt';
  const inp=document.createElement('input');inp.type='radio';inp.name='opt';inp.value=o.l;
  const k=document.createElement('span');k.className='k';k.textContent=o.l;
  const t=document.createElement('span');t.textContent=o.t;
  inp.addEventListener('change',()=>{document.querySelectorAll('.opt').forEach(e=>e.classList.remove('sel'));lab.classList.add('sel')});
  lab.appendChild(inp);lab.appendChild(k);lab.appendChild(t);opts.appendChild(lab)})}
function picked(){return [...document.querySelectorAll('input[name=opt]:checked')].map(x=>x.value)}
function setEq(a,b){a=a.slice().sort();b=b.slice().sort();return a.length===b.length&&a.every((v,i)=>v===b[i])}
function markOpts(q,sel){document.querySelectorAll('.opt').forEach(lab=>{const v=lab.querySelector('input').value;lab.querySelector('input').disabled=true;if(q.correct.includes(v))lab.classList.add('correct');else if(sel.includes(v))lab.classList.add('wrong')})}
function fb(ok,q){const el=$('fb');if(!el)return;el.classList.add('show',ok?'ok':'no');
 const cor=q.options.find(o=>q.correct.includes(o.l));
 el.innerHTML=ok?('✅ '+praise()+(streak>=3?' 🔥'+streak+' in Folge!':''))
              :('❌ '+oops()+'<span class="cor">✓ Richtig: '+esc(cor?cor.t:q.correct.join(', '))+'</span>')}

document.addEventListener('keydown',e=>{
 if(e.key===' '&&mode==='karten'&&!kFlip){e.preventDefault();if($('show'))kShow();return}
 if(e.key==='Enter'){const ck=$('ck'),nx=$('nx');if(nx&&!nx.classList.contains('hidden'))nx.click();else if(ck&&!ck.classList.contains('hidden'))ck.click();else if($('nx'))$('nx').click();return}
 if(['1','2','3','4'].includes(e.key)){const inp=document.querySelectorAll('input[name=opt]')[+e.key-1];if(inp&&!inp.disabled){inp.checked=true;inp.dispatchEvent(new Event('change'))}}});
